<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --grad-opacity: 0.3; --accent: #00d4ff; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; background-color: #050505; color: white; min-height: 100vh; overflow-x: hidden; }
        
        #full-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; transition: 0.8s; }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
        
        /* Layout Fixes */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .quick-links { display: flex; gap: 25px; align-items: center; }
        .text-btn { cursor: pointer; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; opacity: 0.6; transition: 0.2s; text-decoration: none; color: white; letter-spacing: 1px; }
        .text-btn:hover { opacity: 1; color: var(--accent); }
        
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; align-items: start; }
        .column { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 25px; position: relative; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(5px); }
        .column-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; border-radius: 12px; }
        
        .category-title { margin: 0 0 20px 0; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center; }
        .link-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .link-item a { color: #ccc; text-decoration: none; font-size: 0.95rem; transition: 0.2s; }
        .link-item a:hover { color: white; transform: translateX(3px); }

        .weather-section { margin-bottom: 40px; }
        #forecast-row { display: flex; gap: 30px; margin-top: 15px; }
        .forecast-day { text-align: center; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; min-width: 60px; }

        /* Settings UI */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border-radius: 16px; z-index: 2000; width: 90%; max-width: 450px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; }
        
        input, select, button { background: #222; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; width: 100%; margin: 8px 0; box-sizing: border-box; }
        button { cursor: pointer; background: var(--accent); color: black; font-weight: bold; border: none; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        button.secondary { background: #333; color: white; }

        .del-btn { color: #ff4444; cursor: pointer; font-size: 0.7rem; opacity: 0.4; transition: 0.2s; }
        .del-btn:hover { opacity: 1; }
        .edit-active .del-btn { display: inline-block; }
        .hidden { display: none; }
    </style>
</head>
<body class="edit-active">

    <div id="full-bg"></div>
    <div id="overlay" onclick="closeModals()"></div>

    <div class="container">
        <header class="top-bar">
            <div class="quick-links">
                <span class="text-btn" onclick="switchProfile()" id="prof-display">HOME</span>
                <a id="ql-spotify" class="text-btn" target="_blank">SPOTIFY</a>
                <a id="ql-server" class="text-btn" target="_blank">SERVER</a>
                <a id="ql-music" class="text-btn" target="_blank">MUSIC</a>
            </div>
            <div class="quick-links">
                <span class="text-btn" onclick="document.body.classList.toggle('edit-active')"><i class="fa-solid fa-pen"></i></span>
                <span class="text-btn" onclick="openModal('settings-mod')"><i class="fa-solid fa-gear"></i></span>
            </div>
        </header>

        <section id="weather-wrap" class="weather-section hidden">
            <h3 id="city-name" style="margin:0; cursor:pointer; color: var(--accent);" onclick="cycleCity()">---</h3>
            <div id="forecast-row"></div>
        </section>

        <main id="grid"></main>
    </div>

    <div id="settings-mod" class="modal">
        <h3 style="margin:0 0 20px 0">Dashboard Engine</h3>
        
        <label style="font-size: 0.8rem; opacity: 0.6;">Edit Category</label>
        <select id="cat-select" onchange="loadCatEdit()"></select>
        
        <div id="cat-edit-zone">
            <div style="display:flex; gap:10px;">
                <input type="text" id="edit-title" placeholder="Title" oninput="syncEdit()">
                <input type="color" id="edit-color" oninput="syncEdit()" style="width:60px; padding:2px;">
            </div>
            <button class="secondary" onclick="addLinkToCat()">+ Add Link to Category</button>
        </div>

        <div style="margin: 20px 0; border-top: 1px solid #333; padding-top: 15px;">
            <button onclick="addCategory()">+ Create New Category</button>
            <div style="margin-top:10px; display:flex; gap:10px;">
                <label><input type="checkbox" id="check-mesh" onchange="updateVisuals()"> Mesh</label>
                <label><input type="checkbox" id="check-col" onchange="updateVisuals()"> Gradients</label>
            </div>
            <input type="range" min="0" max="1" step="0.1" id="op-range" oninput="updateVisuals()">
        </div>
        
        <div style="display:flex; gap:10px;">
            <button class="secondary" onclick="exportData()">Backup</button>
            <button class="secondary" onclick="openModal('weather-mod')">Weather</button>
        </div>
    </div>

    <div id="weather-mod" class="modal">
        <h3>Weather Config</h3>
        <input type="text" id="city-in" placeholder="Search City..." oninput="searchLocation(this.value)">
        <div id="search-results" style="max-height:150px; overflow-y:auto; margin:10px 0;"></div>
        <div id="active-cities"></div>
        <button onclick="openModal('settings-mod')" style="margin-top:10px;">Back</button>
    </div>

<script>
    const KEY = "DASHBOARD_V5_STABLE";
    
    // Default Data
    const DEFAULT_STATE = {
        profile: 'home',
        visuals: { mesh: true, col: true, opacity: 0.3 },
        weather: { visible: true, locations: [{name: "Odivelas", lat: 38.79, lon: -9.18}] },
        data: {
            home: [
                { title: "Social", color: "#00d4ff", links: [{name: "YouTube", url: "https://youtube.com"}] }
            ],
            work: [{ title: "Work", color: "#3498db", links: [] }],
            ql: {
                home: { 
                    spotify: { vis: true, url: "#", label: "SPOTIFY" },
                    server: { vis: false, url: "#", label: "SERVER" },
                    music: { vis: false, url: "#", label: "MUSIC" }
                },
                work: {
                    spotify: { vis: false, url: "#", label: "SPOTIFY" },
                    server: { vis: true, url: "#", label: "SERVER" },
                    music: { vis: false, url: "#", label: "MUSIC" }
                }
            }
        }
    };

    let state = JSON.parse(localStorage.getItem(KEY)) || DEFAULT_STATE;
    let cityIdx = 0;

    function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

    // --- MAIN RENDER ---
    function render() {
        const grid = document.getElementById('grid');
        const profileData = state.data[state.profile];
        const qlData = state.data.ql[state.profile];
        
        grid.innerHTML = '';
        document.getElementById('prof-display').textContent = state.profile.toUpperCase();
        document.documentElement.style.setProperty('--grad-opacity', state.visuals.opacity);

        profileData.forEach((cat, cIdx) => {
            const col = document.createElement('div');
            col.className = 'column';
            col.innerHTML = `
                <div class="column-bg" style="background: linear-gradient(to bottom, ${cat.color} 0%, transparent 100%); opacity: ${state.visuals.col ? state.visuals.opacity : 0}"></div>
                <h2 class="category-title" style="color: ${cat.color}">${cat.title} <span class="del-btn" onclick="removeCat(${cIdx})">DELETE</span></h2>
                <div class="link-list"></div>
            `;
            
            const list = col.querySelector('.link-list');
            cat.links.forEach((l, lIdx) => {
                const item = document.createElement('div');
                item.className = 'link-item';
                item.innerHTML = `<a href="${l.url}">${l.name || 'Untitled'}</a> <span class="del-btn" onclick="removeLink(${cIdx}, ${lIdx})">✕</span>`;
                list.appendChild(item);
            });
            grid.appendChild(col);
        });

        // Background
        const bg = document.getElementById('full-bg');
        if(state.visuals.mesh) {
            const colors = profileData.map(c => c.color);
            bg.style.background = colors.length > 1 ? `linear-gradient(135deg, ${colors.join(',')})` : (colors[0] || '#050505');
            bg.style.opacity = state.visuals.opacity;
        } else { bg.style.opacity = 0; }

        // Settings Sync
        const sel = document.getElementById('cat-select');
        const lastVal = sel.value;
        sel.innerHTML = profileData.map((c, i) => `<option value="${i}">${c.title}</option>`).join('');
        if(lastVal !== "") sel.value = lastVal;
    }

    // --- FUNCTIONALITY ---
    function switchProfile() { state.profile = state.profile === 'home' ? 'work' : 'home'; save(); render(); updateWeather(); }
    
    function addCategory() {
        state.data[state.profile].push({ title: "New", color: "#ffffff", links: [] });
        save(); render();
    }

    function removeCat(i) { if(confirm("Delete category?")) { state.data[state.profile].splice(i, 1); save(); render(); } }

    function addLinkToCat() {
        const idx = document.getElementById('cat-select').value;
        if(idx === "") return;
        const name = prompt("Link Name:");
        const url = prompt("URL:");
        if(name && url) {
            state.data[state.profile][idx].links.push({name, url});
            save(); render();
        }
    }

    function removeLink(c, l) { state.data[state.profile][c].links.splice(l, 1); save(); render(); }

    function syncEdit() {
        const idx = document.getElementById('cat-select').value;
        if(idx === "") return;
        state.data[state.profile][idx].title = document.getElementById('edit-title').value;
        state.data[state.profile][idx].color = document.getElementById('edit-color').value;
        save(); render();
    }

    function loadCatEdit() {
        const idx = document.getElementById('cat-select').value;
        if(idx === "") return;
        const cat = state.data[state.profile][idx];
        document.getElementById('edit-title').value = cat.title;
        document.getElementById('edit-color').value = cat.color;
    }

    function updateVisuals() {
        state.visuals.mesh = document.getElementById('check-mesh').checked;
        state.visuals.col = document.getElementById('check-col').checked;
        state.visuals.opacity = document.getElementById('op-range').value;
        save(); render();
    }

    async function updateWeather() {
        const wrap = document.getElementById('weather-wrap');
        if(!state.weather.locations.length) return;
        wrap.classList.remove('hidden');
        const loc = state.weather.locations[cityIdx];
        document.getElementById('city-name').textContent = loc.name.toUpperCase();
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&daily=temperature_2m_max&timezone=auto`);
            const d = await res.json();
            const row = document.getElementById('forecast-row');
            row.innerHTML = d.daily.time.slice(0,5).map((t, i) => `
                <div class="forecast-day">
                    <div style="opacity:0.5; font-size:0.7rem;">${new Date(t).toLocaleDateString('en',{weekday:'short'})}</div>
                    <div style="font-size:1.1rem; font-weight:bold; margin-top:5px;">${Math.round(d.daily.temperature_2m_max[i])}°</div>
                </div>
            `).join('');
        } catch(e) { console.error("Weather failed"); }
    }

    async function searchLocation(val) {
        if(val.length < 3) return;
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${val}&count=5`);
        const d = await res.json();
        const results = document.getElementById('search-results');
        results.innerHTML = (d.results || []).map(r => `
            <div onclick="addCity('${r.name}', ${r.latitude}, ${r.longitude})" style="padding:10px; cursor:pointer; background:#222; margin-bottom:5px; border-radius:5px;">
                ${r.name}, ${r.country_code}
            </div>
        `).join('');
    }

    function addCity(name, lat, lon) {
        state.weather.locations.push({name, lat, lon});
        save(); updateWeather();
        document.getElementById('search-results').innerHTML = '';
        document.getElementById('city-in').value = '';
    }

    function cycleCity() { if(state.weather.locations.length > 1) { cityIdx = (cityIdx + 1) % state.weather.locations.length; updateWeather(); } }

    function openModal(id) { closeModals(); document.getElementById(id).style.display = 'block'; document.getElementById('overlay').style.display = 'block'; if(id==='settings-mod') loadCatEdit(); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('overlay').style.display='none'; }

    window.onload = () => {
        render();
        updateWeather();
        document.getElementById('check-mesh').checked = state.visuals.mesh;
        document.getElementById('check-col').checked = state.visuals.col;
        document.getElementById('op-range').value = state.visuals.opacity;
    };
</script>
</body>
</html>
