<script>
    // --- PERSISTENCE ---
    const STORAGE_KEY = "FINAL_DASH_STABLE_V1";
    
    // Load existing or use defaults
    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        activeProfile: 'home',
        opacity: 0.3,
        mesh: true,
        cities: [{name: "Odivelas", lat: 38.79, lon: -9.18}],
        home: {
            ql: [{name: "SPOTIFY", url: "#", vis: true}, {name: "SERVER", url: "#", vis: false}],
            categories: [{title: "Social", color: "#00d4ff", links: [{name: "YouTube", url: "https://youtube.com"}]}]
        },
        work: {
            ql: [{name: "SERVER", url: "#", vis: true}],
            categories: [{title: "Work", color: "#f1c40f", links: []}]
        }
    };

    let cityIdx = 0;

    // --- REAL-TIME SAVE & SYNC ---
    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        render(); // This forces the UI to update immediately
    }

    // --- RENDERING ---
    function render() {
        const prof = state[state.activeProfile];
        const grid = document.getElementById('grid');
        const qlArea = document.getElementById('quick-links-area');
        
        // Update Profile Name
        document.getElementById('prof-btn').textContent = state.activeProfile.toUpperCase();

        // Render QuickLinks (Top Left)
        const qlHtml = prof.ql.filter(l => l.vis).map(l => `<a href="${l.url}" class="nav-link" target="_blank">${l.name}</a>`).join('');
        qlArea.innerHTML = `<span class="nav-link" onclick="toggleProfile()">${state.activeProfile.toUpperCase()}</span>` + qlHtml;

        // Render Main Grid
        grid.innerHTML = prof.categories.map((cat, cIdx) => `
            <div class="column">
                <div style="position:absolute; inset:0; background: linear-gradient(to bottom, ${cat.color} 0%, transparent 100%); opacity: ${state.mesh ? state.opacity : 0}; z-index:-1; border-radius:16px;"></div>
                <div class="col-header">
                    <h3 style="color:${cat.color}; margin:0;">${cat.title}</h3>
                    <span class="del-btn" onclick="deleteCategory(${cIdx})">DELETE</span>
                </div>
                ${cat.links.map((link, lIdx) => `
                    <div class="link-row">
                        <a href="${link.url}" target="_blank">${link.name}</a>
                        <span class="del-btn" onclick="deleteLink(${cIdx}, ${lIdx})">✕</span>
                    </div>
                `).join('')}
            </div>
        `).join('');

        // Global Visuals (Background Mesh)
        const bg = document.getElementById('full-bg');
        if(state.mesh) {
            const colors = prof.categories.map(c => c.color);
            if(colors.length > 1) {
                bg.style.background = `linear-gradient(135deg, ${colors.join(',')})`;
            } else if(colors.length === 1) {
                bg.style.background = colors[0];
            } else {
                bg.style.background = '#050505';
            }
            bg.style.opacity = state.opacity;
        } else { 
            bg.style.opacity = 0; 
        }
    }

    // --- ENGINE LOGIC ---
    function toggleProfile() { 
        state.activeProfile = state.activeProfile === 'home' ? 'work' : 'home'; 
        save(); 
        updateWeather(); // Weather needs its own fetch
    }

    // This refreshes the inputs in the modal to match the state
    function syncSettingsPanel() {
        const prof = state[state.activeProfile];
        const sel = document.getElementById('cat-edit-select');
        
        // Update Category Dropdown
        const currentVal = sel.value;
        sel.innerHTML = prof.categories.map((c, i) => `<option value="${i}">${c.title}</option>`).join('');
        if(currentVal !== "" && prof.categories[currentVal]) sel.value = currentVal;

        const idx = sel.value;
        if(idx !== "" && prof.categories[idx]) {
            document.getElementById('cat-title-in').value = prof.categories[idx].title;
            document.getElementById('cat-color-in').value = prof.categories[idx].color;
        }

        // QL Editor
        document.getElementById('ql-editor-list').innerHTML = prof.ql.map((l, i) => `
            <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
                <input type="checkbox" ${l.vis ? 'checked' : ''} onchange="updateQl(${i}, 'vis', this.checked)" style="width:20px; height:20px; margin:0;">
                <input type="text" value="${l.name}" oninput="updateQl(${i}, 'name', this.value)" placeholder="Label" style="margin:0;">
                <input type="text" value="${l.url}" oninput="updateQl(${i}, 'url', this.value)" placeholder="URL" style="margin:0;">
            </div>
        `).join('');

        document.getElementById('op-slider').value = state.opacity;
        document.getElementById('mesh-check').checked = state.mesh;
    }

    // Real-time update functions
    function updateCatInfo() {
        const idx = document.getElementById('cat-edit-select').value;
        if(idx === "") return;
        state[state.activeProfile].categories[idx].title = document.getElementById('cat-title-in').value;
        state[state.activeProfile].categories[idx].color = document.getElementById('cat-color-in').value;
        save();
    }

    function updateQl(i, key, val) { 
        state[state.activeProfile].ql[i][key] = val; 
        save(); 
    }

    function updateVisuals() { 
        state.opacity = document.getElementById('op-slider').value; 
        state.mesh = document.getElementById('mesh-check').checked; 
        save(); 
    }
    
    function addNewCategory() { 
        state[state.activeProfile].categories.push({title: "New Category", color: "#00d4ff", links: []}); 
        save(); 
        syncSettingsPanel(); 
    }
    
    function deleteCategory(i) { 
        if(confirm("Delete this category?")) { 
            state[state.activeProfile].categories.splice(i, 1); 
            save(); 
            syncSettingsPanel(); 
        } 
    }

    function addNewLink() {
        const idx = document.getElementById('cat-edit-select').value;
        if(idx === "") return alert("Please select a category first!");
        const n = prompt("Link Name:");
        const u = prompt("URL:");
        if(n && u) {
            state[state.activeProfile].categories[idx].links.push({name: n, url: u});
            save();
        }
    }

    function deleteLink(c, l) { 
        state[state.activeProfile].categories[c].links.splice(l, 1); 
        save(); 
    }

    // --- WEATHER ---
    async function updateWeather() {
        if(!state.cities || !state.cities.length) return;
        const city = state.cities[cityIdx];
        document.getElementById('city-display').textContent = city.name.toUpperCase();
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&daily=temperature_2m_max&timezone=auto`);
            const d = await r.json();
            document.getElementById('weather-grid').innerHTML = d.daily.time.slice(0,5).map((t, i) => `
                <div class="weather-card">
                    <div style="font-size:0.7rem; opacity:0.5;">${new Date(t).toLocaleDateString('en',{weekday:'short'})}</div>
                    <div style="font-size:1.1rem; font-weight:700; margin-top:5px;">${Math.round(d.daily.temperature_2m_max[i])}°</div>
                </div>
            `).join('');
        } catch(e) { console.error("Weather failed to load"); }
    }

    function cycleCity() { 
        if(state.cities.length > 1) {
            cityIdx = (cityIdx + 1) % state.cities.length; 
            updateWeather(); 
        }
    }

    // --- SEARCH ---
    async function searchCityApi(val) {
        if(val.length < 3) return;
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${val}&count=5`);
        const d = await res.json();
        const results = document.getElementById('city-results');
        results.innerHTML = (d.results || []).map(r => `
            <div onclick="addCity('${r.name}', ${r.latitude}, ${r.longitude})" style="padding:10px; cursor:pointer; background:#222; margin-bottom:5px; border-radius:5px; font-size:0.9rem;">
                ${r.name}, ${r.country_code}
            </div>
        `).join('');
    }

    function addCity(name, lat, lon) {
        state.cities.push({name, lat, lon});
        document.getElementById('city-results').innerHTML = '';
        save();
        updateWeather();
    }

    // --- UI TOOLS ---
    function openModal(id) { 
        closeModals(); 
        document.getElementById(id).style.display = 'block'; 
        document.getElementById('overlay').style.display = 'block'; 
        syncSettingsPanel();
    }

    function closeModals() { 
        document.querySelectorAll('.modal').forEach(m => m.style.display='none'); 
        document.getElementById('overlay').style.display='none'; 
    }

    function exportData() {
        const b = new Blob([JSON.stringify(state)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download='dashboard_backup.json'; a.click();
    }

    // Initialize
    window.onload = () => { 
        render(); 
        updateWeather(); 
    };
</script>
