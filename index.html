<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startpage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card-bg: #1a1a1a; --accent: #00d4ff; --link-text: #ffffff; }

        body {
            background-color: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; width: 100vw;
            overflow: hidden; transition: background-color 0.4s ease;
        }

        /* Top Left Container */
        .left-icons-container {
            position: fixed; top: 20px; left: 20px;
            display: flex; gap: 18px; z-index: 100;
        }
        .left-icons-container a {
            font-size: 1.1rem; color: #fff; opacity: 0.5; transition: 0.3s; text-decoration: none;
        }
        .left-icons-container a:hover { opacity: 1; color: var(--accent); transform: scale(1.1); }

        #profile-switcher, #gear-icon { 
            font-size: 1.3rem; color: #fff; opacity: 0.5; transition: 0.3s; background: none;
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; z-index: 100;
        }
        #profile-switcher { position: fixed; top: 20px; right: 20px; }
        #gear-icon { position: fixed; top: 20px; right: 60px; }
        #profile-switcher:hover, #gear-icon:hover { opacity: 1; transform: scale(1.1); color: var(--accent); }

        .main-wrapper {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            flex-grow: 1; width: 100%;
        }

        .container {
            display: flex; flex-direction: row; 
            justify-content: center; 
            align-items: flex-start; 
            gap: 2.5vw; width: 100%; padding: 0 4vw; box-sizing: border-box;
        }
        
        .column { 
            min-width: 160px; width: auto; max-width: 300px;
            flex-shrink: 0; display: flex; flex-direction: column; gap: 1vh; 
        }

        .category-header {
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 0.8vh; margin-bottom: 0.5vh; border-bottom: 2px solid var(--accent);
            white-space: nowrap;
        }
        .category-title {
            font-size: clamp(0.8rem, 1.2vw, 1.3rem); font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.1vw; margin: 0; text-align: center; width: 100%; color: var(--accent);
            text-decoration: none;
        }

        .link-card {
            background: var(--card-bg); padding: 0.9vh 0.8vw; border-radius: 6px;
            text-decoration: none; color: var(--link-text); font-size: clamp(0.7rem, 0.9vw, 1rem);
            text-align: center; transition: 0.2s; display: block; border: 1px solid transparent;
            white-space: nowrap;
        }
        .link-card:hover { transform: translateY(-2px); border-color: var(--accent); background: #222; }

        /* Weather Bar Styling */
        #weather-container {
            width: 100%; height: 90px; display: none; justify-content: center; align-items: center;
            padding-bottom: 20px; transition: 0.3s; opacity: 0.7;
        }
        #weather-container.visible { display: flex; }
        .weather-location-label { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-right: 25px; font-weight: bold; cursor: pointer; }
        .forecast-wrapper { display: flex; gap: 30px; cursor: pointer; }
        .forecast-day { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .day-name { font-size: 0.6rem; opacity: 0.5; text-transform: uppercase; }
        .day-temp { font-size: 0.8rem; font-weight: bold; }

        /* Modal / Configuration Styling */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 1000; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #181818; padding: 25px; border-radius: 15px; box-shadow: 0 0 60px rgba(0,0,0,0.9); z-index: 1001; width: 460px; border: 1px solid #333; max-height: 85vh; overflow-y: auto; }
        .settings-row { margin-bottom: 18px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        label { font-weight: bold; font-size: 0.7rem; color: var(--accent); text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; background: #252525; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 0.85rem; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 8px; font-size: 0.8rem; }
        .btn-add { background: var(--accent); color: #000; }
        .btn-close { background: #444; color: #fff; }
        .icon-config-item { display: flex; align-items: center; gap: 10px; margin-top: 10px; background: #222; padding: 8px; border-radius: 6px; }
        .del-btn { display: none; color: #ff4444; cursor: pointer; font-size: 10px; margin-top: 4px; text-align: center; font-weight: bold; }
        .edit-mode .del-btn { display: block; }
    </style>
</head>
<body>

    <div id="modal-overlay" onclick="closeAllModals()"></div>
    <div id="gear-icon" onclick="toggleModal('settings-panel')"><i class="fa-solid fa-gear"></i></div>
    <button id="profile-switcher" onclick="toggleProfile()"></button>
    
    <div class="left-icons-container" id="left-icons"></div>

    <div class="main-wrapper">
        <div class="container" id="grid"></div>
    </div>

    <div id="weather-container">
        <div id="weather-content" style="display: flex; align-items: center;">
            <span class="weather-location-label" id="loc-name" onclick="cycleWeather()">Weather</span>
            <div class="forecast-wrapper" id="forecast-row" onclick="toggleModal('weather-modal')"></div>
        </div>
    </div>

    <div id="settings-panel" class="modal">
        <h3 style="color:var(--accent); margin:0 0 15px 0;">Configuration</h3>
        
        <div class="settings-row">
            <label>General Settings</label>
            <div style="display: flex; align-items: center; gap: 10px; margin: 10px 0; cursor: pointer;" onclick="toggleWeatherVis()">
                <input type="checkbox" id="weather-vis-check" style="width:auto;"> <small>Enable Weather Bar</small>
            </div>
            <label>Startup Default</label>
            <select id="startup-select" onchange="setAsStartup()">
                <option value="home">Home</option>
                <option value="work">Work</option>
            </select>
        </div>

        <div class="settings-row">
            <label>Top Corner Shortcut Icons</label>
            <div id="corner-icons-settings">
                <div class="icon-config-item"><input type="checkbox" id="check-spotify" onchange="updateProfileIcons()" style="width:auto;"><i class="fa-brands fa-spotify" style="width: 20px;"></i><input type="text" id="url-spotify" placeholder="Spotify URL" oninput="updateProfileIcons()"></div>
                <div class="icon-config-item"><input type="checkbox" id="check-server" onchange="updateProfileIcons()" style="width:auto;"><i class="fa-solid fa-server" style="width: 20px;"></i><input type="text" id="url-server" placeholder="Server URL" oninput="updateProfileIcons()"></div>
                <div class="icon-config-item"><input type="checkbox" id="check-music" onchange="updateProfileIcons()" style="width:auto;"><i class="fa-solid fa-music" style="width: 20px;"></i><input type="text" id="url-music" placeholder="Music URL" oninput="updateProfileIcons()"></div>
                <div class="icon-config-item"><input type="checkbox" id="check-yamaha" onchange="updateProfileIcons()" style="width:auto;"><i class="fa-solid fa-audio-description" style="width: 20px;"></i><input type="text" id="url-yamaha" placeholder="Yamaha URL" oninput="updateProfileIcons()"></div>
            </div>
        </div>

        <div class="settings-row">
            <label>Category & Link Editor</label>
            <select id="col-select" onchange="loadCategoryData()"></select>
            <div style="display: flex; gap: 8px; margin-top:10px;">
                <div style="flex:2"><label>Name</label><input type="text" id="edit-col-title" oninput="liveUpdateHeader()"></div>
                <div style="flex:1"><label>Color</label><input type="color" id="edit-col-color" oninput="liveUpdateHeader()" style="height:40px;"></div>
            </div>
            <div style="margin-top:10px;"><label>Header Link</label><input type="text" id="edit-col-link" placeholder="https://..." oninput="liveUpdateHeader()"></div>
            <div id="category-links-list"></div>
            <button class="btn btn-add" onclick="addFullCategory()">+ Add Category</button>
        </div>

        <div class="settings-row">
            <label>Theme</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <div><input type="color" id="color-bg" oninput="updateMasterTheme()"><br><small>BG</small></div>
                <div><input type="color" id="color-acc" oninput="updateMasterTheme()"><br><small>Accent</small></div>
                <div><input type="color" id="color-lnk" oninput="updateMasterTheme()"><br><small>Links</small></div>
            </div>
        </div>

        <button class="btn btn-close" onclick="closeAllModals()">Close</button>
    </div>

    <div id="weather-modal" class="modal">
        <h3 style="color:var(--accent); margin:0 0 15px 0;">City Manager</h3>
        <div id="weather-list"></div>
        <div class="settings-row" style="margin-top:15px;">
            <label>Add City</label>
            <input type="text" id="city-search" placeholder="e.g. Sombor">
            <button class="btn btn-add" onclick="addCityByName()">Add City</button>
        </div>
        <button class="btn btn-close" onclick="closeAllModals()">Close</button>
    </div>

    <script>
        const createLinks = (n) => Array.from({length:n}, (_,i)=>({name:`Link ${i+1}`, url:"#"}));
        const defaultHome = () => [{ title: "Social", color: "#00d4ff", url: "", links: createLinks(3) }, { title: "Media", color: "#00d4ff", url: "", links: createLinks(3) }];
        const defaultWork = () => [{ title: "Dev", color: "#3498db", url: "", links: createLinks(3) }];

        let weatherVisible = JSON.parse(localStorage.getItem('sp_v31_w_vis')) ?? true;
        let weatherLocs = JSON.parse(localStorage.getItem('sp_v31_weather')) || [{name:"Sombor", lat:45.77, lon:19.11}];
        let weatherIdx = 0;
        let currentProfile = localStorage.getItem('sp_v31_profile') || 'home';
        let masterData = JSON.parse(localStorage.getItem('sp_v31_master')) || {
            home: { data: defaultHome(), theme: {bg:"#0a0a0a", acc:"#00d4ff", lnk:"#ffffff"}, icons: {spotify: {enabled: true, url: ""}, server: {enabled: false, url: ""}, music: {enabled: false, url: ""}, yamaha: {enabled: false, url: ""}}},
            work: { data: defaultWork(), theme: {bg:"#0a0e14", acc:"#3498db", lnk:"#ffffff"}, icons: {spotify: {enabled: false, url: ""}, server: {enabled: true, url: ""}, music: {enabled: false, url: ""}, yamaha: {enabled: false, url: ""}}}
        };

        function render() {
            const grid = document.getElementById('grid');
            const colSel = document.getElementById('col-select');
            grid.innerHTML = ''; colSel.innerHTML = '';
            const profile = masterData[currentProfile];
            const theme = profile.theme;

            document.documentElement.style.setProperty('--bg', theme.bg);
            document.documentElement.style.setProperty('--accent', theme.acc);
            document.documentElement.style.setProperty('--link-text', theme.lnk);

            // Render Left Icons
            const leftContainer = document.getElementById('left-icons');
            leftContainer.innerHTML = '';
            Object.keys(profile.icons).forEach(key => {
                const icon = profile.icons[key];
                const faClass = key === 'spotify' ? 'fa-brands fa-spotify' : key === 'server' ? 'fa-solid fa-server' : key === 'music' ? 'fa-solid fa-music' : 'fa-solid fa-audio-description';
                if(icon.enabled) leftContainer.innerHTML += `<a href="${icon.url || '#'}" target="_blank"><i class="${faClass}"></i></a>`;
            });

            // Render Grid Columns
            profile.data.forEach((col, cIdx) => {
                const colDiv = document.createElement('div');
                colDiv.className = 'column';
                const color = col.color || theme.acc;
                colDiv.innerHTML = `<div class="category-header" style="border-bottom-color:${color}"><a ${col.url ? `href="${col.url}"` : ''} class="category-title" style="color:${color}">${col.title}</a></div>`;
                col.links.forEach(l => {
                    colDiv.innerHTML += `<a href="${l.url}" class="link-card">${l.name}</a>`;
                });
                grid.appendChild(colDiv);
                colSel.innerHTML += `<option value="${cIdx}">${col.title}</option>`;
            });

            document.getElementById('weather-container').className = weatherVisible ? 'visible' : '';
            document.getElementById('profile-switcher').innerHTML = currentProfile === 'home' ? '<i class="fa-solid fa-house"></i>' : '<i class="fa-solid fa-user-tie"></i>';
            updateEditorInputs();
            save();
        }

        function updateEditorInputs() {
            const profile = masterData[currentProfile];
            document.getElementById('color-bg').value = profile.theme.bg;
            document.getElementById('check-spotify').checked = profile.icons.spotify.enabled;
            document.getElementById('url-spotify').value = profile.icons.spotify.url;
            document.getElementById('check-server').checked = profile.icons.server.enabled;
            document.getElementById('url-server').value = profile.icons.server.url;
            document.getElementById('check-music').checked = profile.icons.music.enabled;
            document.getElementById('url-music').value = profile.icons.music.url;
            document.getElementById('check-yamaha').checked = profile.icons.yamaha.enabled;
            document.getElementById('url-yamaha').value = profile.icons.yamaha.url;
        }

        function toggleModal(id) { document.getElementById(id).style.display = 'block'; document.getElementById('modal-overlay').style.display = 'block'; if(id==='settings-panel') loadCategoryData(); }
        function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('modal-overlay').style.display = 'none'; }
        function toggleProfile() { currentProfile = currentProfile === 'home' ? 'work' : 'home'; localStorage.setItem('sp_v31_profile', currentProfile); render(); fetchWeather(); }
        function updateProfileIcons() { const ic = masterData[currentProfile].icons; ic.spotify.enabled = document.getElementById('check-spotify').checked; ic.spotify.url = document.getElementById('url-spotify').value; ic.server.enabled = document.getElementById('check-server').checked; ic.server.url = document.getElementById('url-server').value; ic.music.enabled = document.getElementById('check-music').checked; ic.music.url = document.getElementById('url-music').value; ic.yamaha.enabled = document.getElementById('check-yamaha').checked; ic.yamaha.url = document.getElementById('url-yamaha').value; render(); }
        function save() { localStorage.setItem('sp_v31_master', JSON.stringify(masterData)); }
        function toggleWeatherVis() { weatherVisible = !weatherVisible; localStorage.setItem('sp_v31_w_vis', weatherVisible); render(); fetchWeather(); }

        async function fetchWeather() { if(!weatherVisible || !weatherLocs.length) return; const loc = weatherLocs[weatherIdx]; try { const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&daily=weathercode,temperature_2m_max&timezone=auto`); const data = await res.json(); const row = document.getElementById('forecast-row'); row.innerHTML = ''; document.getElementById('loc-name').textContent = loc.name; const icons = {0:'fa-sun',1:'fa-cloud-sun',3:'fa-cloud',61:'fa-cloud-rain'}; data.daily.time.slice(0,5).forEach((d,i)=>{ row.innerHTML += `<div class="forecast-day"><span class="day-name">${new Date(d).toLocaleDateString('en',{weekday:'short'})}</span><i class="fa-solid ${icons[data.daily.weathercode[i]]||'fa-cloud'}"></i><span class="day-temp">${Math.round(data.daily.temperature_2m_max[i])}°</span></div>`; }); } catch(e){} }

        render(); fetchWeather();
    </script>
</body>
</html>
