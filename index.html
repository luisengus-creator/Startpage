<script>
    // --- 1. CONFIGURATION & UNIQUE KEYS ---
    // Change 'v1' to 'v2' if you ever want to force a total reset
    const ID = "my_dashboard_v31_"; 
    const weatherIcons = { 0: "fa-sun", 1: "fa-cloud-sun", 2: "fa-cloud-sun", 3: "fa-cloud", 45: "fa-smog", 51: "fa-cloud-rain", 61: "fa-cloud-showers-heavy", 71: "fa-snowflake", 95: "fa-cloud-bolt" };

    // --- 2. HARDCODED DEFAULTS (The "Always-Works" fallback) ---
    const DEFAULTS = {
        weatherVisible: true,
        weatherLocs: [{name: "Odivelas", lat: 38.79, lon: -9.18}], // Default City
        showFullMesh: true,
        showColGrad: true,
        gradOpacity: 0.3,
        currentProfile: 'home',
        masterData: {
            home: { 
                data: [{title:"Social", color:"#00d4ff", links:[]}], 
                theme: {bg:"#050505"}, 
                ql: { 
                    spotify:{vis:true, label:"Spotify", url:"https://open.spotify.com"}, // Icons ON by default
                    server:{vis:false, label:"", url:""}, 
                    music:{vis:false, label:"", url:""}, 
                    avr:{vis:false, label:"", url:""} 
                } 
            },
            work: { 
                data: [{title:"Work", color:"#3498db", links:[]}], 
                theme: {bg:"#080808"}, 
                ql: { spotify:{vis:false,label:"",url:""}, server:{vis:false,label:"",url:""}, music:{vis:false,label:"",url:""}, avr:{vis:false,label:"",url:""} } 
            }
        }
    };

    // --- 3. ROBUST LOADING LOGIC ---
    let weatherVisible = JSON.parse(localStorage.getItem(ID + 'w_vis')) ?? DEFAULTS.weatherVisible;
    let weatherLocs = JSON.parse(localStorage.getItem(ID + 'weather')) || DEFAULTS.weatherLocs;
    let showFullMesh = JSON.parse(localStorage.getItem(ID + 'fullmesh')) ?? DEFAULTS.showFullMesh;
    let showColGrad = JSON.parse(localStorage.getItem(ID + 'colgrad')) ?? DEFAULTS.showColGrad;
    let gradOpacity = localStorage.getItem(ID + 'grad_op') || DEFAULTS.gradOpacity;
    let currentProfile = localStorage.getItem(ID + 'profile') || DEFAULTS.currentProfile;
    let masterData = JSON.parse(localStorage.getItem(ID + 'master')) || DEFAULTS.masterData;
    let weatherIdx = 0;

    // --- 4. THE CORE FUNCTIONS ---
    function render() {
        const grid = document.getElementById('grid');
        const colSel = document.getElementById('col-select');
        const currentSelVal = colSel.value;
        grid.innerHTML = ''; colSel.innerHTML = '';
        
        const profile = masterData[currentProfile] || DEFAULTS.masterData.home;
        document.documentElement.style.setProperty('--grad-opacity', gradOpacity);
        document.body.style.backgroundColor = profile.theme.bg;

        const colors = [];
        profile.data.forEach((col, cIdx) => {
            const color = col.color || "#00d4ff"; colors.push(color);
            const colDiv = document.createElement('div'); colDiv.className = 'column';
            colDiv.innerHTML = `<div class="column-bg ${showColGrad ? 'visible' : ''}" style="background: linear-gradient(to bottom, ${color} 0%, transparent 100%)"></div>
            <div class="category-header" style="border-bottom:1px solid ${color}44"><h2 class="category-title" style="color:${color}">${col.title}</h2><span class="del-btn" onclick="deleteCol(${cIdx})">DELETE</span></div>`;
            col.links.forEach((l, lIdx) => { colDiv.innerHTML += `<div><a href="${l.url}" class="link-card" style="color:${l.color || '#fff'}">${l.name}</a><span class="del-btn" onclick="deleteLink(${cIdx},${lIdx})">✕</span></div>`; });
            grid.appendChild(colDiv);
            colSel.innerHTML += `<option value="${cIdx}">${col.title}</option>`;
        });

        const fullBgEl = document.getElementById('full-bg');
        if (showFullMesh && colors.length > 0) {
            fullBgEl.style.background = colors.length > 1 ? `linear-gradient(135deg, ${colors.join(', ')})` : `radial-gradient(circle at top, ${colors[0]}, transparent)`;
            fullBgEl.style.opacity = gradOpacity;
        } else {
            fullBgEl.style.background = 'transparent';
            fullBgEl.style.opacity = '0';
        }

        ['spotify', 'server', 'music', 'avr'].forEach(k => {
            const q = profile.ql[k] || {vis:false, label:"", url:""};
            const el = document.getElementById(`ql-${k}`);
            if(el){ 
                el.href = q.url || "#"; 
                el.textContent = q.label || k.toUpperCase(); 
                el.className = q.vis ? 'text-btn' : 'text-btn ql-hidden';
                document.getElementById(`ql-vis-${k}`).checked = q.vis;
                document.getElementById(`ql-label-${k}`).value = q.label || "";
                document.getElementById(`ql-url-${k}`).value = q.url || "";
            }
        });

        document.getElementById('weather-container').className = weatherVisible ? 'visible' : '';
        document.getElementById('weather-vis-check').checked = weatherVisible;
        document.getElementById('check-full-bg').checked = showFullMesh;
        document.getElementById('check-col-bg').checked = showColGrad;
        document.getElementById('grad-opacity-range').value = gradOpacity;
        document.getElementById('color-bg').value = profile.theme.bg;
        document.getElementById('profile-switcher').textContent = currentProfile;
        
        if(currentSelVal !== "" && colSel.options[currentSelVal]) colSel.value = currentSelVal;
        save();
    }

    async function fetchWeather() { 
        if(!weatherVisible || !weatherLocs.length) return; 
        const loc = weatherLocs[weatherIdx]; if(!loc) return;
        document.getElementById('loc-name').textContent = loc.name; 
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&daily=weathercode,temperature_2m_max&timezone=auto`); 
            const data = await res.json(); 
            const row = document.getElementById('forecast-row'); row.innerHTML = '';
            data.daily.time.slice(0, 5).forEach((d, i) => { 
                const icon = weatherIcons[data.daily.weathercode[i]] || "fa-sun";
                row.innerHTML += `<div class="forecast-day"><span class="day-name">${new Date(d).toLocaleDateString('en',{weekday:'short'})}</span><i class="fa-solid ${icon} weather-icon"></i><span class="day-temp">${Math.round(data.daily.temperature_2m_max[i])}°</span></div>`; 
            }); 
        } catch (e) { console.error("Weather API failed", e); }
    }

    function save() {
        localStorage.setItem(ID + 'master', JSON.stringify(masterData));
        localStorage.setItem(ID + 'weather', JSON.stringify(weatherLocs));
        localStorage.setItem(ID + 'w_vis', weatherVisible);
        localStorage.setItem(ID + 'fullmesh', showFullMesh);
        localStorage.setItem(ID + 'colgrad', showColGrad);
        localStorage.setItem(ID + 'grad_op', gradOpacity);
        localStorage.setItem(ID + 'profile', currentProfile);
    }

    // Helper functions (kept from original)
    async function searchCities() {
        const query = document.getElementById('city-search').value;
        if(!query) return;
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${query}&count=5`);
        const data = await res.json();
        const list = document.getElementById('search-results-list'); list.innerHTML = '';
        if (data.results) {
            data.results.forEach(city => {
                const item = document.createElement('div');
                item.className = 'city-tag'; item.style.cursor='pointer';
                item.innerHTML = `<span>${city.name}, ${city.country}</span> <i class="fa-solid fa-plus"></i>`;
                item.onclick = () => { weatherLocs.push({name: city.name, lat: city.latitude, lon: city.longitude}); save(); fetchWeather(); renderCityList(); list.innerHTML=''; };
                list.appendChild(item);
            });
        }
    }
    function renderCityList() {
        const list = document.getElementById('weather-list'); list.innerHTML = '';
        weatherLocs.forEach((loc, i) => {
            list.innerHTML += `<div class="city-tag"><span>${loc.name}</span><i class="fa-solid fa-trash" onclick="weatherLocs.splice(${i},1); save(); renderCityList(); fetchWeather();" style="cursor:pointer; color:#ff4444;"></i></div>`;
        });
    }
    function updateWeatherVisFromCheck() { weatherVisible = document.getElementById('weather-vis-check').checked; render(); fetchWeather(); }
    function updateBgSettings() { showFullMesh = document.getElementById('check-full-bg').checked; showColGrad = document.getElementById('check-col-bg').checked; render(); }
    function cycleWeather() { if(weatherLocs.length > 1) { weatherIdx = (weatherIdx + 1) % weatherLocs.length; fetchWeather(); } }
    function toggleProfile() { currentProfile = currentProfile === 'home' ? 'work' : 'home'; render(); fetchWeather(); }
    function updateQLSettings() { ['spotify', 'server', 'music', 'avr'].forEach(k => { const q = masterData[currentProfile].ql[k]; q.vis = document.getElementById(`ql-vis-${k}`).checked; q.label = document.getElementById(`ql-label-${k}`).value; q.url = document.getElementById(`ql-url-${k}`).value; }); render(); }
    function updateGradIntensity(v) { gradOpacity = v; render(); }
    function updateMasterTheme() { masterData[currentProfile].theme.bg = document.getElementById('color-bg').value; render(); }
    function liveUpdateHeader() { const colIdx = document.getElementById('col-select').value; if(colIdx === "") return; const col = masterData[currentProfile].data[colIdx]; col.title = document.getElementById('edit-col-title').value; col.color = document.getElementById('edit-col-color').value; render(); }
    function loadCategoryData() { const colIdx = document.getElementById('col-select').value; if(colIdx === "") return; const col = masterData[currentProfile].data[colIdx]; document.getElementById('edit-col-title').value = col.title; document.getElementById('edit-col-color').value = col.color; const list = document.getElementById('category-links-list'); list.innerHTML = ''; col.links.forEach((l, i) => { list.innerHTML += `<div style="display:flex; gap:5px; margin-top:5px;"><input type="text" value="${l.name}" class="small-input" oninput="masterData['${currentProfile}'].data[${colIdx}].links[${i}].name=this.value; render()"><input type="text" value="${l.url}" class="small-input" oninput="masterData['${currentProfile}'].data[${colIdx}].links[${i}].url=this.value; render()"></div>`; }); }
    function toggleModal(id) { document.getElementById(id).style.display = 'block'; document.getElementById('modal-overlay').style.display = 'block'; if(id==='weather-modal') renderCityList(); if(id==='settings-panel') loadCategoryData(); }
    function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('modal-overlay').style.display = 'none'; }
    function toggleEditMode() { document.body.classList.toggle('edit-mode'); }
    function deleteLink(c, l) { masterData[currentProfile].data[c].links.splice(l, 1); render(); }
    function deleteCol(c) { if(confirm("Delete this category?")) { masterData[currentProfile].data.splice(c, 1); render(); } }
    function addNewLink() { const idx = document.getElementById('col-select').value; if(idx !== "") { masterData[currentProfile].data[idx].links.push({name:"", url:""}); render(); loadCategoryData(); } }
    function addFullCategory() { masterData[currentProfile].data.push({title:"New Category", color:"#00d4ff", links:[]}); render(); }
    function exportConfig() { const b = new Blob([JSON.stringify(masterData)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'backup.json'; a.click(); }
    function importConfig(i) { const r = new FileReader(); r.onload = (e) => { masterData = JSON.parse(e.target.result); render(); }; r.readAsText(i.files[0]); }

    render(); fetchWeather();
</script>
