<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --accent: #00d4ff; --bg: #050505; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: white; min-height: 100vh; display: flex; flex-direction: column; }
        
        #full-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; transition: 0.8s; opacity: 0.3; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; flex-grow: 1; width: 100%; box-sizing: border-box; }
        
        /* Top Navigation */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .nav-group { display: flex; gap: 20px; align-items: center; }
        .nav-link { cursor: pointer; font-size: 0.8rem; font-weight: 700; color: #888; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
        .nav-link:hover { color: var(--accent); }

        /* Main Grid */
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .column { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; position: relative; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .link-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .link-row a { color: #eee; text-decoration: none; font-size: 0.95rem; }
        .link-row a:hover { color: var(--accent); }

        /* Weather - Centered at Bottom */
        #weather-area { margin: 40px auto 20px auto; text-align: center; max-width: 800px; }
        #weather-grid { display: flex; gap: 25px; justify-content: center; margin-top: 15px; }
        .weather-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; min-width: 90px; border: 1px solid rgba(255,255,255,0.05); }
        .weather-icon { font-size: 1.5rem; margin: 10px 0; display: block; color: var(--accent); }

        /* Modals */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border-radius: 15px; z-index: 2000; width: 95%; max-width: 500px; border: 1px solid #333; max-height: 85vh; overflow-y: auto; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(5px); }
        
        input, select { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 6px; width: 100%; margin: 8px 0; box-sizing: border-box; }
        button { cursor: pointer; background: var(--accent); border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        
        .ql-edit-row { display: flex; gap: 10px; align-items: center; background: #222; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .del-btn { color: #ff4444; cursor: pointer; font-size: 0.7rem; display: none; }
        .edit-mode .del-btn { display: inline; }
    </style>
</head>
<body>

    <div id="full-bg"></div>
    <div id="overlay" onclick="closeModals()"></div>

    <div class="container">
        <header class="top-bar">
            <div class="nav-group" id="ql-nav">
                <span class="nav-link" onclick="toggleProfile()" id="prof-display">HOME</span>
            </div>
            <div class="nav-group">
                <span class="nav-link" onclick="document.body.classList.toggle('edit-mode')"><i class="fa-solid fa-pen"></i></span>
                <span class="nav-link" onclick="openModal('settings-modal')"><i class="fa-solid fa-gear"></i></span>
            </div>
        </header>

        <main id="grid"></main>

        <section id="weather-area">
            <h3 id="city-name" style="cursor:pointer; opacity: 0.7;" onclick="cycleCity()">---</h3>
            <div id="weather-grid"></div>
        </section>
    </div>

    <div id="settings-modal" class="modal">
        <h2 style="margin-top:0">Dashboard Engine</h2>
        
        <div style="margin-bottom:20px;">
            <label style="font-size:0.8rem; color:var(--accent)">1. QUICK LINKS (TOP LEFT)</label>
            <div id="ql-list-editor" style="margin-top:10px;"></div>
        </div>

        <div style="margin-bottom:20px; border-top:1px solid #333; padding-top:15px;">
            <label style="font-size:0.8rem; color:var(--accent)">2. CATEGORIES & LINKS</label>
            <select id="cat-sel" onchange="syncPanel()"></select>
            <div style="display:flex; gap:10px;">
                <input type="text" id="cat-title" oninput="updateCat()" placeholder="Title">
                <input type="color" id="cat-color" oninput="updateCat()" style="width:60px;">
            </div>
            <button onclick="addLink()">+ Add Link to Category</button>
            <button style="background:#222; color:white" onclick="addCat()">+ Create New Category</button>
        </div>
        
        <div style="margin-bottom:20px; border-top:1px solid #333; padding-top:15px;">
            <label style="font-size:0.8rem; color:var(--accent)">3. VISUALS</label>
            <input type="range" id="op-slide" min="0" max="1" step="0.1" oninput="updateVis()">
            <label><input type="checkbox" id="mesh-check" onchange="updateVis()"> Mesh Background</label>
        </div>
        
        <div style="display:flex; gap:10px;">
            <button style="background:#333; color:white;" onclick="openModal('weather-modal')">Weather</button>
            <button style="background:#333; color:white;" onclick="exportData()">Backup</button>
        </div>
    </div>

    <div id="weather-modal" class="modal">
        <h3>Weather Search</h3>
        <input type="text" placeholder="Type city name..." oninput="searchCity(this.value)">
        <div id="search-res" style="max-height: 200px; overflow-y: auto;"></div>
        <button onclick="openModal('settings-modal')">Back to Settings</button>
    </div>

<script>
    const KEY = "STABLE_V7_FINAL";
    const W_ICONS = { 0: "fa-sun", 1: "fa-cloud-sun", 2: "fa-cloud-sun", 3: "fa-cloud", 45: "fa-smog", 51: "fa-cloud-rain", 61: "fa-cloud-showers-heavy", 95: "fa-bolt" };

    let state = JSON.parse(localStorage.getItem(KEY)) || {
        profile: 'home',
        opacity: 0.3,
        mesh: true,
        cities: [{name: "Odivelas", lat: 38.79, lon: -9.18}],
        home: { 
            ql: [{name: "SPOTIFY", url: "#", vis: true}, {name: "SERVER", url: "#", vis: false}],
            categories: [{title: "Social", color: "#00d4ff", links: [{name: "YouTube", url: "https://youtube.com"}]}] 
        },
        work: { 
            ql: [{name: "SERVER", url: "#", vis: true}],
            categories: [{title: "Work", color: "#3498db", links: []}] 
        }
    };

    let cityIdx = 0;

    function save() {
        localStorage.setItem(KEY, JSON.stringify(state));
        render();
    }

    function render() {
        const p = state[state.profile];
        const grid = document.getElementById('grid');
        const qlNav = document.getElementById('ql-nav');
        
        document.getElementById('prof-display').textContent = state.profile.toUpperCase();
        
        // Render Top Left Quicklinks
        const qlHtml = p.ql.filter(l => l.vis).map(l => `<a href="${l.url}" class="nav-link" target="_blank">${l.name}</a>`).join('');
        qlNav.innerHTML = `<span class="nav-link" onclick="toggleProfile()">${state.profile.toUpperCase()}</span>` + qlHtml;

        // Render Grid
        grid.innerHTML = p.categories.map((c, ci) => `
            <div class="column">
                <div style="position:absolute; inset:0; background:linear-gradient(${c.color}33, transparent); opacity:${state.mesh ? state.opacity : 0}; z-index:-1; border-radius:12px;"></div>
                <h3 style="color:${c.color}; margin:0 0 15px 0; border-bottom: 1px solid ${c.color}33; padding-bottom:5px;">${c.title} <span class="del-btn" onclick="delCat(${ci})"> (DEL)</span></h3>
                ${c.links.map((l, li) => `
                    <div class="link-row">
                        <a href="${l.url}" target="_blank">${l.name}</a>
                        <span class="del-btn" onclick="delLink(${ci},${li})"> ✕</span>
                    </div>
                `).join('')}
            </div>
        `).join('');

        // Visuals
        const bg = document.getElementById('full-bg');
        if(state.mesh) {
            const cols = p.categories.map(x => x.color);
            bg.style.background = cols.length > 1 ? `linear-gradient(135deg, ${cols.join(',')})` : (cols[0] || '#050505');
            bg.style.opacity = state.opacity;
        } else { bg.style.opacity = 0; }
    }

    // --- LOGIC ---
    function toggleProfile() { state.profile = state.profile === 'home' ? 'work' : 'home'; save(); updateWeather(); }

    function syncPanel() {
        const p = state[state.profile];
        const sel = document.getElementById('cat-sel');
        sel.innerHTML = p.categories.map((c, i) => `<option value="${i}">${c.title}</option>`).join('');
        
        const idx = sel.value;
        if(idx !== "" && p.categories[idx]) {
            document.getElementById('cat-title').value = p.categories[idx].title;
            document.getElementById('cat-color').value = p.categories[idx].color;
        }

        // Quicklink Editor
        document.getElementById('ql-list-editor').innerHTML = p.ql.map((l, i) => `
            <div class="ql-edit-row">
                <input type="checkbox" ${l.vis ? 'checked' : ''} onchange="updateQl(${i},'vis',this.checked)" style="width:20px;">
                <input type="text" value="${l.name}" oninput="updateQl(${i},'name',this.value)" placeholder="Name">
                <input type="text" value="${l.url}" oninput="updateQl(${i},'url',this.value)" placeholder="URL">
            </div>
        `).join('');

        document.getElementById('op-slide').value = state.opacity;
        document.getElementById('mesh-check').checked = state.mesh;
    }

    function updateQl(i, key, val) { state[state.profile].ql[i][key] = val; save(); }
    function updateCat() {
        const idx = document.getElementById('cat-sel').value;
        if(idx === "") return;
        state[state.profile].categories[idx].title = document.getElementById('cat-title').value;
        state[state.profile].categories[idx].color = document.getElementById('cat-color').value;
        save();
    }
    function updateVis() { state.opacity = document.getElementById('op-slide').value; state.mesh = document.getElementById('mesh-check').checked; save(); }

    function addCat() { state[state.profile].categories.push({title:"New", color:"#00d4ff", links:[]}); save(); syncPanel(); }
    function delCat(i) { if(confirm("Delete?")) { state[state.profile].categories.splice(i,1); save(); syncPanel(); } }
    
    function addLink() {
        const idx = document.getElementById('cat-sel').value;
        const n = prompt("Name:"); const u = prompt("URL:");
        if(n && u) { state[state.profile].categories[idx].links.push({name:n, url:u}); save(); }
    }
    function delLink(ci, li) { state[state.profile].categories[ci].links.splice(li,1); save(); }

    async function updateWeather() {
        const city = state.cities[cityIdx];
        if(!city) return;
        document.getElementById('city-name').textContent = city.name.toUpperCase();
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&daily=weathercode,temperature_2m_max&timezone=auto`);
            const d = await r.json();
            document.getElementById('weather-grid').innerHTML = d.daily.time.slice(0,5).map((t, i) => {
                const code = d.daily.weathercode[i];
                const icon = W_ICONS[code] || "fa-cloud";
                return `
                <div class="weather-card">
                    <div style="font-size:0.7rem; opacity:0.6;">${new Date(t).toLocaleDateString('en',{weekday:'short'})}</div>
                    <i class="fa-solid ${icon} weather-icon"></i>
                    <div style="font-weight:bold; font-size:1.1rem;">${Math.round(d.daily.temperature_2m_max[i])}°</div>
                </div>`;
            }).join('');
        } catch(e) {}
    }

    function cycleCity() { if(state.cities.length > 1) { cityIdx = (cityIdx + 1) % state.cities.length; updateWeather(); } }

    async function searchCity(v) {
        if(v.length < 3) return;
        const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${v}&count=5`);
        const d = await r.json();
        document.getElementById('search-res').innerHTML = (d.results || []).map(res => `
            <div onclick="addCity('${res.name}',${res.latitude},${res.longitude})" style="background:#222; padding:10px; margin:5px 0; cursor:pointer; border-radius:5px;">${res.name}, ${res.country_code}</div>
        `).join('');
    }

    function addCity(n, la, lo) { state.cities.push({name:n, lat:la, lon:lo}); document.getElementById('search-res').innerHTML=''; save(); updateWeather(); }

    function openModal(id) { closeModals(); document.getElementById(id).style.display='block'; document.getElementById('overlay').style.display='block'; if(id==='settings-modal') syncPanel(); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('overlay').style.display='none'; }
    function exportData() {
        const b = new Blob([JSON.stringify(state)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download='backup.json'; a.click();
    }

    window.onload = () => { render(); updateWeather(); };
</script>
</body>
</html>
