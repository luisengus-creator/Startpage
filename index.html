<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --grad-opacity: 0.3; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #050505; color: white; overflow-x: hidden; transition: background 0.5s; }
        #full-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; transition: opacity 0.5s; pointer-events: none; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        #grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 40px; }
        .column { position: relative; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 12px; min-height: 200px; overflow: hidden; }
        .column-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s; z-index: -1; }
        .column-bg.visible { opacity: var(--grad-opacity); }
        .category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 5px; }
        .category-title { margin: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        .link-card { display: block; padding: 8px 0; text-decoration: none; font-size: 1rem; transition: transform 0.2s; opacity: 0.8; }
        .link-card:hover { transform: translateX(5px); opacity: 1; }
        .del-btn { color: #ff4444; cursor: pointer; font-size: 0.8rem; opacity: 0; transition: opacity 0.2s; }
        .edit-mode .del-btn { opacity: 1; }
        
        #weather-container { margin-bottom: 20px; opacity: 0; transition: opacity 0.5s; display: none; }
        #weather-container.visible { opacity: 1; display: block; }
        #forecast-row { display: flex; gap: 15px; }
        .forecast-day { text-align: center; }
        .weather-icon { font-size: 1.5rem; margin: 10px 0; display: block; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .quick-links { display: flex; gap: 15px; }
        .text-btn { text-decoration: none; color: white; font-size: 0.9rem; opacity: 0.6; transition: 0.3s; cursor: pointer; }
        .text-btn:hover { opacity: 1; }
        .ql-hidden { display: none; }
        
        /* Modals & UI */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 30px; border-radius: 15px; z-index: 1000; width: 90%; max-width: 500px; border: 1px solid #333; }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
        input, select { background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; width: 100%; box-sizing: border-box; margin: 10px 0; }
        .city-tag { background: #333; padding: 5px 10px; border-radius: 15px; display: inline-flex; align-items: center; gap: 8px; margin: 5px; }
    </style>
</head>
<body>

    <div id="full-bg"></div>
    <div id="modal-overlay" onclick="closeAllModals()"></div>

    <div class="container">
        <div class="top-bar">
            <div class="quick-links">
                <span class="text-btn" onclick="toggleProfile()" id="profile-switcher">HOME</span>
                <a id="ql-spotify" class="text-btn">SPOTIFY</a>
                <a id="ql-server" class="text-btn">SERVER</a>
                <a id="ql-music" class="text-btn">MUSIC</a>
                <a id="ql-avr" class="text-btn">AVR</a>
            </div>
            <div class="quick-links">
                <span class="text-btn" onclick="toggleEditMode()"><i class="fa-solid fa-pen"></i></span>
                <span class="text-btn" onclick="toggleModal('settings-panel')"><i class="fa-solid fa-gear"></i></span>
            </div>
        </div>

        <div id="weather-container">
            <h3 id="loc-name" style="margin: 20px 0 10px 0; cursor: pointer;" onclick="cycleWeather()">Loading...</h3>
            <div id="forecast-row"></div>
        </div>

        <div id="grid"></div>
    </div>

    <div id="settings-panel" class="modal">
        <h3>Dashboard Engine</h3>
        <label>Category Settings</label>
        <select id="col-select" onchange="loadCategoryData()"></select>
        <input type="text" id="edit-col-title" placeholder="Title" oninput="liveUpdateHeader()">
        <input type="color" id="edit-col-color" oninput="liveUpdateHeader()">
        
        <div id="category-links-list"></div>
        <button onclick="addNewLink()" style="width:100%; padding:5px; margin-top:10px; cursor:pointer;">+ Add Link</button>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        
        <label><input type="checkbox" id="check-full-bg" onchange="updateBgSettings()"> Full Mesh Background</label><br>
        <label><input type="checkbox" id="check-col-bg" onchange="updateBgSettings()"> Column Gradients</label>
        <input type="range" id="grad-opacity-range" min="0" max="1" step="0.1" oninput="updateGradIntensity(this.value)">
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button onclick="exportConfig()">Backup</button>
            <button onclick="document.getElementById('import-file').click()">Restore</button>
            <button onclick="toggleModal('weather-modal')">Weather</button>
            <button onclick="addFullCategory()">+ New Cat</button>
        </div>
        <input type="file" id="import-file" style="display:none" onchange="importConfig(this)">
    </div>

    <div id="weather-modal" class="modal">
        <h3>Weather Settings</h3>
        <input type="text" id="city-search" placeholder="Search city..." oninput="searchCities()">
        <div id="search-results-list"></div>
        <div id="weather-list" style="margin-top:20px;"></div>
        <label style="margin-top:20px; display:block;"><input type="checkbox" id="weather-vis-check" onchange="updateWeatherVisFromCheck()"> Show Weather</label>
    </div>

<script>
    // --- 1. UNIQUE KEY AND DEFAULTS ---
    const STORAGE_KEY = "DASHBOARD_STRICT_PERSIST_V3";
    
    const DEFAULTS = {
        weatherVisible: true,
        weatherLocs: [{name: "Odivelas", lat: 38.79, lon: -9.18}],
        showFullMesh: true,
        showColGrad: true,
        gradOpacity: 0.3,
        currentProfile: 'home',
        masterData: {
            home: { 
                data: [{title:"Social", color:"#00d4ff", links:[{name:"YouTube", url:"https://youtube.com"}]}], 
                theme: {bg:"#050505"}, 
                ql: { 
                    spotify:{vis:true, label:"SPOTIFY", url:"#"}, 
                    server:{vis:false, label:"SERVER", url:"#"}, 
                    music:{vis:false, label:"MUSIC", url:"#"}, 
                    avr:{vis:false, label:"AVR", url:"#"} 
                } 
            },
            work: { 
                data: [{title:"Work", color:"#3498db", links:[]}], 
                theme: {bg:"#080808"}, 
                ql: { spotify:{vis:false,label:"",url:""}, server:{vis:false,label:"",url:""}, music:{vis:false,label:"",url:""}, avr:{vis:false,label:"",url:""} } 
            }
        }
    };

    // --- 2. STATE INITIALIZATION ---
    let state = {};
    function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                state = JSON.parse(saved);
            } catch (e) {
                console.error("Storage corrupted, loading defaults");
                state = {...DEFAULTS};
            }
        } else {
            state = {...DEFAULTS};
        }
    }
    loadState();

    // Mapping state to local variables for easier access
    let weatherIdx = 0;
    const weatherIcons = { 0: "fa-sun", 1: "fa-cloud-sun", 2: "fa-cloud-sun", 3: "fa-cloud", 45: "fa-smog", 51: "fa-cloud-rain", 61: "fa-cloud-showers-heavy", 71: "fa-snowflake", 95: "fa-cloud-bolt" };

    // --- 3. CORE FUNCTIONS ---
    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function render() {
        const grid = document.getElementById('grid');
        const colSel = document.getElementById('col-select');
        const currentSelVal = colSel.value;
        grid.innerHTML = ''; colSel.innerHTML = '';
        
        const profile = state.masterData[state.currentProfile];
        document.documentElement.style.setProperty('--grad-opacity', state.gradOpacity);
        document.body.style.backgroundColor = profile.theme.bg;

        const colors = [];
        profile.data.forEach((col, cIdx) => {
            const color = col.color || "#00d4ff"; colors.push(color);
            const colDiv = document.createElement('div'); colDiv.className = 'column';
            colDiv.innerHTML = `<div class="column-bg ${state.showColGrad ? 'visible' : ''}" style="background: linear-gradient(to bottom, ${color} 0%, transparent 100%)"></div>
            <div class="category-header" style="border-bottom:1px solid ${color}44"><h2 class="category-title" style="color:${color}">${col.title}</h2><span class="del-btn" onclick="deleteCol(${cIdx})">DELETE</span></div>`;
            col.links.forEach((l, lIdx) => { 
                colDiv.innerHTML += `<div style="position:relative;"><a href="${l.url}" class="link-card">${l.name || 'New Link'}</a><span class="del-btn" onclick="deleteLink(${cIdx},${lIdx})" style="position:absolute; right:0; top:8px;">✕</span></div>`; 
            });
            grid.appendChild(colDiv);
            colSel.innerHTML += `<option value="${cIdx}">${col.title}</option>`;
        });

        const fullBgEl = document.getElementById('full-bg');
        if (state.showFullMesh && colors.length > 0) {
            fullBgEl.style.background = colors.length > 1 ? `linear-gradient(135deg, ${colors.join(', ')})` : `radial-gradient(circle at top, ${colors[0]}, transparent)`;
            fullBgEl.style.opacity = state.gradOpacity;
        } else {
            fullBgEl.style.opacity = '0';
        }

        ['spotify', 'server', 'music', 'avr'].forEach(k => {
            const q = profile.ql[k];
            const el = document.getElementById(`ql-${k}`);
            if(el) {
                el.href = q.url;
                el.textContent = q.label || k.toUpperCase();
                el.className = q.vis ? 'text-btn' : 'text-btn ql-hidden';
            }
        });

        document.getElementById('weather-container').className = state.weatherVisible ? 'visible' : '';
        document.getElementById('profile-switcher').textContent = state.currentProfile.toUpperCase();
        if(currentSelVal !== "" && colSel.options[currentSelVal]) colSel.value = currentSelVal;
    }

    async function fetchWeather() { 
        if(!state.weatherVisible || !state.weatherLocs.length) return; 
        const loc = state.weatherLocs[weatherIdx];
        document.getElementById('loc-name').textContent = loc.name; 
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&daily=weathercode,temperature_2m_max&timezone=auto`); 
            const data = await res.json(); 
            const row = document.getElementById('forecast-row'); row.innerHTML = '';
            data.daily.time.slice(0, 5).forEach((d, i) => { 
                const icon = weatherIcons[data.daily.weathercode[i]] || "fa-sun";
                row.innerHTML += `<div class="forecast-day"><span class="day-name">${new Date(d).toLocaleDateString('en',{weekday:'short'})}</span><i class="fa-solid ${icon} weather-icon"></i><span class="day-temp">${Math.round(data.daily.temperature_2m_max[i])}°</span></div>`; 
            }); 
        } catch (e) { console.error("Weather failed", e); }
    }

    // --- 4. INTERACTION HANDLERS ---
    function toggleEditMode() { document.body.classList.toggle('edit-mode'); }
    function toggleModal(id) { document.getElementById(id).style.display = 'block'; document.getElementById('modal-overlay').style.display = 'block'; if(id==='weather-modal') renderCityList(); if(id==='settings-panel') loadCategoryData(); }
    function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('modal-overlay').style.display = 'none'; }
    
    function toggleProfile() { state.currentProfile = state.currentProfile === 'home' ? 'work' : 'home'; save(); render(); fetchWeather(); }
    function updateBgSettings() { state.showFullMesh = document.getElementById('check-full-bg').checked; state.showColGrad = document.getElementById('check-col-bg').checked; save(); render(); }
    function updateGradIntensity(v) { state.gradOpacity = v; save(); render(); }
    
    function deleteLink(c, l) { state.masterData[state.currentProfile].data[c].links.splice(l, 1); save(); render(); }
    function deleteCol(c) { if(confirm("Delete category?")) { state.masterData[state.currentProfile].data.splice(c, 1); save(); render(); } }
    function addNewLink() { const idx = document.getElementById('col-select').value; if(idx !== "") { state.masterData[state.currentProfile].data[idx].links.push({name:"New", url:"#"}); save(); render(); loadCategoryData(); } }
    function addFullCategory() { state.masterData[state.currentProfile].data.push({title:"New Category", color:"#00d4ff", links:[]}); save(); render(); }

    function liveUpdateHeader() { 
        const colIdx = document.getElementById('col-select').value; 
        if(colIdx === "") return;
        const col = state.masterData[state.currentProfile].data[colIdx];
        col.title = document.getElementById('edit-col-title').value;
        col.color = document.getElementById('edit-col-color').value;
        save(); render(); 
    }

    function loadCategoryData() {
        const colIdx = document.getElementById('col-select').value;
        if(colIdx === "") return;
        const col = state.masterData[state.currentProfile].data[colIdx];
        document.getElementById('edit-col-title').value = col.title;
        document.getElementById('edit-col-color').value = col.color;
    }

    async function searchCities() {
        const query = document.getElementById('city-search').value;
        if(query.length < 2) return;
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${query}&count=5`);
        const data = await res.json();
        const list = document.getElementById('search-results-list'); list.innerHTML = '';
        if (data.results) {
            data.results.forEach(city => {
                const item = document.createElement('div');
                item.className = 'city-tag'; item.style.cursor='pointer';
                item.innerHTML = `<span>${city.name}, ${city.country_code}</span> <i class="fa-solid fa-plus"></i>`;
                item.onclick = () => { state.weatherLocs.push({name: city.name, lat: city.latitude, lon: city.longitude}); save(); renderCityList(); fetchWeather(); };
                list.appendChild(item);
            });
        }
    }

    function renderCityList() {
        const list = document.getElementById('weather-list'); list.innerHTML = '';
        state.weatherLocs.forEach((loc, i) => {
            list.innerHTML += `<div class="city-tag"><span>${loc.name}</span><i class="fa-solid fa-trash" onclick="state.weatherLocs.splice(${i},1); save(); renderCityList(); fetchWeather();" style="cursor:pointer;"></i></div>`;
        });
        document.getElementById('weather-vis-check').checked = state.weatherVisible;
    }

    function updateWeatherVisFromCheck() { state.weatherVisible = document.getElementById('weather-vis-check').checked; save(); render(); fetchWeather(); }
    function cycleWeather() { if(state.weatherLocs.length > 1) { weatherIdx = (weatherIdx + 1) % state.weatherLocs.length; fetchWeather(); } }

    function exportConfig() { 
        const b = new Blob([JSON.stringify(state.masterData)], {type: 'application/json'}); 
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); 
        a.download = 'backup.json'; a.click(); 
    }
    
    function importConfig(i) { 
        const r = new FileReader(); 
        r.onload = (e) => { state.masterData = JSON.parse(e.target.result); save(); render(); }; 
        r.readAsText(i.files[0]); 
    }

    // Initial Run
    render();
    fetchWeather();
</script>
</body>
</html>
