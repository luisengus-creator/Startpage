<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startpage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --bg: #1C1B22; 
            --scale: 1; 
            --fs-unit: calc(1rem * var(--scale));
            --fade-speed: 0.4s;
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); color: white; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; 
            font-size: var(--fs-unit);
            transition: background-color var(--fade-speed) ease;
        }
        #full-bg { 
            position: fixed; inset: 0; z-index: -1; pointer-events: none; 
            background-size: cover; background-position: center; 
            transition: opacity var(--fade-speed) ease, filter var(--fade-speed) ease, background var(--fade-speed) ease;
        }
        .container { width: 100%; height: 100%; margin: 0 auto; padding: 2vh 3vw; display: flex; flex-direction: column; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; z-index: 10; flex-shrink: 0; margin-bottom: 2vh; }
        .nav-group { display: flex; gap: 1.2rem; align-items: center; }
        .nav-link { cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; width: 2.2rem; height: 2.2rem; }
        .nav-link i { font-size: 1.2rem; color: var(--icon-color, #ffffff); transition: 0.3s; }
        .nav-link:hover i { opacity: 0.6; }
        
        #main-content { 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            overflow: hidden; 
            padding: 2vh; 
            /* Fade transition for content area */
            transition: opacity var(--fade-speed) ease;
        }
        .fade-out { opacity: 0; }
        
        #grid { 
            display: flex;
            flex-wrap: wrap;
            gap: calc(2rem * var(--scale));
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 100%;
            transition: gap 0.3s ease;
        }

        .column { 
            background: rgba(255,255,255,0.02); 
            border-radius: calc(14px * var(--scale)); 
            padding: calc(1.5rem * var(--scale)); 
            position: relative; 
            border: 1px solid rgba(255,255,255,0.06); 
            backdrop-filter: blur(12px); 
            text-align: center; 
            flex: 0 1 auto;
            width: fit-content;
            min-width: calc(180px * var(--scale));
            max-width: 90vw;
            transition: all 0.3s ease;
        }

        .cat-controls {
            display: none;
            justify-content: flex-end;
            margin-bottom: 5px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .edit-mode .cat-controls { display: flex; }

        .cat-title { 
            margin: 0 0 calc(1rem * var(--scale)) 0; 
            font-size: calc(1.4rem * var(--scale)); 
            font-weight: 700; 
            padding-bottom: calc(10px * var(--scale)); 
            border-bottom: 2px solid rgba(255,255,255,0.1); 
            white-space: nowrap; 
            cursor: pointer; 
            text-decoration: none; 
            display: block; 
        }
        .cat-title.hidden-header { display: none; }
        
        .link-row { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: calc(0.6rem * var(--scale)) calc(1rem * var(--scale)); 
            border-bottom: 1px solid rgba(255,255,255,0.03); 
            position: relative; 
            gap: 15px;
        }
        .link-row a { 
            text-decoration: none; 
            transition: 0.2s; 
            font-size: calc(1.1rem * var(--scale));
            white-space: nowrap;
        }
        
        .del-btn { 
            display: none; 
            color: #ff4444; 
            cursor: pointer; 
            transition: 0.2s; 
            font-size: 0.75rem;
            padding: 2px; 
            opacity: 0.5;
        }
        .del-btn:hover { color: #ff0000; opacity: 1; transform: scale(1.1); }
        .edit-mode .del-btn { display: inline-block; }

        #weather-area { padding: 1.5vh 0; display: none; flex-direction: column; align-items: center; gap: 0.6rem; z-index: 10; flex-shrink: 0; transition: opacity var(--fade-speed) ease; }
        #city-name { font-size: 0.75rem; opacity: 0.5; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }
        #weather-grid { display: flex; gap: 0.6rem; align-items: center; cursor: pointer; }
        .weather-card { background: rgba(255,255,255,0.03); padding: 0.5rem 0.7rem; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); text-align: center; min-width: 5.5rem; }
        .weather-card i { font-size: 1.1rem; margin: 0.3rem 0; }
        .weather-day-label { font-size: 0.6rem; opacity: 0.5; text-transform: uppercase; }
        .weather-temp { font-weight: bold; font-size: 0.9rem; }
        
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; padding: 2rem; border-radius: 20px; z-index: 2000; width: min(600px, 95vw); max-height: 85vh; overflow-y: auto; border: 1px solid #222; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(5px); }
        .section-h { font-size:0.65rem; color:#00d4ff; font-weight:900; margin: 0 0 1rem 0; text-transform: uppercase; letter-spacing: 1px; }
        .setting-block { margin-bottom: 2.5rem; }
        input, select { background: #111; border: 1px solid #222; color: white; padding: 10px; border-radius: 6px; width: 100%; font-size: 0.85rem; height: 40px; }
        button { cursor: pointer; background: #222; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; color: white; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .ql-row { display: grid; grid-template-columns: 30px 140px 1fr; gap: 10px; align-items: center; margin-bottom: 8px; }
        .color-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 10px 0; font-size: 0.8rem; }
        .color-row input[type="color"], .cat-color-picker { width: 45px; height: 40px; padding: 2px; flex-shrink: 0; border: 1px solid #333; cursor: pointer; }
        .label-inline { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; cursor: pointer; margin-top: 5px; }
        .label-inline input[type="checkbox"] { width: auto; margin: 0; height: auto; }
        .btn-backup { background: #0066ff !important; color: white; margin-top: 0 !important; }
        .btn-import { background: #00cc66 !important; color: white; margin-top: 0 !important; }
        .btn-reset { background: #660000 !important; color: #ffcccc !important; margin-top: 15px !important; }
        .flex-row { display: flex; gap: 10px; }
        .flex-row button { flex: 1; }
        .editor-link-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; width: 100%; }
        .editor-link-row input[type="text"] { flex: 1; }
        .editor-link-row input[type="color"] { width: 40px; height: 40px; cursor: pointer; border: 1px solid #333; }
        .editor-link-row .tiny-del { width: 40px; height: 40px; background: #211; color: #ff4444; border: 1px solid #422; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="full-bg"></div>
    <div id="overlay" onclick="closeModals()"></div>
    <div class="container">
        <header class="top-bar">
            <div class="nav-group" id="ql-nav"></div>
            <div class="nav-group">
                <span class="nav-link" onclick="document.body.classList.toggle('edit-mode')"><i class="fa-solid fa-pen"></i></span>
                <span class="nav-link" onclick="openModal('settings-modal')"><i class="fa-solid fa-gear"></i></span>
            </div>
        </header>
        <main id="main-content"><div id="grid"></div></main>
        <section id="weather-area">
            <span id="city-name" onclick="cycleCity()">---</span>
            <div id="weather-grid" onclick="openModal('weather-modal')"></div>
        </section>
    </div>

    <div id="settings-modal" class="modal">
        <div class="setting-block"><div class="section-h">Navigation</div><select id="target-mode" onchange="updateVisRealtime()"><option value="_self">Current Tab</option><option value="_blank">New Tab</option></select></div>
        <div class="setting-block"><div class="section-h">Quick Links</div><div id="ql-list-editor"></div></div>
        <div class="setting-block">
            <div class="section-h">Categories & Individual Links</div>
            <label class="label-inline" style="margin-bottom: 15px;"><input type="checkbox" id="header-vis-check" onchange="updateVisRealtime()"> Show Category Headers</label>
            <select id="cat-sel" onchange="syncCategoryEditor()" style="margin-bottom:10px;"></select>
            <div style="display:flex; gap:10px; margin-bottom:10px;"><input type="text" id="cat-title" oninput="updateCatRealtime()" placeholder="Title"><input type="color" id="cat-color" oninput="updateCatRealtime()" class="cat-color-picker"></div>
            <div id="link-list-editor" style="border: 1px solid #1a1a1a; padding: 12px; border-radius: 10px; max-height: 250px; overflow-y: auto; background: #050505; margin-bottom: 10px;"></div>
            <div class="flex-row"><button onclick="addCat()">+ Add Category</button><button onclick="addLinkInline()">+ Add Link</button></div>
        </div>
        <div class="setting-block">
            <div class="section-h">Global Appearance</div>
            <div class="color-row"><span>Icon Color</span> <input type="color" id="icon-color-picker" oninput="updateIconColor(this.value)"></div>
            <div class="color-row"><span>Global Links Color</span> <input type="color" id="link-color-picker" oninput="handleGlobalLinkColor(this.value)"></div>
        </div>
        <div class="setting-block">
            <div class="section-h">Weather Options</div>
            <label class="label-inline"><input type="checkbox" id="w-enable-check" onchange="updateVisRealtime()"> Enable Weather Display</label>
            <div class="color-row"><span>Weather Text Color</span> <input type="color" id="weather-color-picker" oninput="updateVisRealtime()"></div>
            <div style="display:flex; gap:15px; margin-top:10px;">
                <label class="label-inline"><input type="checkbox" id="w-colored-check" onchange="toggleWeatherStyle('colored')"> Colored Icons</label>
                <label class="label-inline"><input type="checkbox" id="w-solid-check" onchange="toggleWeatherStyle('solid')"> Solid Icons</label>
            </div>
        </div>
        <div class="setting-block">
            <div class="section-h">Background Options</div>
            <input type="text" id="bg-img-url" placeholder="Paste Image URL here..." oninput="updateBgImg(this.value)" style="margin-bottom:10px;">
            <div class="flex-row"><button onclick="document.getElementById('bg-file').click()">Upload Photo</button><button style="background:#311; color:#f88;" onclick="updateBgImg('')">Remove Photo</button></div>
            <input type="file" id="bg-file" style="display:none" accept="image/*" onchange="handleBgFile(this)">
            <div class="color-row" style="margin-top:15px;"><span>Profile Background Color</span> <input type="color" id="bg-color" oninput="updateVisRealtime()"></div>
            <label class="label-inline"><input type="checkbox" id="mesh-check" onchange="toggleGradientMode(this.checked)"> Gradient Effect</label>
            <div style="margin: 15px 0;"><span id="slider-label" style="font-size: 0.8rem; opacity: 0.8;">Background Opacity</span><input type="range" id="unified-slider" min="0" max="1" step="0.05" oninput="updateVisRealtime()"></div>
        </div>
        <div class="flex-row"><button class="btn-backup" onclick="exportData()">Backup</button><button class="btn-import" onclick="document.getElementById('file-input').click()">Import</button></div>
        <button class="btn-reset" onclick="resetToDefaults()">Reset to Defaults</button>
        <input type="file" id="file-input" style="display:none" onchange="importData(this)">
    </div>

    <div id="weather-modal" class="modal">
        <h3 style="margin:0 0 1rem 0; font-size: 1rem;">Manage Locations</h3>
        <div id="city-list-manager" style="margin-bottom: 1.5rem;"></div>
        <input type="text" placeholder="Search for a city..." oninput="searchCity(this.value)">
        <div id="search-results" style="max-height: 200px; overflow-y: auto; background: #050505; border-radius: 8px;"></div>
        <button onclick="closeModals()">Done</button>
    </div>

<script>
    const KEY = "STARTPAGE_V64_FULL_DYNAMIC";
    const ICON_LIST = ["fa-solid fa-server", "fa-solid fa-sliders", "fa-brands fa-spotify", "fa-solid fa-star", "fa-solid fa-music", "fa-brands fa-github", "fa-solid fa-terminal", "fa-solid fa-code", "fa-solid fa-heart", "fa-solid fa-play"];
    const W_DATA = { 0: { icon: "fa-sun", color: "#FFD700" }, 1: { icon: "fa-cloud-sun", color: "#FFB800" }, 2: { icon: "fa-cloud-sun", color: "#FFB800" }, 3: { icon: "fa-cloud", color: "#B0C4DE" }, 45: { icon: "fa-smog", color: "#778899" }, 51: { icon: "fa-cloud-rain", color: "#00BFFF" }, 61: { icon: "fa-cloud-showers-heavy", color: "#1E90FF" }, 95: { icon: "fa-bolt", color: "#BA55D3" } };

    function generateDefaultCats(count, prefix) {
        const cats = [];
        for(let i=1; i<=count; i++) {
            let links = [];
            for(let j=1; j<=5; j++) links.push({name:`Link ${j}`, url:"#", color: ""});
            cats.push({title:`${prefix} ${i}`, color: prefix === "Work" ? "#ff8800" : "#00d4ff", url: "#", links: links});
        }
        return cats;
    }

    function getDefaults() {
        const baseQl = [{name:"fa-solid fa-server", url:"#", vis:false}, {name:"fa-solid fa-sliders", url:"#", vis:false}, {name:"fa-brands fa-spotify", url:"#", vis:false}, {name:"fa-solid fa-star", url:"#", vis:false}];
        return {
            profile: 'home', target: '_self', wColored: true,
            weatherColor: "#ffffff", linkColor: "#cccccc",
            cities: [{name: "Lisboa", lat: 38.71, lon: -9.13}],
            home: { ql: JSON.parse(JSON.stringify(baseQl)), categories: generateDefaultCats(5, "Category"), showWeather: true, showHeaders: true, iconColor: "#ffffff", bgColor: "#1C1B22", bgImg: "", mesh: true, opacity: 0.3, fuzzy: 0 },
            work: { ql: JSON.parse(JSON.stringify(baseQl)), categories: generateDefaultCats(3, "Work"), showWeather: true, showHeaders: true, iconColor: "#ffffff", bgColor: "#1C1B22", bgImg: "", mesh: true, opacity: 0.3, fuzzy: 0 }
        };
    }

    let state = JSON.parse(localStorage.getItem(KEY)) || getDefaults();
    let cityIdx = 0;

    function applyDynamicScaling() {
        const p = state[state.profile];
        const catCount = p.categories.length;
        const totalLinks = p.categories.reduce((acc, cat) => acc + cat.links.length, 0);
        
        let scale = 1.0;
        // Dynamic multiplier based on quantity + available space (weather factor)
        const spaceFactor = p.showWeather ? 0.85 : 1.0;
        
        if (catCount === 1) {
            scale = totalLinks < 4 ? 2.6 : 2.1;
        } else if (catCount === 2) {
            scale = 1.8;
        } else if (catCount <= 4) {
            scale = 1.35;
        } else if (catCount <= 6) {
            scale = 1.1;
        } else {
            scale = 0.9;
        }

        document.documentElement.style.setProperty('--scale', scale * spaceFactor);
    }

    function handleBgFile(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas'); const MAX_WIDTH = 1920; 
                let width = img.width, height = img.height;
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                updateBgImg(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function updateIconColor(val) { state[state.profile].iconColor = val; saveAndRender(); }
    function handleGlobalLinkColor(val) {
        state.linkColor = val;
        state[state.profile].categories.forEach(cat => { cat.links.forEach(link => { link.color = val; }); });
        saveAndRender(); syncCategoryEditor();
    }
    function toggleGradientMode(checked) { const p = state[state.profile]; p.mesh = checked; if(checked) p.bgImg = ""; saveAndRender(); renderSettings(); }
    function updateBgImg(val) { const p = state[state.profile]; p.bgImg = val; if(val) p.mesh = false; saveAndRender(); renderSettings(); }
    function toggleWeatherStyle(type) {
        if(type === 'colored') { state.wColored = true; document.getElementById('w-solid-check').checked = false; }
        else { state.wColored = false; document.getElementById('w-colored-check').checked = false; }
        updateVisRealtime();
    }

    function saveAndRender(refreshModal = false) {
        localStorage.setItem(KEY, JSON.stringify(state));
        applyDynamicScaling();
        const p = state[state.profile];
        document.body.style.backgroundColor = p.bgColor;
        document.documentElement.style.setProperty('--icon-color', p.iconColor);
        const bg = document.getElementById('full-bg');
        if (p.bgImg) { bg.style.backgroundImage = `url(${p.bgImg})`; bg.style.opacity = 1; bg.style.filter = `blur(${p.fuzzy || 0}px)`; } 
        else if (p.mesh) {
            const cols = p.categories.map(x => x.color);
            bg.style.backgroundImage = "none"; bg.style.background = cols.length > 1 ? `linear-gradient(135deg, ${cols.join(',')})` : (cols[0] || p.bgColor); bg.style.opacity = p.opacity; bg.style.filter = "none";
        } else { bg.style.backgroundImage = "none"; bg.style.background = "none"; bg.style.opacity = 0; }
        const profileIcon = state.profile === 'home' ? 'fa-house' : 'fa-user-tie';
        const qlHtml = p.ql.filter(l => l.vis).map(l => `<a href="${l.url}" class="nav-link active" target="${state.target}"><i class="${l.name}"></i></a>`).join('');
        document.getElementById('ql-nav').innerHTML = `<span class="nav-link active" onclick="toggleProfile()"><i class="fa-solid ${profileIcon}"></i></span>` + qlHtml;
        document.getElementById('grid').innerHTML = p.categories.map((c, ci) => `
            <div class="column">
                <div style="position:absolute; inset:0; background:linear-gradient(${c.color}22, transparent); opacity:0.3; z-index:-1; border-radius:inherit;"></div>
                <div class="cat-controls"><i class="fa-solid fa-trash-can del-btn" onclick="delCat(${ci})"></i></div>
                <div class="cat-title ${p.showHeaders ? '' : 'hidden-header'}" style="color:${c.color};">
                    <a href="${c.url || '#'}" target="${state.target}" style="color:inherit; text-decoration:none;">${c.title}</a>
                </div>
                ${c.links.map((l, li) => `<div class="link-row"><a href="${l.url}" target="${state.target}" style="color:${l.color || state.linkColor}">${l.name}</a><i class="fa-solid fa-trash-can del-btn" onclick="delLink(${ci},${li})"></i></div>`).join('')}
            </div>`).join('');
        document.getElementById('weather-area').style.display = p.showWeather ? 'flex' : 'none';
        if(refreshModal) syncCategoryEditor();
    }

    function toggleProfile() {
        const main = document.getElementById('main-content');
        const weather = document.getElementById('weather-area');
        main.classList.add('fade-out');
        weather.classList.add('fade-out');
        
        setTimeout(() => {
            state.profile = (state.profile === 'home' ? 'work' : 'home');
            saveAndRender();
            updateWeather();
            main.classList.remove('fade-out');
            weather.classList.remove('fade-out');
        }, 300);
    }

    function renderSettings() {
        const p = state[state.profile];
        const slider = document.getElementById('unified-slider');
        const label = document.getElementById('slider-label');
        if (p.bgImg) { label.textContent = "Photo Fuzzy Intensity"; slider.min = 0; slider.max = 30; slider.step = 1; slider.value = p.fuzzy || 0; } 
        else { label.textContent = "Gradient Opacity"; slider.min = 0; slider.max = 1; slider.step = 0.05; slider.value = p.opacity; }
        document.getElementById('cat-sel').innerHTML = p.categories.map((c, i) => `<option value="${i}">${c.title}</option>`).join('');
        document.getElementById('ql-list-editor').innerHTML = p.ql.map((l, i) => `<div class="ql-row"><input type="checkbox" ${l.vis ? 'checked' : ''} onchange="updateQlRealtime(${i},'vis',this.checked)"><select onchange="updateQlRealtime(${i},'name',this.value)" style="margin:0;">${ICON_LIST.map(ic => `<option value="${ic}" ${l.name === ic ? 'selected' : ''}>${ic.split('-').pop()}</option>`).join('')}</select><input type="text" value="${l.url}" oninput="updateQlRealtime(${i},'url',this.value)" style="margin:0;"></div>`).join('');
        document.getElementById('target-mode').value = state.target;
        document.getElementById('bg-img-url').value = p.bgImg.startsWith('data:') ? "Local Image Active" : p.bgImg;
        document.getElementById('mesh-check').checked = p.mesh;
        document.getElementById('bg-color').value = p.bgColor;
        document.getElementById('icon-color-picker').value = p.iconColor;
        document.getElementById('link-color-picker').value = state.linkColor;
        document.getElementById('weather-color-picker').value = state.weatherColor;
        document.getElementById('w-enable-check').checked = p.showWeather;
        document.getElementById('w-colored-check').checked = state.wColored;
        document.getElementById('w-solid-check').checked = !state.wColored;
        document.getElementById('header-vis-check').checked = (p.showHeaders !== false);
        syncCategoryEditor();
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; document.getElementById('overlay').style.display = 'block'; if(id === 'settings-modal') renderSettings(); if(id === 'weather-modal') renderCityManager(); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('overlay').style.display='none'; }
    function renderCityManager() { document.getElementById('city-list-manager').innerHTML = state.cities.map((c, i) => `<div class="city-item"><span>${c.name}</span><i class="fa-solid fa-trash-can" onclick="removeCity(${i})"></i></div>`).join(''); }
    async function searchCity(q) {
        if(q.length < 3) { document.getElementById('search-results').innerHTML = ''; return; }
        const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${q}&count=5&language=en&format=json`);
        const d = await r.json();
        document.getElementById('search-results').innerHTML = (d.results || []).map(c => `<div class="search-item" onclick="addCity('${c.name}', ${c.latitude}, ${c.longitude})">${c.name}, ${c.admin1 || ''} (${c.country_code})</div>`).join('');
    }

    function addCity(name, lat, lon) { state.cities.push({name, lat, lon}); document.getElementById('search-results').innerHTML = ''; renderCityManager(); saveAndRender(); updateWeather(); }
    function removeCity(i) { if(state.cities.length > 1) { state.cities.splice(i, 1); cityIdx = 0; renderCityManager(); saveAndRender(); updateWeather(); } }
    function cycleCity() { cityIdx = (cityIdx + 1) % state.cities.length; updateWeather(); }

    function syncCategoryEditor() {
        const p = state[state.profile], idx = document.getElementById('cat-sel').value;
        if(idx !== "" && p.categories[idx]) {
            const c = p.categories[idx];
            document.getElementById('cat-title').value = c.title; document.getElementById('cat-color').value = c.color;
            document.getElementById('link-list-editor').innerHTML = c.links.map((l, li) => `
                <div class="editor-link-row">
                    <input type="text" value="${l.name}" oninput="updateLinkRealtime(${idx}, ${li}, 'name', this.value)">
                    <input type="text" value="${l.url}" oninput="updateLinkRealtime(${idx}, ${li}, 'url', this.value)">
                    <input type="color" value="${l.color || state.linkColor}" oninput="updateLinkRealtime(${idx}, ${li}, 'color', this.value)">
                    <div class="tiny-del" onclick="delLink(${idx}, ${li}); syncCategoryEditor();"><i class="fa-solid fa-trash-can"></i></div>
                </div>`).join('');
        }
    }

    function updateCatRealtime() { const idx = document.getElementById('cat-sel').value, c = state[state.profile].categories[idx]; c.title = document.getElementById('cat-title').value; c.color = document.getElementById('cat-color').value; saveAndRender(); }
    function updateLinkRealtime(ci, li, k, v) { state[state.profile].categories[ci].links[li][k] = v; saveAndRender(); }
    function updateQlRealtime(i, k, v) { state[state.profile].ql[i][k] = v; saveAndRender(); }
    function updateVisRealtime() { 
        const p = state[state.profile];
        state.target = document.getElementById('target-mode').value; p.mesh = document.getElementById('mesh-check').checked; 
        p.bgColor = document.getElementById('bg-color').value; state.weatherColor = document.getElementById('weather-color-picker').value;
        p.showWeather = document.getElementById('w-enable-check').checked;
        p.showHeaders = document.getElementById('header-vis-check').checked;
        const sliderVal = document.getElementById('unified-slider').value;
        if (p.bgImg) { p.fuzzy = sliderVal; } else { p.opacity = sliderVal; }
        saveAndRender(); updateWeather();
    }
    function addCat() { state[state.profile].categories.push({title:"New Category", color:"#00d4ff", links:[]}); saveAndRender(true); renderSettings(); }
    function addLinkInline() { const idx = document.getElementById('cat-sel').value; state[state.profile].categories[idx].links.push({name: "New Link", url: "#", color: state.linkColor}); saveAndRender(true); }
    function delCat(i) { if(confirm("Delete category?")) { state[state.profile].categories.splice(i,1); saveAndRender(); renderSettings(); } }
    function delLink(ci, li) { state[state.profile].categories[ci].links.splice(li,1); saveAndRender(); }
    function exportData() { const b = new Blob([JSON.stringify(state)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download='startpage_backup.json'; a.click(); }
    function importData(input) { const file = input.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (e) => { try { state = JSON.parse(e.target.result); saveAndRender(); alert("Success!"); } catch(err) { alert("Invalid file."); } }; reader.readAsText(file); }
    function resetToDefaults() { if(confirm("Are you sure? This will erase all your profiles and settings!")) { state = getDefaults(); saveAndRender(); renderSettings(); updateWeather(); } }

    async function updateWeather() {
        const city = state.cities[cityIdx]; if(!city || !state[state.profile].showWeather) return;
        document.getElementById('city-name').textContent = city.name;
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&daily=weathercode,temperature_2m_max&timezone=auto`);
            const d = await r.json();
            document.getElementById('weather-grid').innerHTML = d.daily.time.slice(0,7).map((t, i) => {
                const weather = W_DATA[d.daily.weathercode[i]] || { icon: "fa-cloud", color: "#B0C4DE" };
                const iconColor = state.wColored ? weather.color : state.weatherColor;
                return `<div class="weather-card"><div class="weather-day-label">${new Date(t).toLocaleDateString('en',{weekday:'short'})}</div><i class="fa-solid ${weather.icon}" style="color:${iconColor}"></i><div class="weather-temp" style="color:${state.weatherColor}">${Math.round(d.daily.temperature_2m_max[i])}°</div></div>`;
            }).join('');
        } catch(e) {}
    }
    window.onload = () => { saveAndRender(); updateWeather(); };
</script>
</body>
</html>
