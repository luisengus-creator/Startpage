<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --accent: #00d4ff; --bg: #050505; }
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: var(--bg); color: white; min-height: 100vh; }
        #full-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; transition: 0.8s; opacity: 0.3; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .nav-group { display: flex; gap: 20px; align-items: center; }
        .nav-link { cursor: pointer; font-size: 0.8rem; font-weight: 700; color: #888; text-decoration: none; text-transform: uppercase; }
        .nav-link:hover { color: var(--accent); }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .column { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .link-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .link-row a { color: #eee; text-decoration: none; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border-radius: 15px; z-index: 2000; width: 90%; max-width: 450px; border: 1px solid #333; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; }
        input, select { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 100%; margin: 5px 0; box-sizing: border-box; }
        button { cursor: pointer; background: var(--accent); border: none; padding: 10px; border-radius: 5px; width: 100%; font-weight: bold; margin-top: 10px; }
        .del-btn { color: #ff4444; cursor: pointer; font-size: 0.7rem; display: none; }
        .edit-mode .del-btn { display: inline; }
        #error-log { color: #ff4444; background: #200; padding: 10px; display: none; position: fixed; bottom: 0; width: 100%; z-index: 9999; }
    </style>
</head>
<body>

    <div id="error-log"></div>
    <div id="full-bg"></div>
    <div id="overlay" onclick="closeModals()"></div>

    <div class="container">
        <header class="top-bar">
            <div class="nav-group" id="ql-nav">
                <span class="nav-link" onclick="toggleProfile()" id="prof-display">HOME</span>
            </div>
            <div class="nav-group">
                <span class="nav-link" onclick="document.body.classList.toggle('edit-mode')"><i class="fa-solid fa-pen"></i></span>
                <span class="nav-link" onclick="openModal('settings-modal')"><i class="fa-solid fa-gear"></i></span>
            </div>
        </header>

        <section id="weather-area">
            <h2 id="city-name" style="cursor:pointer;" onclick="cycleCity()">---</h2>
            <div id="weather-grid" style="display:flex; gap:15px; margin-bottom:30px;"></div>
        </section>

        <main id="grid"></main>
    </div>

    <div id="settings-modal" class="modal">
        <h3>Dashboard Engine</h3>
        <label>Edit Category</label>
        <select id="cat-sel" onchange="syncPanel()"></select>
        <input type="text" id="cat-title" oninput="updateCat()" placeholder="Title">
        <input type="color" id="cat-color" oninput="updateCat()">
        
        <button onclick="addLink()">+ Add Link to Category</button>
        <button onclick="addCat()">+ Create New Category</button>
        
        <div style="margin-top:15px; border-top:1px solid #333; padding-top:10px;">
            <input type="range" id="op-slide" min="0" max="1" step="0.1" oninput="updateVis()">
            <label><input type="checkbox" id="mesh-check" onchange="updateVis()"> Mesh Background</label>
        </div>
        
        <button style="background:#333; color:white;" onclick="openModal('weather-modal')">Weather Config</button>
        <button style="background:#333; color:white;" onclick="exportData()">Backup JSON</button>
    </div>

    <div id="weather-modal" class="modal">
        <h3>Weather</h3>
        <input type="text" placeholder="Search City..." oninput="searchCity(this.value)">
        <div id="search-res"></div>
        <button onclick="openModal('settings-modal')">Back</button>
    </div>

<script>
    // --- SAFETY WRAPPER ---
    window.onerror = function(msg, url, line) {
        const log = document.getElementById('error-log');
        log.style.display = 'block';
        log.innerHTML = "JS Error: " + msg + " on line " + line;
    };

    const KEY = "STABLE_V6";
    
    let state = JSON.parse(localStorage.getItem(KEY)) || {
        profile: 'home',
        opacity: 0.3,
        mesh: true,
        cities: [{name: "Odivelas", lat: 38.79, lon: -9.18}],
        home: { categories: [{title: "Social", color: "#00d4ff", links: [{name: "YouTube", url: "https://youtube.com"}]}] },
        work: { categories: [{title: "Work", color: "#3498db", links: []}] }
    };

    let cityIdx = 0;

    function save() {
        localStorage.setItem(KEY, JSON.stringify(state));
        render();
    }

    function render() {
        const p = state[state.profile];
        const grid = document.getElementById('grid');
        
        document.getElementById('prof-display').textContent = state.profile.toUpperCase();
        
        grid.innerHTML = p.categories.map((c, ci) => `
            <div class="column">
                <div style="position:absolute; inset:0; background:linear-gradient(${c.color}, transparent); opacity:${state.mesh ? state.opacity : 0}; z-index:-1; border-radius:12px;"></div>
                <h3 style="color:${c.color}; margin:0 0 15px 0;">${c.title} <span class="del-btn" onclick="delCat(${ci})"> (DEL)</span></h3>
                ${c.links.map((l, li) => `
                    <div class="link-row">
                        <a href="${l.url}" target="_blank">${l.name}</a>
                        <span class="del-btn" onclick="delLink(${ci},${li})"> ✕</span>
                    </div>
                `).join('')}
            </div>
        `).join('');

        const bg = document.getElementById('full-bg');
        if(state.mesh) {
            const cols = p.categories.map(x => x.color);
            bg.style.background = cols.length > 1 ? `linear-gradient(135deg, ${cols.join(',')})` : (cols[0] || '#050505');
            bg.style.opacity = state.opacity;
        } else { bg.style.opacity = 0; }
    }

    function toggleProfile() { state.profile = state.profile === 'home' ? 'work' : 'home'; save(); updateWeather(); }

    function syncPanel() {
        const p = state[state.profile];
        const sel = document.getElementById('cat-sel');
        sel.innerHTML = p.categories.map((c, i) => `<option value="${i}">${c.title}</option>`).join('');
        
        const idx = sel.value;
        if(idx !== "") {
            document.getElementById('cat-title').value = p.categories[idx].title;
            document.getElementById('cat-color').value = p.categories[idx].color;
        }
        document.getElementById('op-slide').value = state.opacity;
        document.getElementById('mesh-check').checked = state.mesh;
    }

    function updateCat() {
        const idx = document.getElementById('cat-sel').value;
        if(idx === "") return;
        state[state.profile].categories[idx].title = document.getElementById('cat-title').value;
        state[state.profile].categories[idx].color = document.getElementById('cat-color').value;
        save();
    }

    function updateVis() {
        state.opacity = document.getElementById('op-slide').value;
        state.mesh = document.getElementById('mesh-check').checked;
        save();
    }

    function addCat() { state[state.profile].categories.push({title:"New", color:"#00d4ff", links:[]}); save(); syncPanel(); }
    function delCat(i) { if(confirm("Delete?")) { state[state.profile].categories.splice(i,1); save(); syncPanel(); } }
    
    function addLink() {
        const idx = document.getElementById('cat-sel').value;
        const n = prompt("Name:");
        const u = prompt("URL:");
        if(n && u) { state[state.profile].categories[idx].links.push({name:n, url:u}); save(); }
    }
    function delLink(ci, li) { state[state.profile].categories[ci].links.splice(li,1); save(); }

    async function updateWeather() {
        const city = state.cities[cityIdx];
        if(!city) return;
        document.getElementById('city-name').textContent = city.name.toUpperCase();
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&daily=temperature_2m_max&timezone=auto`);
            const d = await r.json();
            document.getElementById('weather-grid').innerHTML = d.daily.time.slice(0,5).map((t, i) => `
                <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; text-align:center;">
                    <div style="font-size:0.7rem; opacity:0.5;">${new Date(t).toLocaleDateString('en',{weekday:'short'})}</div>
                    <div style="font-weight:bold;">${Math.round(d.daily.temperature_2m_max[i])}°</div>
                </div>
            `).join('');
        } catch(e) {}
    }

    function cycleCity() { if(state.cities.length > 1) { cityIdx = (cityIdx + 1) % state.cities.length; updateWeather(); } }

    async function searchCity(v) {
        if(v.length < 3) return;
        const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${v}&count=5`);
        const d = await r.json();
        document.getElementById('search-res').innerHTML = (d.results || []).map(res => `
            <div onclick="addCity('${res.name}',${res.latitude},${res.longitude})" style="background:#222; padding:8px; margin:5px; cursor:pointer;">${res.name}, ${res.country_code}</div>
        `).join('');
    }

    function addCity(n, la, lo) { state.cities.push({name:n, lat:la, lon:lo}); document.getElementById('search-res').innerHTML=''; save(); updateWeather(); }

    function openModal(id) { closeModals(); document.getElementById(id).style.display='block'; document.getElementById('overlay').style.display='block'; if(id==='settings-modal') syncPanel(); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('overlay').style.display='none'; }
    function exportData() {
        const b = new Blob([JSON.stringify(state)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download='backup.json'; a.click();
    }

    window.onload = () => { render(); updateWeather(); };
</script>
</body>
</html>
