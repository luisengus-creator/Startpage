<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startpage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --bg: #1C1B22; 
            --fs-base: clamp(0.75rem, 0.8vw, 1.1rem); 
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); color: white; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; font-size: var(--fs-base);
        }
        #full-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; transition: 0.8s; }
        .container { width: 100%; max-width: 98vw; margin: 0 auto; padding: 1.5rem; height: 100%; display: flex; flex-direction: column; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; z-index: 10; flex-shrink: 0; }
        .nav-group { display: flex; gap: 1.2rem; align-items: center; }
        
        .nav-link { cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; width: 2.2rem; height: 2.2rem; }
        .nav-link i { font-size: 1.3rem; color: var(--icon-color, #ffffff); transition: 0.3s; }
        .nav-link:hover i { opacity: 0.6; }

        #main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; overflow-y: auto; padding: 20px 0; }
        
        #grid { 
            display: flex; flex-wrap: wrap; gap: 1.5rem; justify-content: center; 
            align-content: center; align-items: flex-start; width: 100%; max-width: 100%;
        }
        
        .column { 
            background: rgba(255,255,255,0.02); border-radius: 12px; padding: 1rem 1.2rem; 
            position: relative; border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(12px);
            flex: 0 0 auto; width: max-content; min-width: 120px; text-align: center;
        }

        .cat-title { margin: 0 0 0.8rem 0; font-size: 1.1rem; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.1); white-space: nowrap; }
        .link-row { display: flex; justify-content: center; align-items: center; padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); position: relative; white-space: nowrap; }
        .link-row a { text-decoration: none; transition: 0.2s; font-size: 0.95rem; }

        /* Centered Adaptive Weather Section */
        #weather-area { 
            padding: 1.5rem 0; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            gap: 0.8rem; 
            z-index: 10; 
            flex-shrink: 0; 
        }
        
        #city-name { 
            font-size: 0.7rem; 
            opacity: 0.5; 
            letter-spacing: 3px; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.3s;
        }
        #city-name:hover { opacity: 1; }

        #weather-grid { display: flex; gap: 0.8rem; align-items: center; cursor: pointer; }
        
        .weather-card { 
            background: rgba(255,255,255,0.03); 
            padding: 0.5rem 0.8rem; 
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.05); 
            text-align: center; 
            min-width: 5.5rem; 
            transition: 0.3s;
        }
        .weather-card:hover { background: rgba(255,255,255,0.06); }
        .weather-card i { font-size: 1.1rem; margin: 0.3rem 0; }
        .weather-day-label { font-size: 0.55rem; opacity: 0.5; text-transform: uppercase; }
        .weather-temp { font-weight: bold; font-size: 0.85rem; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; padding: 2rem; border-radius: 20px; z-index: 2000; width: min(600px, 95vw); max-height: 85vh; overflow-y: auto; border: 1px solid #222; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(5px); }
        .section-h { font-size:0.65rem; color:#00d4ff; font-weight:900; margin: 1.5rem 0 0.8rem 0; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select { background: #111; border: 1px solid #222; color: white; padding: 10px; border-radius: 6px; width: 100%; margin: 5px 0; font-size: 0.85rem; }
        button { cursor: pointer; background: #222; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; color: white; }
        .del-btn { color: #ff4444; cursor: pointer; font-size: 0.7rem; position: absolute; right: 0; display: none; }
        .edit-mode .del-btn { display: inline; }
        
        .ql-row { display: grid; grid-template-columns: 30px 140px 1fr; gap: 10px; align-items: center; margin-bottom: 8px; }
        .city-tag { display: flex; justify-content: space-between; align-items: center; background: #151515; padding: 8px 12px; border-radius: 6px; margin: 5px 0; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="full-bg"></div>
    <div id="overlay" onclick="closeModals()"></div>

    <div class="container">
        <header class="top-bar">
            <div class="nav-group" id="ql-nav"></div>
            <div class="nav-group">
                <span class="nav-link" onclick="document.body.classList.toggle('edit-mode')"><i class="fa-solid fa-pen"></i></span>
                <span class="nav-link" onclick="openModal('settings-modal')"><i class="fa-solid fa-gear"></i></span>
            </div>
        </header>

        <main id="main-content">
            <div id="grid"></div>
        </main>

        <section id="weather-area">
            <span id="city-name" onclick="cycleCity()">---</span>
            <div id="weather-grid" onclick="openModal('weather-modal')"></div>
        </section>
    </div>

    <div id="settings-modal" class="modal">
        <h2 style="margin:0 0 1rem 0; font-size: 1.1rem;">Dashboard Settings</h2>
        <div id="ql-list-editor"></div>
        <div class="section-h">Categories</div>
        <select id="cat-sel" onchange="syncCategoryEditor()"></select>
        <div style="display:flex; gap:10px;"><input type="text" id="cat-title" oninput="updateCatRealtime()" placeholder="Title"><input type="color" id="cat-color" oninput="updateCatRealtime()" style="width:60px; height:42px;"></div>
        <div id="link-list-editor" style="margin-top:10px; border: 1px solid #1a1a1a; padding: 10px; border-radius: 10px; max-height: 200px; overflow-y: auto; background: #050505;"></div>
        <button onclick="addLinkInline()">+ Add Link</button><button onclick="addCat()">+ New Category</button>
        <div class="section-h">Visual Style</div>
        <div class="color-row" style="display:flex; justify-content:space-between; align-items:center;"><span>Background Color</span> <input type="color" id="bg-color" oninput="updateVisRealtime()" style="width:50px;"></div>
        <div class="color-row" style="display:flex; justify-content:space-between; align-items:center;"><span>Global Icon Color</span> <input type="color" id="icon-color-picker" oninput="updateVisRealtime()" style="width:50px;"></div>
        <div style="display:flex; gap:10px; margin-top:15px;"><label><input type="checkbox" id="w-toggle" onchange="updateVisRealtime()"> Weather</label><label><input type="checkbox" id="mesh-check" onchange="updateVisRealtime()"> Mesh</label></div>
        <input type="range" id="op-slide" min="0" max="1" step="0.05" oninput="updateVisRealtime()" style="margin-top:10px;">
    </div>

    <div id="weather-modal" class="modal">
        <h3>Weather Locations</h3>
        <div id="current-cities"></div>
        <input type="text" placeholder="Search city..." oninput="searchCity(this.value)" style="margin-top:15px;">
        <div id="search-res"></div>
        <button onclick="closeModals()">Close</button>
    </div>

<script>
    const KEY = "DASH_STABLE_V26_FINAL_TOUCH";
    const ICON_LIST = ["fa-spotify", "fa-server", "fa-music", "fa-sliders", "fa-github", "fa-youtube", "fa-twitch", "fa-cloud", "fa-terminal", "fa-code", "fa-heart", "fa-star"];
    const W_ICONS = { 0: "fa-sun", 1: "fa-cloud-sun", 2: "fa-cloud-sun", 3: "fa-cloud", 45: "fa-smog", 51: "fa-cloud-rain", 61: "fa-cloud-showers-heavy", 95: "fa-bolt" };

    function getDefaults() {
        const homeCats = [];
        for(let i=1; i<=5; i++) {
            let links = [];
            for(let j=1; j<=5; j++) links.push({name:`Link ${j}`, url:"#"});
            homeCats.push({title:`Category ${i}`, color:"#00d4ff", links: links});
        }
        const workCats = [
            {title:"1", color:"#4682B4", links:[{name:"Link 1",url:"#"},{name:"Link 2",url:"#"},{name:"Link 3",url:"#"},{name:"Link 4",url:"#"}]},
            {title:"2", color:"#4682B4", links:[{name:"Link 1",url:"#"},{name:"Link 2",url:"#"},{name:"Link 3",url:"#"},{name:"Link 4",url:"#"}]}
        ];
        return {
            profile: 'home', opacity: 0.3, mesh: true, showWeather: true, target: '_blank',
            bgColor: "#1C1B22", iconColor: "#ffffff", weatherColor: "#ffffff", linkColor: "#cccccc",
            cities: [{name: "Lisboa", lat: 38.71, lon: -9.13}],
            home: { ql: [{name:"fa-brands fa-spotify", url:"#", vis:false}, {name:"fa-solid fa-server", url:"#", vis:false}], categories: homeCats },
            work: { ql: [{name:"fa-brands fa-spotify", url:"#", vis:false}, {name:"fa-solid fa-server", url:"#", vis:false}], categories: workCats }
        };
    }

    let state = JSON.parse(localStorage.getItem(KEY)) || getDefaults();
    let cityIdx = 0;

    function saveAndRender(refreshModal = false) {
        localStorage.setItem(KEY, JSON.stringify(state));
        const p = state[state.profile];
        document.body.style.backgroundColor = state.bgColor;
        document.documentElement.style.setProperty('--icon-color', state.iconColor);

        const profileIcon = state.profile === 'home' ? 'fa-house' : 'fa-user-tie';
        const qlHtml = p.ql.filter(l => l.vis).map(l => `<a href="${l.url}" class="nav-link active" target="${state.target}"><i class="${l.name}"></i></a>`).join('');
        document.getElementById('ql-nav').innerHTML = `<span class="nav-link active" onclick="toggleProfile()"><i class="fa-solid ${profileIcon}"></i></span>` + qlHtml;

        document.getElementById('grid').innerHTML = p.categories.map((c, ci) => `
            <div class="column">
                <div style="position:absolute; inset:0; background:linear-gradient(${c.color}33, transparent); opacity:${state.opacity}; z-index:-1; border-radius:14px;"></div>
                <h4 class="cat-title" style="color:${c.color};">${c.title}<span class="del-btn" onclick="delCat(${ci})">✕</span></h4>
                ${c.links.map((l, li) => `<div class="link-row"><a href="${l.url}" target="${state.target}" style="color:${state.linkColor}">${l.name}</a><span class="del-btn" onclick="delLink(${ci},${li})">✕</span></div>`).join('')}
            </div>`).join('');

        const wArea = document.getElementById('weather-area');
        wArea.style.display = state.showWeather ? 'flex' : 'none';
        wArea.style.color = state.weatherColor;
        
        const bg = document.getElementById('full-bg');
        if (state.mesh) {
            const cols = p.categories.map(x => x.color);
            bg.style.background = cols.length > 1 ? `linear-gradient(135deg, ${cols.join(',')})` : (cols[0] || state.bgColor);
            bg.style.opacity = state.opacity;
        } else { bg.style.opacity = 0; }
        if(refreshModal) syncCategoryEditor();
    }

    // Modal / Setup logic
    function openModal(id) { document.getElementById(id).style.display = 'block'; document.getElementById('overlay').style.display = 'block'; if(id === 'weather-modal') renderWeatherManager(); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('overlay').style.display='none'; }
    function renderWeatherManager() { document.getElementById('current-cities').innerHTML = state.cities.map((c, i) => `<div class="city-tag"><span>${c.name}</span><span onclick="removeCity(${i})">✕</span></div>`).join(''); }
    
    async function updateWeather() {
        const city = state.cities[cityIdx]; if(!city) return;
        document.getElementById('city-name').textContent = city.name;
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&daily=weathercode,temperature_2m_max&timezone=auto`);
            const d = await r.json();
            document.getElementById('weather-grid').innerHTML = d.daily.time.slice(0,5).map((t, i) => `
                <div class="weather-card">
                    <div class="weather-day-label">${new Date(t).toLocaleDateString('en',{weekday:'short'})}</div>
                    <i class="fa-solid ${W_ICONS[d.daily.weathercode[i]] || 'fa-cloud'}" style="color:${state.weatherColor}"></i>
                    <div class="weather-temp">${Math.round(d.daily.temperature_2m_max[i])}°</div>
                </div>`).join('');
        } catch(e) {}
    }

    function cycleCity() { if(state.cities.length > 1) { cityIdx = (cityIdx + 1) % state.cities.length; updateWeather(); } }
    async function searchCity(v) { if(v.length < 3) return; const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${v}&count=5`); const d = await r.json(); document.getElementById('search-res').innerHTML = (d.results || []).map(res => `<div onclick="addCity('${res.name}',${res.latitude},${res.longitude})" style="background:#1a1a1a; padding:10px; margin:5px 0; cursor:pointer; border-radius:8px;">${res.name}, ${res.country_code}</div>`).join(''); }
    function addCity(n, la, lo) { state.cities.push({name:n, lat:la, lon:lo}); document.getElementById('search-res').innerHTML=''; renderWeatherManager(); saveAndRender(); updateWeather(); }
    function removeCity(i) { state.cities.splice(i,1); if(cityIdx >= state.cities.length) cityIdx = 0; renderWeatherManager(); saveAndRender(); updateWeather(); }
    function toggleProfile() { state.profile = (state.profile === 'home' ? 'work' : 'home'); saveAndRender(); updateWeather(); }

    window.onload = () => { saveAndRender(); updateWeather(); };
</script>
</body>
</html>
