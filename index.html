<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    
    <style>
        /* CSS is hardcoded here to prevent 'White Page' if external CSS fails */
        :root { --grad-opacity: 0.3; --accent-color: #00d4ff; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; background-color: #050505; color: white; min-height: 100vh; }
        
        #full-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; transition: 0.5s; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .quick-links { display: flex; gap: 20px; }
        .text-btn { cursor: pointer; font-size: 0.85rem; text-transform: uppercase; opacity: 0.7; transition: 0.2s; text-decoration: none; color: white; }
        .text-btn:hover { opacity: 1; color: var(--accent-color); }
        
        #grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .column { background: rgba(255,255,255,0.02); border-radius: 15px; padding: 20px; position: relative; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .column-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: var(--grad-opacity); }
        
        .category-title { margin: 0 0 15px 0; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .link-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .link-item a { color: #eee; text-decoration: none; font-size: 0.95rem; }
        .link-item a:hover { color: var(--accent-color); }

        .weather-section { margin-top: 20px; display: none; }
        .weather-section.visible { display: block; }
        #forecast-row { display: flex; gap: 20px; margin-top: 10px; }
        
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 25px; border-radius: 12px; z-index: 2000; width: 90%; max-width: 450px; border: 1px solid #333; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; }
        
        .del-btn { color: #ff4444; cursor: pointer; display: none; font-size: 0.8rem; }
        .edit-active .del-btn { display: inline; }
        .ql-hidden { display: none; }
    </style>
</head>
<body>

    <div id="full-bg"></div>
    <div id="overlay" onclick="closeModals()"></div>

    <div class="container">
        <header class="top-bar">
            <div class="quick-links">
                <span class="text-btn" onclick="switchProfile()" id="prof-display">HOME</span>
                <a id="ql-spotify" class="text-btn" target="_blank">SPOTIFY</a>
                <a id="ql-server" class="text-btn" target="_blank">SERVER</a>
                <a id="ql-music" class="text-btn" target="_blank">MUSIC</a>
            </div>
            <div class="quick-links">
                <span class="text-btn" onclick="document.body.classList.toggle('edit-active')"><i class="fa-solid fa-pen-to-square"></i></span>
                <span class="text-btn" onclick="openModal('settings-mod')"><i class="fa-solid fa-gear"></i></span>
            </div>
        </header>

        <section id="weather-wrap" class="weather-section">
            <h4 id="city-name" style="margin:0; cursor:pointer;" onclick="cycleCity()">---</h4>
            <div id="forecast-row"></div>
        </section>

        <main id="grid"></main>
    </div>

    <div id="settings-mod" class="modal">
        <h3 style="margin-top:0">Dashboard Engine</h3>
        <button onclick="addCategory()" style="width:100%; margin-bottom:10px;">+ New Category</button>
        <select id="cat-select" onchange="loadCatEdit()" style="width:100%; padding:5px;"></select>
        
        <div id="cat-edit-zone" style="margin-top:15px;">
            <input type="text" id="edit-title" placeholder="Category Name" oninput="syncEdit()" style="width:70%;">
            <input type="color" id="edit-color" oninput="syncEdit()" style="width:25%;">
            <button onclick="addLinkToCat()" style="margin-top:10px; width:100%;">+ Add Link</button>
        </div>

        <div style="margin-top:20px; border-top:1px solid #333; padding-top:10px;">
            <label><input type="checkbox" id="check-mesh" onchange="updateVisuals()"> Global Mesh</label><br>
            <label><input type="checkbox" id="check-col" onchange="updateVisuals()"> Column Gradients</label>
            <input type="range" min="0" max="1" step="0.1" id="op-range" oninput="updateVisuals()" style="width:100%;">
        </div>
        
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="exportData()" style="flex:1;">Backup</button>
            <button onclick="openModal('weather-mod')" style="flex:1;">Weather</button>
        </div>
    </div>

    <div id="weather-mod" class="modal">
        <h3>Weather Config</h3>
        <input type="text" placeholder="Search City..." oninput="searchLocation(this.value)" style="width:100%; padding:8px;">
        <div id="search-results" style="max-height:150px; overflow-y:auto; margin-top:10px;"></div>
        <div id="active-cities" style="margin-top:15px;"></div>
    </div>

<script>
    // --- PERSISTENCE LAYER ---
    const KEY = "DASHBOARD_V4_FINAL";
    const DEFAULT_STATE = {
        profile: 'home',
        visuals: { mesh: true, col: true, opacity: 0.3 },
        weather: { visible: true, locations: [{name: "Odivelas", lat: 38.79, lon: -9.18}] },
        data: {
            home: [
                { title: "Social", color: "#00d4ff", links: [{name: "YouTube", url: "https://youtube.com"}] },
                { title: "Development", color: "#2ecc71", links: [] }
            ],
            work: [
                { title: "Project", color: "#f1c40f", links: [] }
            ],
            ql: {
                home: { 
                    spotify: { vis: true, url: "#", label: "SPOTIFY" },
                    server: { vis: false, url: "#", label: "SERVER" },
                    music: { vis: false, url: "#", label: "MUSIC" }
                },
                work: {
                    spotify: { vis: false, url: "#", label: "SPOTIFY" },
                    server: { vis: true, url: "#", label: "SERVER" },
                    music: { vis: false, url: "#", label: "MUSIC" }
                }
            }
        }
    };

    let state = JSON.parse(localStorage.getItem(KEY)) || DEFAULT_STATE;
    let cityIdx = 0;

    function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

    // --- RENDERING ---
    function render() {
        const grid = document.getElementById('grid');
        const profileData = state.data[state.profile];
        const qlData = state.data.ql[state.profile];
        
        grid.innerHTML = '';
        document.getElementById('prof-display').textContent = state.profile;
        document.documentElement.style.setProperty('--grad-opacity', state.visuals.opacity);

        // Build Columns
        profileData.forEach((cat, cIdx) => {
            const col = document.createElement('div');
            col.className = 'column';
            col.innerHTML = `
                <div class="column-bg" style="background: linear-gradient(to bottom, ${cat.color} 0%, transparent 100%); opacity: ${state.visuals.col ? state.visuals.opacity : 0}"></div>
                <h2 class="category-title" style="color: ${cat.color}; border-bottom-color: ${cat.color}33">${cat.title}</h2>
                <div class="link-list"></div>
                <span class="del-btn" onclick="removeCat(${cIdx})">REMOVE CATEGORY</span>
            `;
            
            const list = col.querySelector('.link-list');
            cat.links.forEach((l, lIdx) => {
                list.innerHTML += `
                    <div class="link-item">
                        <a href="${l.url}">${l.name}</a>
                        <span class="del-btn" onclick="removeLink(${cIdx}, ${lIdx})">✕</span>
                    </div>
                `;
            });
            grid.appendChild(col);
        });

        // Quick Links
        ['spotify', 'server', 'music'].forEach(key => {
            const btn = document.getElementById(`ql-${key}`);
            const config = qlData[key];
            btn.className = config.vis ? 'text-btn' : 'ql-hidden';
            btn.href = config.url;
            btn.textContent = config.label;
        });

        // Background Mesh
        const bg = document.getElementById('full-bg');
        if(state.visuals.mesh) {
            const colors = profileData.map(c => c.color);
            bg.style.background = `linear-gradient(135deg, ${colors.join(',') || '#050505'})`;
            bg.style.opacity = state.visuals.opacity;
        } else {
            bg.style.opacity = 0;
        }

        renderSettings();
    }

    // --- WEATHER ---
    async function updateWeather() {
        const wrap = document.getElementById('weather-wrap');
        if(!state.weather.visible || !state.weather.locations.length) { wrap.classList.remove('visible'); return; }
        
        wrap.classList.add('visible');
        const loc = state.weather.locations[cityIdx];
        document.getElementById('city-name').textContent = loc.name;

        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&daily=weathercode,temperature_2m_max&timezone=auto`);
            const d = await res.json();
            const row = document.getElementById('forecast-row');
            row.innerHTML = '';
            d.daily.time.slice(0,5).forEach((t, i) => {
                row.innerHTML += `<div style="text-align:center; font-size:0.8rem;">
                    <div>${new Date(t).toLocaleDateString('en',{weekday:'short'})}</div>
                    <div style="font-size:1.2rem; margin:5px 0;">${d.daily.temperature_2m_max[i]}°</div>
                </div>`;
            });
        } catch(e) { console.error("Weather blocked"); }
    }

    // --- UI CONTROLS ---
    function switchProfile() { state.profile = state.profile === 'home' ? 'work' : 'home'; save(); render(); updateWeather(); }
    
    function openModal(id) { 
        closeModals();
        document.getElementById(id).style.display = 'block'; 
        document.getElementById('overlay').style.display = 'block'; 
        if(id === 'settings-mod') populateCatSelect();
    }

    function closeModals() { 
        document.querySelectorAll('.modal').forEach(m => m.style.display='none');
        document.getElementById('overlay').style.display='none';
    }

    function populateCatSelect() {
        const sel = document.getElementById('cat-select');
        sel.innerHTML = state.data[state.profile].map((c, i) => `<option value="${i}">${c.title}</option>`).join('');
        loadCatEdit();
    }

    function loadCatEdit() {
        const idx = document.getElementById('cat-select').value;
        if(idx === "") return;
        const cat = state.data[state.profile][idx];
        document.getElementById('edit-title').value = cat.title;
        document.getElementById('edit-color').value = cat.color;
    }

    function syncEdit() {
        const idx = document.getElementById('cat-select').value;
        state.data[state.profile][idx].title = document.getElementById('edit-title').value;
        state.data[state.profile][idx].color = document.getElementById('edit-color').value;
        save(); render();
    }

    function updateVisuals() {
        state.visuals.mesh = document.getElementById('check-mesh').checked;
        state.visuals.col = document.getElementById('check-col').checked;
        state.visuals.opacity = document.getElementById('op-range').value;
        save(); render();
    }

    // --- INITIALIZE ---
    window.onload = () => {
        render();
        updateWeather();
        // Sync UI toggles to current state
        document.getElementById('check-mesh').checked = state.visuals.mesh;
        document.getElementById('check-col').checked = state.visuals.col;
        document.getElementById('op-range').value = state.visuals.opacity;
    };
</script>
</body>
</html>
