<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --accent: #00d4ff; --bg: #050505; --panel: rgba(255,255,255,0.05); }
        body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: white; min-height: 100vh; transition: 0.5s; }
        
        #full-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; transition: 0.8s; opacity: 0.3; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        
        /* Top Navigation */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .nav-group { display: flex; gap: 20px; align-items: center; }
        .nav-link { cursor: pointer; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: #888; text-decoration: none; transition: 0.3s; letter-spacing: 1.5px; }
        .nav-link:hover, .nav-link.active { color: var(--accent); }
        
        /* Weather */
        .weather-row { display: flex; gap: 20px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 10px; }
        .weather-card { background: var(--panel); padding: 15px; border-radius: 12px; min-width: 80px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }

        /* Main Grid */
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .column { background: var(--panel); border-radius: 16px; padding: 25px; position: relative; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .col-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .link-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .link-row a { color: #eee; text-decoration: none; font-size: 0.95rem; }
        .link-row a:hover { color: var(--accent); }

        /* Settings UI */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 35px; border-radius: 20px; z-index: 2000; width: 90%; max-width: 480px; border: 1px solid #333; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(4px); }
        
        input, select { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 100%; margin: 10px 0; box-sizing: border-box; }
        button { cursor: pointer; background: var(--accent); color: black; font-weight: 800; border: none; padding: 12px; border-radius: 8px; width: 100%; margin: 5px 0; transition: 0.2s; }
        button.ghost { background: #222; color: white; }
        
        .del-btn { color: #ff4444; cursor: pointer; font-size: 0.75rem; display: none; }
        .edit-mode .del-btn { display: inline-block; }
    </style>
</head>
<body>

    <div id="full-bg"></div>
    <div id="overlay" onclick="closeModals()"></div>

    <div class="container">
        <header class="top-bar">
            <div class="nav-group" id="quick-links-area">
                <span class="nav-link" id="prof-btn" onclick="toggleProfile()">HOME</span>
                </div>
            <div class="nav-group">
                <span class="nav-link" onclick="document.body.classList.toggle('edit-mode')"><i class="fa-solid fa-pen"></i></span>
                <span class="nav-link" onclick="openModal('main-settings')"><i class="fa-solid fa-gear"></i></span>
            </div>
        </header>

        <section id="weather-section">
            <h2 id="city-display" style="cursor:pointer; margin-bottom:15px;" onclick="cycleCity()">---</h2>
            <div id="weather-grid" class="weather-row"></div>
        </section>

        <main id="grid"></main>
    </div>

    <div id="main-settings" class="modal">
        <h2 style="margin-top:0">Dashboard Engine</h2>
        
        <div style="margin-bottom:20px;">
            <label>1. Quick Links (Top Left)</label>
            <div id="ql-editor-list"></div>
        </div>

        <div style="margin-bottom:20px;">
            <label>2. Categories & Links</label>
            <select id="cat-edit-select" onchange="syncSettingsPanel()"></select>
            <div style="display:flex; gap:10px;">
                <input type="text" id="cat-title-in" oninput="updateCatInfo()" placeholder="Category Name">
                <input type="color" id="cat-color-in" oninput="updateCatInfo()" style="width:60px;">
            </div>
            <button class="ghost" onclick="addNewLink()">+ Add Link to Selected Category</button>
            <button onclick="addNewCategory()">+ Create New Category</button>
        </div>

        <div style="margin-bottom:20px; border-top:1px solid #333; padding-top:15px;">
            <label>3. Visuals</label>
            <input type="range" id="op-slider" min="0" max="1" step="0.1" oninput="updateVisuals()">
            <label><input type="checkbox" id="mesh-check" onchange="updateVisuals()"> Enable Global Mesh</label>
        </div>

        <button class="ghost" onclick="openModal('weather-settings')">Weather Config</button>
        <button class="ghost" onclick="exportData()">Download Backup</button>
    </div>

    <div id="weather-settings" class="modal">
        <h2>Weather</h2>
        <input type="text" placeholder="Search City..." oninput="searchCityApi(this.value)">
        <div id="city-results"></div>
        <div id="my-cities" style="margin-top:20px;"></div>
        <button onclick="openModal('main-settings')">Back</button>
    </div>

<script>
    // --- PERSISTENCE ---
    const STORAGE_KEY = "FINAL_DASH_STABLE_V1";
    
    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        activeProfile: 'home',
        opacity: 0.3,
        mesh: true,
        cities: [{name: "Odivelas", lat: 38.79, lon: -9.18}],
        home: {
            ql: [{name: "SPOTIFY", url: "#", vis: true}, {name: "SERVER", url: "#", vis: false}],
            categories: [{title: "Social", color: "#00d4ff", links: [{name: "YouTube", url: "https://youtube.com"}]}]
        },
        work: {
            ql: [{name: "SERVER", url: "#", vis: true}],
            categories: [{title: "Work", color: "#f1c40f", links: []}]
        }
    };

    let cityIdx = 0;

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        render();
    }

    // --- RENDERING ---
    function render() {
        const prof = state[state.activeProfile];
        const grid = document.getElementById('grid');
        const qlArea = document.getElementById('quick-links-area');
        
        // Render Profile Name
        document.getElementById('prof-btn').textContent = state.activeProfile;

        // Render QuickLinks (Top Left)
        const qlHtml = prof.ql.filter(l => l.vis).map(l => `<a href="${l.url}" class="nav-link">${l.name}</a>`).join('');
        qlArea.innerHTML = `<span class="nav-link" onclick="toggleProfile()">${state.activeProfile}</span>` + qlHtml;

        // Render Main Grid
        grid.innerHTML = prof.categories.map((cat, cIdx) => `
            <div class="column">
                <div style="position:absolute; inset:0; background: linear-gradient(to bottom, ${cat.color} 0%, transparent 100%); opacity: ${state.mesh ? state.opacity : 0}; z-index:-1; border-radius:16px;"></div>
                <div class="col-header">
                    <h3 style="color:${cat.color}; margin:0;">${cat.title}</h3>
                    <span class="del-btn" onclick="deleteCategory(${cIdx})">DELETE</span>
                </div>
                ${cat.links.map((link, lIdx) => `
                    <div class="link-row">
                        <a href="${link.url}">${link.name}</a>
                        <span class="del-btn" onclick="deleteLink(${cIdx}, ${lIdx})">✕</span>
                    </div>
                `).join('')}
            </div>
        `).join('');

        // Global Visuals
        const bg = document.getElementById('full-bg');
        if(state.mesh) {
            const colors = prof.categories.map(c => c.color);
            bg.style.background = colors.length > 1 ? `linear-gradient(135deg, ${colors.join(',')})` : (colors[0] || '#050505');
            bg.style.opacity = state.opacity;
        } else { bg.style.opacity = 0; }
    }

    // --- ENGINE LOGIC ---
    function toggleProfile() { 
        state.activeProfile = state.activeProfile === 'home' ? 'work' : 'home'; 
        save(); 
        updateWeather();
    }

    function syncSettingsPanel() {
        const prof = state[state.activeProfile];
        const sel = document.getElementById('cat-edit-select');
        
        // 1. Refresh Category Dropdown
        const currentVal = sel.value;
        sel.innerHTML = prof.categories.map((c, i) => `<option value="${i}">${c.title}</option>`).join('');
        if(currentVal !== "" && prof.categories[currentVal]) sel.value = currentVal;

        // 2. Load Selected Category Info
        const idx = sel.value;
        if(idx !== "") {
            document.getElementById('cat-title-in').value = prof.categories[idx].title;
            document.getElementById('cat-color-in').value = prof.categories[idx].color;
        }

        // 3. QuickLink Editor
        document.getElementById('ql-editor-list').innerHTML = prof.ql.map((l, i) => `
            <div style="display:flex; gap:5px; margin-bottom:5px;">
                <input type="checkbox" ${l.vis ? 'checked' : ''} onchange="updateQl(${i}, 'vis', this.checked)" style="width:20px;">
                <input type="text" value="${l.name}" oninput="updateQl(${i}, 'name', this.value)" placeholder="Label">
                <input type="text" value="${l.url}" oninput="updateQl(${i}, 'url', this.value)" placeholder="URL">
            </div>
        `).join('');

        // 4. Sliders
        document.getElementById('op-slider').value = state.opacity;
        document.getElementById('mesh-check').checked = state.mesh;
    }

    function updateCatInfo() {
        const idx = document.getElementById('cat-edit-select').value;
        const prof = state[state.activeProfile];
        prof.categories[idx].title = document.getElementById('cat-title-in').value;
        prof.categories[idx].color = document.getElementById('cat-color-in').value;
        save();
    }

    function updateQl(i, key, val) { state[state.activeProfile].ql[i][key] = val; save(); }
    function updateVisuals() { state.opacity = document.getElementById('op-slider').value; state.mesh = document.getElementById('mesh-check').checked; save(); }
    
    function addNewCategory() { 
        state[state.activeProfile].categories.push({title: "New Category", color: "#ffffff", links: []}); 
        save(); 
        syncSettingsPanel(); 
    }
    
    function deleteCategory(i) { if(confirm("Delete?")) { state[state.activeProfile].categories.splice(i, 1); save(); syncSettingsPanel(); } }

    function addNewLink() {
        const idx = document.getElementById('cat-edit-select').value;
        const n = prompt("Link Name:");
        const u = prompt("URL:");
        if(n && u) {
            state[state.activeProfile].categories[idx].links.push({name: n, url: u});
            save();
        }
    }

    function deleteLink(c, l) { state[state.activeProfile].categories[c].links.splice(l, 1); save(); }

    // --- WEATHER ---
    async function updateWeather() {
        if(!state.cities.length) return;
        const city = state.cities[cityIdx];
        document.getElementById('city-display').textContent = city.name.toUpperCase();
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&daily=temperature_2m_max&timezone=auto`);
            const d = await r.json();
            document.getElementById('weather-grid').innerHTML = d.daily.time.slice(0,5).map((t, i) => `
                <div class="weather-card">
                    <div style="font-size:0.7rem; opacity:0.5;">${new Date(t).toLocaleDateString('en',{weekday:'short'})}</div>
                    <div style="font-size:1.1rem; font-weight:700; margin-top:5px;">${Math.round(d.daily.temperature_2m_max[i])}°</div>
                </div>
            `).join('');
        } catch(e) { console.error("Weather failed"); }
    }

    function cycleCity() { cityIdx = (cityIdx + 1) % state.cities.length; updateWeather(); }

    // --- UI TOOLS ---
    function openModal(id) { 
        closeModals(); 
        document.getElementById(id).style.display = 'block'; 
        document.getElementById('overlay').style.display = 'block'; 
        syncSettingsPanel();
    }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('overlay').style.display='none'; }
    function exportData() {
        const b = new Blob([JSON.stringify(state)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download='backup.json'; a.click();
    }

    window.onload = () => { render(); updateWeather(); };
</script>
</body>
</html>
