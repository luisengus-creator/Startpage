<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startpage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        html, body { background-color: #1C1B22; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        :root { --fs-base: clamp(0.9rem, 1.1vw, 1.4rem); }
        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            color: white; height: 100vh; display: flex; flex-direction: column; 
            font-size: var(--fs-base); position: relative;
        }

        /* THE MASTER BACKGROUND - FIXED ONCE AND FOR ALL */
        #full-bg { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -2; pointer-events: none; 
            background-repeat: no-repeat; background-size: cover; background-position: center;
        }

        .container { 
            width: 100%; height: 100%; margin: 0 auto; padding: 3vh 4vw; 
            display: flex; flex-direction: column; position: relative; z-index: 1;
        }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; z-index: 10; flex-shrink: 0; margin-bottom: 3vh; }
        .nav-group { display: flex; gap: 1.2rem; align-items: center; }
        .nav-link { cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; width: 1.8rem; height: 1.8rem; }
        .nav-link i { font-size: 1.1rem; color: var(--icon-color, #ffffff); transition: 0.3s; }

        #main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; overflow-y: auto; padding: 2vh 0; }
        #grid { display: flex; flex-wrap: wrap; gap: clamp(1.5rem, 3vw, 4rem); justify-content: center; align-content: center; width: 100%; }
        
        .column { 
            background: rgba(255,255,255,0.03); border-radius: 16px; padding: 1.5rem 1.8rem; 
            position: relative; border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(12px);
            flex: 0 0 auto; width: max-content; min-width: 180px; text-align: center;
        }

        .cat-title { 
            margin: 0 0 1rem 0; font-size: 1.3rem; font-weight: 700;
            padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); 
            white-space: nowrap; cursor: pointer; text-decoration: none; display: block; 
        }
        .link-row { display: flex; justify-content: center; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); position: relative; }
        .link-row a { text-decoration: none; font-size: 1rem; }

        #weather-area { padding: 2vh 0; display: none; flex-direction: column; align-items: center; gap: 0.8rem; z-index: 10; flex-shrink: 0; }
        #city-name { font-size: 0.8rem; opacity: 0.5; letter-spacing: 4px; cursor: pointer; text-transform: uppercase; }
        #weather-grid { display: flex; gap: 0.8rem; align-items: center; cursor: pointer; }
        .weather-card { background: rgba(255,255,255,0.03); padding: 0.7rem 0.9rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center; min-width: 6.5rem; }
        .weather-card i { font-size: 1.4rem; margin: 0.5rem 0; }
        .weather-temp { font-weight: bold; font-size: 1.1rem; }

        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #0a0a0a; padding: 2.5rem; border-radius: 20px; z-index: 2000; 
            width: min(650px, 95vw); max-height: 85vh; overflow-y: auto; border: 1px solid #222; 
        }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(5px); }
        .section-h { font-size:0.7rem; color:#00d4ff; font-weight:900; margin: 0 0 1.2rem 0; text-transform: uppercase; letter-spacing: 1px; }
        .setting-block { margin-bottom: 2.5rem; border-bottom: 1px solid #1a1a1a; padding-bottom: 1.5rem; }
        
        input, select { background: #111; border: 1px solid #222; color: white; padding: 10px; border-radius: 6px; width: 100%; margin: 5px 0; font-size: 0.85rem; }
        button { cursor: pointer; background: #222; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 5px; color: white; transition: 0.2s; }
        button:hover { background: #333; }
        
        .ql-row { display: grid; grid-template-columns: 30px 140px 1fr; gap: 10px; align-items: center; margin-bottom: 8px; }
        .color-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 0.8rem; margin: 8px 0; }
        .color-row input[type="color"] { width: 50px; height: 32px; padding: 2px; flex-shrink: 0; }
        .label-inline { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; cursor: pointer; }
        .label-inline input { width: auto; margin: 0; }

        .link-edit-row { display: grid; grid-template-columns: 1fr 1fr 45px 35px; gap: 8px; margin-bottom: 8px; align-items: center; }
        .link-edit-row input[type="color"] { width: 100%; height: 38px; padding: 2px; margin: 0; }
    </style>
</head>
<body>

    <div id="full-bg"></div>
    <div id="overlay" onclick="closeModals()"></div>

    <div class="container">
        <header class="top-bar">
            <div class="nav-group" id="ql-nav"></div>
            <div class="nav-group">
                <span class="nav-link" onclick="document.body.classList.toggle('edit-mode')"><i class="fa-solid fa-pen"></i></span>
                <span class="nav-link" onclick="openModal('settings-modal')"><i class="fa-solid fa-gear"></i></span>
            </div>
        </header>
        <main id="main-content"><div id="grid"></div></main>
        <section id="weather-area">
            <span id="city-name" onclick="cycleCity()">---</span>
            <div id="weather-grid" onclick="openModal('weather-modal')"></div>
        </section>
    </div>

    <div id="settings-modal" class="modal">
        <div class="setting-block">
            <div class="section-h">Quick Links (Max 4)</div>
            <div id="ql-list-editor"></div>
        </div>

        <div class="setting-block">
            <div class="section-h">Categories & Links</div>
            <select id="cat-sel" onchange="syncCategoryEditor()"></select>
            <div style="display:flex; gap:10px;">
                <input type="text" id="cat-title" oninput="updateCatRealtime()" placeholder="Title">
                <input type="color" id="cat-color" oninput="updateCatRealtime()" style="width:60px; height:42px;">
            </div>
            <input type="text" id="cat-url" oninput="updateCatRealtime()" placeholder="Category URL">
            <div id="link-list-editor" style="margin-top:10px; max-height: 250px; overflow-y: auto; background: #050505; padding: 15px; border-radius: 12px; border: 1px solid #1a1a1a;"></div>
            <button onclick="addLinkInline()">+ Add Link</button>
            <button onclick="addCat()">+ New Category (5 Links)</button>
        </div>

        <div class="setting-block">
            <div class="section-h">Background Engine</div>
            <div class="color-row">
                <span>Base Background Color</span> 
                <div style="display:flex; gap:5px;">
                    <input type="color" id="bg-color" oninput="updateVisRealtime()">
                    <button onclick="resetToBaseColor()" style="width:auto; margin:0; padding:5px 12px; font-size:0.7rem;">Reset</button>
                </div>
            </div>
            <div style="display: flex; gap: 20px; margin: 15px 0;">
                <label class="label-inline"><input type="radio" name="bg-type" id="mesh-check" onchange="toggleBgType('mesh')"> Mesh Gradient</label>
                <label class="label-inline"><input type="radio" name="bg-type" id="img-check" onchange="toggleBgType('img')"> Image / Photo</label>
            </div>
            <div id="img-input-area">
                <input type="text" id="bg-img-url" placeholder="Paste URL" oninput="updateVisRealtime()">
                <button onclick="document.getElementById('local-img').click()">Upload Local Photo</button>
                <input type="file" id="local-img" hidden accept="image/*" onchange="handleLocalImg(this)">
            </div>
            <div style="margin: 20px 0;">
                <span style="font-size: 0.8rem; opacity: 0.7;">Filter Intensity (Opacity & Blur)</span>
                <input type="range" id="op-slide" min="0" max="1" step="0.05" oninput="updateVisRealtime()">
            </div>
        </div>

        <div class="setting-block">
            <div class="section-h">Interface & Weather Icons</div>
            <div class="color-row"><span>Weather UI Color</span> <input type="color" id="w-color-picker" oninput="updateVisRealtime()"></div>
            <div style="display:flex; gap:20px; margin-bottom:15px;">
                <label class="label-inline"><input type="checkbox" id="w-toggle" onchange="updateVisRealtime()"> Weather On</label>
                <label class="label-inline"><input type="checkbox" id="w-real-color" onchange="updateVisRealtime()"> Colored Icons</label>
            </div>
            <div class="color-row"><span>Global Icon Color</span> <input type="color" id="icon-picker" oninput="updateVisRealtime()"></div>
            <div class="color-row"><span>Default Link Text Color</span> <input type="color" id="link-picker" oninput="updateVisRealtime()"></div>
            <select id="target-mode" onchange="updateVisRealtime()"><option value="_self">Current Tab</option><option value="_blank">New Tab</option></select>
        </div>

        <div style="display:flex; gap:10px;">
            <button onclick="exportData()" style="background:#1b3d2f;">Backup Config</button>
            <button onclick="document.getElementById('file-input').click()" style="background:#1e3a5f;">Import Config</button>
        </div>
        <input type="file" id="file-input" style="display:none" onchange="importData(this)">
    </div>

    <div id="weather-modal" class="modal">
        <div class="section-h">Weather Locations</div>
        <div id="current-cities" style="margin-bottom:20px; border: 1px solid #222; border-radius: 8px; background: #050505;"></div>
        <input type="text" placeholder="Search city..." oninput="searchCity(this.value)">
        <div id="search-res" style="max-height: 200px; overflow-y: auto;"></div>
        <button onclick="closeModals()">Close</button>
    </div>

<script>
    const KEY = "DASH_TOTAL_INDEPENDENCE_V100";
    let state = JSON.parse(localStorage.getItem(KEY));
    const ICON_SET = [
        { class: "fa-solid fa-server", label: "Server" }, { class: "fa-solid fa-sliders", label: "Sliders" }, { class: "fa-brands fa-spotify", label: "Spotify" }, { class: "fa-solid fa-music", label: "Music" },
        { class: "fa-solid fa-1", label: "1" }, { class: "fa-solid fa-2", label: "2" }, { class: "fa-solid fa-3", label: "3" }, { class: "fa-solid fa-4", label: "4" }, { class: "fa-solid fa-5", label: "5" }
    ];
    const W_MAP = { 0: { icon: "fa-sun", color: "#FFD700" }, 1: { icon: "fa-cloud-sun", color: "#FFB800" }, 3: { icon: "fa-cloud", color: "#B0C4DE" }, 51: { icon: "fa-cloud-rain", color: "#00BFFF" }, 61: { icon: "fa-cloud-showers-heavy", color: "#1E90FF" }, 95: { icon: "fa-bolt", color: "#BA55D3" } };

    function getDefaults() {
        const createProfile = (col, name) => {
            const cats = [];
            for(let i=1; i<= (name === 'home' ? 5 : 3); i++) {
                let links = [];
                for(let j=1; j<= 5; j++) links.push({name:`Link ${j}`, url:"#", color: ""});
                cats.push({title:`Category ${i}`, color: col, url: "#", links: links});
            }
            return {
                ql: [{name:"fa-solid fa-server",url:"#",vis:false}, {name:"fa-solid fa-sliders",url:"#",vis:false}, {name:"fa-brands fa-spotify",url:"#",vis:false}, {name:"fa-solid fa-music",url:"#",vis:false}],
                categories: cats, showWeather: true, bgType: 'mesh', bgImg: '', opacity: 0.3, bgColor: "#1C1B22", iconColor: "#ffffff", linkColor: "#cccccc", weatherColor: "#ffffff", realWeatherColors: true, target: '_self'
            };
        };
        return { profile: 'home', cities: [{name: "Lisboa", lat: 38.71, lon: -9.13}], home: createProfile('#00d4ff', 'home'), work: createProfile('#ff8800', 'work') };
    }

    if (!state) state = getDefaults();
    let cityIdx = 0;

    function handleLocalImg(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 1920; let w = img.width, h = img.height;
                if (w > MAX) { h *= MAX/w; w = MAX; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                state[state.profile].bgImg = canvas.toDataURL('image/jpeg', 0.8);
                state[state.profile].bgType = 'img';
                saveAndRender(true);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function saveAndRender(refreshModal = false) {
        localStorage.setItem(KEY, JSON.stringify(state));
        const p = state[state.profile];
        document.body.style.backgroundColor = p.bgColor;
        document.documentElement.style.setProperty('--icon-color', p.iconColor);

        const bg = document.getElementById('full-bg');
        bg.style.backgroundImage = 'none'; bg.style.backgroundColor = 'transparent'; bg.style.filter = 'none';

        if (p.bgType === 'mesh') {
            const colors = p.categories.map(c => c.color);
            if (colors.length > 1) bg.style.backgroundImage = `linear-gradient(135deg, ${colors.join(',')})`;
            else if (colors.length === 1) bg.style.backgroundColor = colors[0];
            bg.style.opacity = p.opacity;
        } else if (p.bgType === 'img' && p.bgImg) {
            bg.style.backgroundImage = `url("${p.bgImg}")`;
            bg.style.opacity = 1;
            bg.style.filter = `blur(${p.opacity * 25}px) brightness(0.75)`;
        }

        const qlHtml = p.ql.slice(0, 4).filter(l => l.vis).map(l => `<a href="${l.url}" class="nav-link" target="${p.target}"><i class="${l.name}"></i></a>`).join('');
        document.getElementById('ql-nav').innerHTML = `<span class="nav-link" onclick="toggleProfile()"><i class="fa-solid ${p.profile==='home'?'fa-house':'fa-user-tie'}"></i></span>` + qlHtml;

        document.getElementById('grid').innerHTML = p.categories.map((c, ci) => `
            <div class="column">
                <a href="${c.url || '#'}" target="${p.target}" class="cat-title" style="color:${c.color}">${c.title}</a>
                ${c.links.map(l => `<div class="link-row"><a href="${l.url}" target="${p.target}" style="color:${l.color || p.linkColor || '#ccc'}">${l.name}</a></div>`).join('')}
            </div>`).join('');
        
        document.getElementById('weather-area').style.display = p.showWeather ? 'flex' : 'none';
        document.getElementById('weather-area').style.color = p.weatherColor;
        if(refreshModal) renderSettings();
    }

    function renderSettings() {
        const p = state[state.profile];
        document.getElementById('ql-list-editor').innerHTML = p.ql.slice(0, 4).map((l, i) => `
            <div class="ql-row">
                <input type="checkbox" ${l.vis ? 'checked' : ''} onchange="state['${state.profile}'].ql[${i}].vis=this.checked; saveAndRender();">
                <select onchange="state['${state.profile}'].ql[${i}].name=this.value; saveAndRender();">${ICON_SET.map(it => `<option value="${it.class}" ${l.name === it.class ? 'selected' : ''}>${it.label}</option>`).join('')}</select>
                <input type="text" value="${l.url}" oninput="state['${state.profile}'].ql[${i}].url=this.value; saveAndRender();">
            </div>`).join('');
        document.getElementById('cat-sel').innerHTML = p.categories.map((c, i) => `<option value="${i}">${c.title}</option>`).join('');
        document.getElementById('mesh-check').checked = p.bgType === 'mesh';
        document.getElementById('img-check').checked = p.bgType === 'img';
        document.getElementById('bg-color').value = p.bgColor;
        document.getElementById('op-slide').value = p.opacity;
        document.getElementById('icon-picker').value = p.iconColor;
        document.getElementById('link-picker').value = p.linkColor;
        document.getElementById('w-color-picker').value = p.weatherColor;
        document.getElementById('w-toggle').checked = p.showWeather;
        document.getElementById('w-real-color').checked = p.realWeatherColors;
        document.getElementById('target-mode').value = p.target;
        syncCategoryEditor();
    }

    function syncCategoryEditor() {
        const p = state[state.profile]; const idx = document.getElementById('cat-sel').value;
        if(p.categories[idx]) {
            const c = p.categories[idx];
            document.getElementById('cat-title').value = c.title; document.getElementById('cat-color').value = c.color; document.getElementById('cat-url').value = c.url || "";
            document.getElementById('link-list-editor').innerHTML = c.links.map((l, li) => `
                <div class="link-edit-row">
                    <input type="text" value="${l.name}" oninput="state['${state.profile}'].categories[${idx}].links[${li}].name=this.value; saveAndRender();">
                    <input type="text" value="${l.url}" oninput="state['${state.profile}'].categories[${idx}].links[${li}].url=this.value; saveAndRender();">
                    <input type="color" value="${l.color || p.linkColor}" oninput="state['${state.profile}'].categories[${idx}].links[${li}].color=this.value; saveAndRender();">
                    <button style="background:#300; color:red; margin:0;" onclick="state['${state.profile}'].categories[${idx}].links.splice(${li},1); syncCategoryEditor(); saveAndRender();">✕</button>
                </div>`).join('');
        }
    }

    function updateVisRealtime() {
        const p = state[state.profile];
        p.bgColor = document.getElementById('bg-color').value;
        p.opacity = document.getElementById('op-slide').value;
        p.iconColor = document.getElementById('icon-picker').value;
        p.linkColor = document.getElementById('link-picker').value;
        p.weatherColor = document.getElementById('w-color-picker').value;
        p.showWeather = document.getElementById('w-toggle').checked;
        p.realWeatherColors = document.getElementById('w-real-color').checked;
        p.target = document.getElementById('target-mode').value;
        const imgUrl = document.getElementById('bg-img-url').value;
        if(p.bgType === 'img' && imgUrl.startsWith('http')) p.bgImg = imgUrl;
        saveAndRender(); updateWeather();
    }

    async function updateWeather() {
        const p = state[state.profile]; const city = state.cities[cityIdx]; if(!city || !p.showWeather) return;
        document.getElementById('city-name').textContent = city.name;
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&daily=weathercode,temperature_2m_max&timezone=auto`);
            const d = await r.json();
            document.getElementById('weather-grid').innerHTML = d.daily.time.slice(0,4).map((t, i) => {
                const code = d.daily.weathercode[i]; const w = W_MAP[code] || { icon: "fa-sun", color: "#FFD700" };
                const iconCol = p.realWeatherColors ? w.color : p.weatherColor;
                return `<div class="weather-card"><div style="font-size:0.6rem;opacity:0.5;">${new Date(t).toLocaleDateString('en',{weekday:'short'})}</div><i class="fa-solid ${w.icon}" style="color:${iconCol}"></i><div class="weather-temp">${Math.round(d.daily.temperature_2m_max[i])}°</div></div>`;
            }).join('');
        } catch(e) {}
    }

    function renderCityList() { document.getElementById('current-cities').innerHTML = state.cities.map((c, i) => `<div class="city-item"><span>${c.name}</span><button onclick="state.cities.splice(${i},1); renderCityList(); updateWeather();" style="width:auto;padding:5px 10px;background:#300;">✕</button></div>`).join(''); }
    async function searchCity(v) { if(v.length<3) return; const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${v}&count=5`); const d = await r.json(); document.getElementById('search-res').innerHTML = (d.results || []).map(res => `<div onclick="state.cities.push({name:'${res.name}',lat:${res.latitude},lon:${res.longitude}}); updateWeather(); renderCityList(); document.getElementById('search-res').innerHTML='';" style="cursor:pointer;padding:8px;border-bottom:1px solid #111;">${res.name}</div>`).join(''); }
    
    function toggleProfile() { state.profile = (state.profile === 'home' ? 'work' : 'home'); saveAndRender(); updateWeather(); }
    function openModal(id) { document.getElementById(id).style.display = 'block'; document.getElementById('overlay').style.display = 'block'; renderSettings(); if(id==='weather-modal') renderCityList(); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('overlay').style.display='none'; }
    function updateCatRealtime() { const idx = document.getElementById('cat-sel').value; const c = state[state.profile].categories[idx]; c.title = document.getElementById('cat-title').value; c.color = document.getElementById('cat-color').value; c.url = document.getElementById('cat-url').value; saveAndRender(); }
    function addLinkInline() { const idx = document.getElementById('cat-sel').value; state[state.profile].categories[idx].links.push({name:"New Link", url:"#", color:""}); syncCategoryEditor(); saveAndRender(); }
    function addCat() { 
        const newLinks = []; for(let i=1; i<=5; i++) newLinks.push({name:`Link ${i}`, url:"#", color:""});
        state[state.profile].categories.push({title:"New Category", color:"#00d4ff", url:"#", links:newLinks}); renderSettings(); saveAndRender(); 
    }
    function resetToBaseColor() { state[state.profile].bgColor = "#1C1B22"; saveAndRender(true); }
    function toggleBgType(t) { state[state.profile].bgType = t; saveAndRender(true); }
    function exportData() { const b = new Blob([JSON.stringify(state)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download='config.json'; a.click(); }
    function importData(input) { const f = input.files[0]; if(!f) return; const r = new FileReader(); r.onload = (e) => { state = JSON.parse(e.target.result); saveAndRender(); }; r.readAsText(f); }
    function cycleCity() { if(state.cities.length > 1) { cityIdx = (cityIdx + 1) % state.cities.length; updateWeather(); } }
    window.onload = () => { saveAndRender(); updateWeather(); };
</script>
</body>
</html>
