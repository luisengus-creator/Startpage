<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startpage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --bg: #1C1B22; 
            --scale: 1; 
            --density-mod: 1;
            --fs-unit: calc(1rem * var(--scale) * var(--density-mod));
            --fade-speed: 0.5s;
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); color: white; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; 
            font-size: var(--fs-unit);
        }
        .ready body { transition: background-color var(--fade-speed) ease; }
        
        #full-bg { 
            position: fixed; inset: 0; z-index: -1; pointer-events: none; 
            background-size: cover; background-position: center; 
            background-repeat: no-repeat;
        }
        .ready #full-bg {
            transition: opacity var(--fade-speed) ease, filter var(--fade-speed) ease, background var(--fade-speed) ease, transform var(--fade-speed) ease;
        }
        .zoom-effect { transform: scale(1.05); }

        .container { width: 100%; height: 100%; margin: 0 auto; padding: 2vh 2vw; display: flex; flex-direction: column; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; z-index: 10; flex-shrink: 0; margin-bottom: 2vh; }
        .nav-group { display: flex; gap: 1.2rem; align-items: center; }
        .nav-link { cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; width: 2.2rem; height: 2.2rem; }
        .nav-link i { font-size: 1.2rem; color: var(--icon-color, #ffffff); transition: 0.3s; }
        .nav-link:hover i { opacity: 0.6; }
        
        #main-content { 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            overflow: hidden; 
            padding: 1vh; 
        }
        .ready #main-content { transition: opacity var(--fade-speed) ease, transform var(--fade-speed) ease; }
        .fade-out { opacity: 0; transform: translateY(10px); }
        
        #grid { 
            display: flex;
            flex-wrap: nowrap;
            gap: calc(1.2rem * var(--scale) * var(--density-mod));
            justify-content: center;
            align-items: center;
            width: fit-content;
            max-width: 100%;
        }

        .column { 
            background: rgba(255,255,255,0.02); 
            border-radius: 4px; 
            padding: calc(1.2rem * var(--scale) * var(--density-mod)); 
            position: relative; 
            border: 1px solid rgba(255,255,255,0.06); 
            backdrop-filter: blur(12px); 
            text-align: center; 
            flex: 0 0 auto;
            width: fit-content;
            min-width: calc(160px * var(--scale) * var(--density-mod));
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .cat-controls {
            display: none;
            justify-content: flex-end;
            margin-bottom: 5px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .edit-mode .cat-controls { display: flex; }

        .cat-title { 
            margin: 0 0 calc(1rem * var(--scale) * var(--density-mod)) 0; 
            font-size: calc(1.3rem * var(--scale) * var(--density-mod)); 
            font-weight: 700; 
            padding-bottom: calc(10px * var(--scale) * var(--density-mod)); 
            border-bottom: 2px solid rgba(255,255,255,0.1); 
            white-space: nowrap; 
            cursor: pointer; 
            text-decoration: none; 
            display: block; 
        }
        .cat-title.hidden-header { display: none; }
        
        .link-row { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: calc(0.5rem * var(--scale) * var(--density-mod)) calc(0.8rem * var(--scale) * var(--density-mod)); 
            border-bottom: 1px solid rgba(255,255,255,0.03); 
            position: relative; 
            gap: 15px;
            white-space: nowrap;
        }
        .link-row a { 
            text-decoration: none; 
            transition: 0.2s; 
            font-size: calc(1rem * var(--scale) * var(--density-mod));
        }
        
        .del-btn { 
            display: none; 
            color: #ff4444; 
            cursor: pointer; 
            transition: 0.2s; 
            font-size: 0.75rem;
            padding: 2px; 
            opacity: 0.5;
        }
        .del-btn:hover { color: #ff0000; opacity: 1; transform: scale(1.1); }
        .edit-mode .del-btn { display: inline-block; }

        #weather-area { padding: 1.5vh 0; display: none; flex-direction: column; align-items: center; gap: 0.6rem; z-index: 10; flex-shrink: 0; min-height: 120px; }
        .ready #weather-area { transition: opacity var(--fade-speed) ease; }
        #city-name { font-size: 0.75rem; opacity: 0.5; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }
        #weather-grid { display: flex; gap: 0.6rem; align-items: center; cursor: pointer; }
        .weather-card { background: rgba(255,255,255,0.03); padding: 0.5rem 0.7rem; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); text-align: center; min-width: 5.5rem; }
        .weather-card i { font-size: 1.1rem; margin: 0.3rem 0; }
        .weather-day-label { font-size: 0.6rem; opacity: 0.5; text-transform: uppercase; }
        .weather-temp { font-weight: bold; font-size: 0.9rem; }
        
        /* Modal Base */
        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #0a0a0a; padding: 1.5rem; border-radius: 16px; z-index: 2000; 
            width: min(500px, 95vw); max-height: 85vh; overflow-y: auto; border: 1px solid #222; 
        }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(5px); }
        .section-h { font-size:0.65rem; color:#00d4ff; font-weight:900; margin: 0 0 0.8rem 0; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }
        .setting-block { margin-bottom: 1.8rem; }
        
        input, select { 
            background: #111; border: 1px solid #222; color: white; padding: 0 10px; 
            border-radius: 6px; width: 100%; font-size: 0.85rem; height: 36px; 
        }
        
        .size-group { display: flex; gap: 4px; background: #111; padding: 4px; border-radius: 8px; border: 1px solid #222; }
        .size-btn { flex: 1; height: 32px; border-radius: 5px; border: none; background: transparent; color: #666; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 0.8rem;}
        .size-btn.active { background: #00d4ff; color: #000; }

        button { 
            cursor: pointer; background: #222; border: none; padding: 10px; border-radius: 6px; 
            width: 100%; font-weight: bold; font-size: 0.85rem; color: white; transition: 0.2s; 
        }
        button:hover { background: #333; }
        
        /* Standardized Checkboxes */
        input[type="checkbox"] { 
            width: 16px !important; 
            height: 16px !important; 
            margin: 0; 
            cursor: pointer; 
            flex-shrink: 0;
            accent-color: #00d4ff;
        }

        .label-inline { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; cursor: pointer; color: #ccc; }

        .btn-backup { background: #1a4fb4 !important; }
        .btn-import { background: #188d50 !important; }
        .btn-reset { background: #4b0000 !important; color: #ffcccc !important; margin-top: 10px !important; }
        
        .flex-row { display: flex; gap: 8px; }
        .flex-row button { flex: 1; margin: 0; }
        
        .editor-link-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; width: 100%; }
        .editor-link-row input[type="text"] { flex: 1; height: 32px; font-size: 0.75rem; }
        .editor-link-row input[type="color"] { width: 32px; height: 32px; padding: 2px; border: 1px solid #333; }
        .editor-link-row .tiny-del { width: 32px; height: 32px; background: #1a0a0a; color: #ff4444; border: 1px solid #322; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .ql-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
        .ql-row select, .ql-row input[type="text"] { height: 32px; font-size: 0.75rem; }

        .color-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.8rem; color: #ccc; }
        .color-row input[type="color"] { width: 40px; height: 24px; padding: 0; border: none; background: none; }
        
        /* Compact Weather Modal Styling */
        .city-item { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 4px; background: rgba(255,255,255,0.03); 
            padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05);
        }
        .city-item span { font-size: 0.75rem; color: #eee; font-weight: 500; }
        .city-item i { color: #f44; cursor: pointer; font-size: 0.7rem; opacity: 0.6; transition: 0.2s; }

        .search-result-item { 
            padding: 6px 10px; border-bottom: 1px solid #1a1a1a; 
            cursor: pointer; font-size: 0.7rem; color: #aaa; transition: 0.2s;
        }
        
        input[type="range"] { height: 6px; background: #222; border-radius: 5px; appearance: none; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; background: #00d4ff; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="full-bg"></div>
    <div id="overlay" onclick="closeModals()"></div>
    <div class="container">
        <header class="top-bar">
            <div id="ql-nav" class="nav-group"></div>
            <div class="nav-group">
                <span class="nav-link" onclick="document.body.classList.toggle('edit-mode')"><i class="fa-solid fa-pen"></i></span>
                <span class="nav-link" onclick="openModal('settings-modal')"><i class="fa-solid fa-gear"></i></span>
            </div>
        </header>
        <main id="main-content"><div id="grid"></div></main>
        <section id="weather-area">
            <span id="city-name" onclick="cycleCity()">---</span>
            <div id="weather-grid" onclick="openModal('weather-modal')"></div>
        </section>
    </div>

    <div id="settings-modal" class="modal">
        <div class="setting-block">
            <div class="section-h">Density & Navigation</div>
            <div class="size-group" style="margin-bottom: 10px;">
                <button class="size-btn" id="size-s" onclick="updateDensity('s')">Small</button>
                <button class="size-btn" id="size-m" onclick="updateDensity('m')">Medium</button>
                <button class="size-btn" id="size-l" onclick="updateDensity('l')">Large</button>
            </div>
            <select id="target-mode" onchange="updateVisRealtime()"><option value="_self">Current Tab</option><option value="_blank">New Tab</option></select>
        </div>

        <div class="setting-block">
            <div class="section-h">Quick Links Bar</div>
            <div id="ql-list-editor"></div>
        </div>

        <div class="setting-block">
            <div class="section-h">Categories & Content</div>
            <label class="label-inline" style="margin-bottom: 10px;"><input type="checkbox" id="header-vis-check" onchange="updateVisRealtime()"> Show Category Headers</label>
            <select id="cat-sel" onchange="syncCategoryEditor()" style="margin-bottom:8px;"></select>
            <div class="flex-row" style="margin-bottom:8px;">
                <input type="text" id="cat-title" oninput="updateCatRealtime()" placeholder="Title">
                <input type="color" id="cat-color" oninput="updateCatRealtime()" style="width: 50px;">
            </div>
            <input type="text" id="cat-url" oninput="updateCatRealtime()" placeholder="Header Link URL (optional)" style="margin-bottom:10px;">
            <div id="link-list-editor" style="border: 1px solid #1a1a1a; padding: 8px; border-radius: 8px; max-height: 200px; overflow-y: auto; background: #050505; margin-bottom: 8px;"></div>
            <div class="flex-row"><button onclick="addCat()">+ Category</button><button onclick="addLinkInline()">+ Link</button></div>
        </div>

        <div class="setting-block">
            <div class="section-h">Appearance</div>
            <div class="color-row"><span>Main Icon Color</span> <input type="color" id="icon-color-picker" oninput="updateIconColor(this.value)"></div>
            <div class="color-row"><span>Global Links Color</span> <input type="color" id="link-color-picker" oninput="handleGlobalLinkColor(this.value)"></div>
            <div class="color-row"><span>Weather Text Color</span> <input type="color" id="weather-color-picker" oninput="updateVisRealtime()"></div>
            <label class="label-inline" style="margin: 10px 0;"><input type="checkbox" id="w-enable-check" onchange="updateVisRealtime()"> Enable Weather</label>
            <div class="flex-row">
                <label class="label-inline"><input type="checkbox" id="w-colored-check" onchange="toggleWeatherStyle('colored')"> Colored Icons</label>
                <label class="label-inline"><input type="checkbox" id="w-solid-check" onchange="toggleWeatherStyle('solid')"> Solid Icons</label>
            </div>
        </div>

        <div class="setting-block">
            <div class="section-h">Background</div>
            <input type="text" id="bg-img-url" placeholder="Paste Image URL..." oninput="updateBgImg(this.value)" style="margin-bottom:8px;">
            <div class="flex-row"><button onclick="document.getElementById('bg-file').click()">Upload</button><button style="color:#f88;" onclick="updateBgImg('')">Remove</button></div>
            <input type="file" id="bg-file" style="display:none" accept="image/*" onchange="handleBgFile(this)">
            <div class="color-row" style="margin-top:12px;"><span>Background Color</span> <input type="color" id="bg-color" oninput="updateVisRealtime()"></div>
            <label class="label-inline" style="margin-bottom: 10px;"><input type="checkbox" id="mesh-check" onchange="toggleGradientMode(this.checked)"> Use Category Gradient</label>
            <div><span id="slider-label" style="font-size: 0.75rem; opacity: 0.6;">Intensity / Opacity</span><input type="range" id="unified-slider" min="0" max="1" step="0.05" oninput="updateVisRealtime()"></div>
        </div>

        <div class="flex-row" style="margin-top: 2rem;"><button class="btn-backup" onclick="exportData()">Backup</button><button class="btn-import" onclick="document.getElementById('file-input').click()">Import</button></div>
        <button class="btn-reset" onclick="resetToDefaults()">Factory Reset</button>
        <input type="file" id="file-input" style="display:none" onchange="importData(this)">
    </div>

    <div id="weather-modal" class="modal">
        <h3 style="margin:0 0 0.8rem 0; font-size: 0.85rem; letter-spacing: 0.5px;">Locations</h3>
        <div id="city-list-manager" style="margin-bottom: 0.8rem; max-height: 120px; overflow-y: auto; padding-right: 4px;"></div>
        <input type="text" placeholder="Search for a city..." oninput="searchCity(this.value)" style="height: 32px; font-size: 0.75rem;">
        <div id="search-results" style="max-height: 140px; overflow-y: auto; background: #050505; border-radius: 6px; margin-top: 5px;"></div>
        <button onclick="closeModals()" style="margin-top: 15px; height: 36px; font-size: 0.8rem;">Done</button>
    </div>

<script>
    const KEY = "STARTPAGE_V66_PROFILE_WEATHER";
    const ICON_LIST = ["fa-solid fa-server", "fa-solid fa-sliders", "fa-brands fa-spotify", "fa-solid fa-star", "fa-solid fa-music", "fa-brands fa-github", "fa-solid fa-terminal", "fa-solid fa-code", "fa-solid fa-heart", "fa-solid fa-play"];
    const W_DATA = { 0: { icon: "fa-sun", color: "#FFD700" }, 1: { icon: "fa-cloud-sun", color: "#FFB800" }, 2: { icon: "fa-cloud-sun", color: "#FFB800" }, 3: { icon: "fa-cloud", color: "#B0C4DE" }, 45: { icon: "fa-smog", color: "#778899" }, 51: { icon: "fa-cloud-rain", color: "#00BFFF" }, 61: { icon: "fa-cloud-showers-heavy", color: "#1E90FF" }, 95: { icon: "fa-bolt", color: "#BA55D3" } };

    function generateDefaultCats(count, prefix) {
        const cats = [];
        for(let i=1; i<=count; i++) {
            let links = [];
            for(let j=1; j<=5; j++) links.push({name:`Link ${j}`, url:"", color: ""});
            cats.push({title:`${prefix} ${i}`, color: prefix === "Work" ? "#ff8800" : "#00d4ff", url: "", links: links});
        }
        return cats;
    }

    function getDefaults() {
        const baseQl = [{name:"fa-solid fa-server", url:"", vis:false}, {name:"fa-solid fa-sliders", url:"", vis:false}, {name:"fa-brands fa-spotify", url:"", vis:false}, {name:"fa-solid fa-star", url:"", vis:false}];
        return {
            profile: 'home', target: '_self', linkColor: "#cccccc",
            cities: [{name: "Lisboa", lat: 38.71, lon: -9.13}],
            home: { ql: JSON.parse(JSON.stringify(baseQl)), categories: generateDefaultCats(5, "Category"), showWeather: true, showHeaders: true, iconColor: "#ffffff", bgColor: "#1C1B22", bgImg: "", mesh: true, opacity: 0.3, fuzzy: 0, weatherColor: "#ffffff", wColored: true, density: 'l' },
            work: { ql: JSON.parse(JSON.stringify(baseQl)), categories: generateDefaultCats(3, "Work"), showWeather: true, showHeaders: true, iconColor: "#ffffff", bgColor: "#1C1B22", bgImg: "", mesh: true, opacity: 0.3, fuzzy: 0, weatherColor: "#ffffff", wColored: true, density: 'm' }
        };
    }

    let state = JSON.parse(localStorage.getItem(KEY)) || getDefaults();
    let cityIdx = 0;

    function updateDensity(size) {
        state[state.profile].density = size;
        saveAndRender();
        renderSettings();
    }

    function applyDynamicScaling() {
        const p = state[state.profile];
        const grid = document.getElementById('grid');
        if (!grid || !p.categories.length) return;
        const mod = p.density === 's' ? 0.6 : p.density === 'm' ? 0.8 : 1.0;
        document.documentElement.style.setProperty('--density-mod', mod);
        document.documentElement.style.setProperty('--scale', 1);
        const topBarHeight = 80, weatherHeight = p.showWeather ? 140 : 0;
        const availableHeight = window.innerHeight - topBarHeight - weatherHeight - 60;
        const availableWidth = window.innerWidth * 0.94;
        const maxLinks = Math.max(...p.categories.map(c => c.links.length), 1);
        const rowHeight = 45 * mod, headerHeight = (p.showHeaders ? 60 : 10) * mod;
        const naturalHeight = (maxLinks * rowHeight) + headerHeight;
        const naturalWidth = grid.scrollWidth;
        let vScale = availableHeight / naturalHeight;
        let hScale = availableWidth / naturalWidth;
        let scale = Math.min(vScale, hScale);
        scale = Math.max(Math.min(scale, 1.6), 0.5);
        document.documentElement.style.setProperty('--scale', scale);
    }

    window.addEventListener('resize', applyDynamicScaling);

    function toggleProfile() {
        const main = document.getElementById('main-content'), weather = document.getElementById('weather-area'), bg = document.getElementById('full-bg');
        main.classList.add('fade-out'); weather.classList.add('fade-out'); bg.classList.add('zoom-effect');
        setTimeout(() => {
            state.profile = (state.profile === 'home' ? 'work' : 'home');
            saveAndRender(); updateWeather();
            main.classList.remove('fade-out'); weather.classList.remove('fade-out'); bg.classList.remove('zoom-effect');
            if(document.getElementById('settings-modal').style.display === 'block') renderSettings();
        }, 350);
    }

    function saveAndRender(refreshModal = false) {
        localStorage.setItem(KEY, JSON.stringify(state));
        const p = state[state.profile];
        if (!p) return; 
        document.body.style.backgroundColor = p.bgColor;
        document.documentElement.style.setProperty('--icon-color', p.iconColor);
        const bg = document.getElementById('full-bg');
        if(!bg) return;
        bg.style.backgroundImage = "none"; bg.style.background = "none";
        if (p.bgImg) { bg.style.backgroundImage = `url(${p.bgImg})`; bg.style.opacity = 1; bg.style.filter = `blur(${p.fuzzy || 0}px)`; } 
        else if (p.mesh && p.categories && p.categories.length > 0) {
            const cols = p.categories.map(x => x.color);
            bg.style.background = cols.length > 1 ? `linear-gradient(135deg, ${cols.join(',')})` : (cols[0] || p.bgColor); 
            bg.style.opacity = p.opacity; bg.style.filter = "none";
        } else { bg.style.opacity = 0; }
        const profileIcon = state.profile === 'home' ? 'fa-house' : 'fa-user-tie';
        const qlHtml = p.ql.filter(l => l.vis).map(l => `<a href="${l.url}" class="nav-link active" target="${state.target}"><i class="${l.name}"></i></a>`).join('');
        document.getElementById('ql-nav').innerHTML = `<span class="nav-link active" onclick="toggleProfile()"><i class="fa-solid ${profileIcon}"></i></span>` + qlHtml;
        document.getElementById('grid').innerHTML = p.categories.map((c, ci) => `
            <div class="column">
                <div style="position:absolute; inset:0; background:linear-gradient(${c.color}22, transparent); opacity:0.3; z-index:-1;"></div>
                <div class="cat-controls"><i class="fa-solid fa-trash-can del-btn" onclick="delCat(${ci})"></i></div>
                <div class="cat-title ${p.showHeaders ? '' : 'hidden-header'}" style="color:${c.color};">
                    <a href="${c.url || '#'}" target="${state.target}" style="color:inherit; text-decoration:none;">${c.title}</a>
                </div>
                ${c.links.map((l, li) => `<div class="link-row"><a href="${l.url}" target="${state.target}" style="color:${l.color || state.linkColor}">${l.name}</a><i class="fa-solid fa-trash-can del-btn" onclick="delLink(${ci},${li})"></i></div>`).join('')}
            </div>`).join('');
        document.getElementById('weather-area').style.display = p.showWeather ? 'flex' : 'none';
        applyDynamicScaling();
        if(refreshModal) syncCategoryEditor();
    }

    function renderSettings() {
        const p = state[state.profile];
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`size-${p.density || 'l'}`).classList.add('active');
        document.getElementById('cat-sel').innerHTML = p.categories.map((c, i) => `<option value="${i}">${c.title}</option>`).join('');
        if(!p.categories[document.getElementById('cat-sel').value]) document.getElementById('cat-sel').value = 0;
        const slider = document.getElementById('unified-slider'), label = document.getElementById('slider-label');
        if (p.bgImg) { label.textContent = "Photo Blur Intensity"; slider.min = 0; slider.max = 30; slider.step = 1; slider.value = p.fuzzy || 0; } 
        else { label.textContent = "Gradient Opacity"; slider.min = 0; slider.max = 1; slider.step = 0.05; slider.value = p.opacity; }
        document.getElementById('ql-list-editor').innerHTML = p.ql.map((l, i) => `<div class="ql-row"><input type="checkbox" ${l.vis ? 'checked' : ''} onchange="updateQlRealtime(${i},'vis',this.checked)"><select onchange="updateQlRealtime(${i},'name',this.value)" style="margin:0;">${ICON_LIST.map(ic => `<option value="${ic}" ${l.name === ic ? 'selected' : ''}>${ic.split('-').pop()}</option>`).join('')}</select><input type="text" value="${l.url}" placeholder="URL" oninput="updateQlRealtime(${i},'url',this.value)" style="margin:0;"></div>`).join('');
        document.getElementById('target-mode').value = state.target;
        document.getElementById('bg-img-url').value = p.bgImg.startsWith('data:') ? "Local Image Active" : p.bgImg;
        document.getElementById('mesh-check').checked = p.mesh;
        document.getElementById('bg-color').value = p.bgColor;
        document.getElementById('icon-color-picker').value = p.iconColor;
        document.getElementById('link-color-picker').value = state.linkColor;
        document.getElementById('weather-color-picker').value = p.weatherColor;
        document.getElementById('w-enable-check').checked = p.showWeather;
        document.getElementById('w-colored-check').checked = p.wColored;
        document.getElementById('w-solid-check').checked = !p.wColored;
        document.getElementById('header-vis-check').checked = (p.showHeaders !== false);
        syncCategoryEditor();
    }

    function updateVisRealtime() { 
        const p = state[state.profile];
        state.target = document.getElementById('target-mode').value; p.mesh = document.getElementById('mesh-check').checked; 
        p.bgColor = document.getElementById('bg-color').value; p.weatherColor = document.getElementById('weather-color-picker').value;
        p.showWeather = document.getElementById('w-enable-check').checked;
        p.showHeaders = document.getElementById('header-vis-check').checked;
        const sliderVal = document.getElementById('unified-slider').value;
        if (p.bgImg) { p.fuzzy = sliderVal; } else { p.opacity = sliderVal; }
        saveAndRender(); updateWeather();
    }

    function renderCityManager() { document.getElementById('city-list-manager').innerHTML = state.cities.map((c, i) => `<div class="city-item"><span>${c.name}</span><i class="fa-solid fa-trash-can" onclick="removeCity(${i})"></i></div>`).join(''); }
    async function searchCity(q) { if(q.length < 3) { document.getElementById('search-results').innerHTML = ''; return; } const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${q}&count=5&language=en&format=json`); const d = await r.json(); document.getElementById('search-results').innerHTML = (d.results || []).map(c => `<div class="search-result-item" onclick="addCity('${c.name}', ${c.latitude}, ${c.longitude})">${c.name}, ${c.admin1 || ''} (${c.country_code})</div>`).join(''); }
    async function updateWeather() {
        const p = state[state.profile], city = state.cities[cityIdx]; if(!city || !p.showWeather) return;
        document.getElementById('city-name').textContent = city.name; document.getElementById('city-name').style.color = p.weatherColor;
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&daily=weathercode,temperature_2m_max&timezone=auto`), d = await r.json();
            document.getElementById('weather-grid').innerHTML = d.daily.time.slice(0,7).map((t, i) => {
                const weather = W_DATA[d.daily.weathercode[i]] || { icon: "fa-sun", color: "#FFD700" }, iconColor = p.wColored ? weather.color : p.weatherColor;
                return `<div class="weather-card"><div class="weather-day-label">${new Date(t).toLocaleDateString('en',{weekday:'short'})}</div><i class="fa-solid ${weather.icon}" style="color:${iconColor}"></i><div class="weather-temp" style="color:${p.weatherColor}">${Math.round(d.daily.temperature_2m_max[i])}°</div></div>`;
            }).join('');
        } catch(e) {}
    }

    function toggleWeatherStyle(type) { const p = state[state.profile]; if(type === 'colored') { p.wColored = true; document.getElementById('w-solid-check').checked = false; } else { p.wColored = false; document.getElementById('w-colored-check').checked = false; } updateVisRealtime(); }
    function openModal(id) { document.getElementById(id).style.display = 'block'; document.getElementById('overlay').style.display = 'block'; if(id === 'settings-modal') renderSettings(); if(id === 'weather-modal') renderCityManager(); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('overlay').style.display='none'; }
    function syncCategoryEditor() { 
        const p = state[state.profile], idx = document.getElementById('cat-sel').value; 
        if(idx !== "" && p.categories[idx]) { 
            const c = p.categories[idx]; 
            document.getElementById('cat-title').value = c.title; document.getElementById('cat-color').value = c.color; document.getElementById('cat-url').value = c.url || ""; 
            document.getElementById('link-list-editor').innerHTML = c.links.map((l, li) => `<div class="editor-link-row"><input type="text" value="${l.name}" oninput="updateLinkRealtime(${idx}, ${li}, 'name', this.value)"><input type="text" value="${l.url}" placeholder="URL" oninput="updateLinkRealtime(${idx}, ${li}, 'url', this.value)"><input type="color" value="${l.color || state.linkColor}" oninput="updateLinkRealtime(${idx}, ${li}, 'color', this.value)"><div class="tiny-del" onclick="delLink(${idx}, ${li}); syncCategoryEditor();"><i class="fa-solid fa-trash-can"></i></div></div>`).join(''); 
        } 
    }
    function updateCatRealtime() { const idx = document.getElementById('cat-sel').value, c = state[state.profile].categories[idx]; c.title = document.getElementById('cat-title').value; c.color = document.getElementById('cat-color').value; c.url = document.getElementById('cat-url').value; saveAndRender(); }
    function updateLinkRealtime(ci, li, k, v) { state[state.profile].categories[ci].links[li][k] = v; saveAndRender(); }
    function updateQlRealtime(i, k, v) { state[state.profile].ql[i][k] = v; saveAndRender(); }
    function addCat() { state[state.profile].categories.push({title:"New Category", color:"#00d4ff", url: "", links:[]}); saveAndRender(true); renderSettings(); }
    function addLinkInline() { const idx = document.getElementById('cat-sel').value; state[state.profile].categories[idx].links.push({name: "New Link", url: "", color: state.linkColor}); saveAndRender(true); }
    function delCat(i) { if(confirm("Delete category?")) { state[state.profile].categories.splice(i,1); saveAndRender(); renderSettings(); } }
    function delLink(ci, li) { state[state.profile].categories[ci].links.splice(li,1); saveAndRender(); }
    function exportData() { const b = new Blob([JSON.stringify(state)], {type:'application/json'}), a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download='startpage_backup.json'; a.click(); }
    function importData(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                state = JSON.parse(e.target.result);
                saveAndRender(); renderSettings(); updateWeather();
                alert("Import successful!"); closeModals();
            } catch(err) { alert("Invalid backup file."); }
        };
        reader.readAsText(file);
    }
    function resetToDefaults() { if(confirm("Factory reset? This will erase everything.")) { state = getDefaults(); saveAndRender(); renderSettings(); updateWeather(); } }
    function handleBgFile(input) { const file = input.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (e) => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); const MAX_WIDTH = 1920; let width = img.width, height = img.height; if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } canvas.width = width; canvas.height = height; canvas.getContext('2d').drawImage(img, 0, 0, width, height); updateBgImg(canvas.toDataURL('image/jpeg', 0.7)); }; img.src = e.target.result; }; reader.readAsDataURL(file); }
    function updateIconColor(val) { state[state.profile].iconColor = val; saveAndRender(); }
    function handleGlobalLinkColor(val) { state.linkColor = val; state[state.profile].categories.forEach(cat => { cat.links.forEach(link => { link.color = val; }); }); saveAndRender(); syncCategoryEditor(); }
    function updateBgImg(val) { const p = state[state.profile]; p.bgImg = val; if(val) p.mesh = false; saveAndRender(); renderSettings(); }
    function toggleGradientMode(checked) { const p = state[state.profile]; p.mesh = checked; if(checked) p.bgImg = ""; saveAndRender(); renderSettings(); }
    function addCity(name, lat, lon) { state.cities.push({name, lat, lon}); document.getElementById('search-results').innerHTML = ''; renderCityManager(); saveAndRender(); updateWeather(); }
    function removeCity(i) { if(state.cities.length > 1) { state.cities.splice(i, 1); cityIdx = 0; renderCityManager(); saveAndRender(); updateWeather(); } }
    function cycleCity() { cityIdx = (cityIdx + 1) % state.cities.length; updateWeather(); }

    window.onload = () => { 
        saveAndRender(); 
        updateWeather(); 
        setTimeout(() => document.documentElement.classList.add('ready'), 100);
    };
</script>
</body>
</html>
