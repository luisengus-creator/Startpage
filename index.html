<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startpage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --bg: #1C1B22; 
            --fs-base: clamp(0.9rem, 1.1vw, 1.4rem); 
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; 
            background-color: var(--bg); color: white; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; font-size: var(--fs-base);
        }
        #full-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0; }
        #full-bg.ready { transition: opacity 0.8s ease-in-out, background 1.2s ease-in-out; }

        .container { 
            width: 100%; height: 100%; margin: 0 auto; 
            padding: 3vh 4vw; 
            display: flex; flex-direction: column; 
        }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; z-index: 10; flex-shrink: 0; margin-bottom: 3vh; }
        .nav-group { display: flex; gap: 1.2rem; align-items: center; }
        .nav-link { cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; width: 1.8rem; height: 1.8rem; }
        .nav-link i { font-size: 1.1rem; color: var(--icon-color, #ffffff); transition: 0.3s; }
        .nav-link:hover i { opacity: 0.6; }

        #main-content { 
            flex-grow: 1; display: flex; align-items: center; justify-content: center; 
            width: 100%; overflow-y: auto; padding: 2vh 0; 
        }
        
        #grid { 
            display: flex; flex-wrap: wrap; 
            gap: clamp(1.5rem, 3vw, 4rem); 
            justify-content: center; 
            align-content: center; 
            width: 100%; 
        }
        
        .column { 
            background: rgba(255,255,255,0.02); border-radius: 16px; 
            padding: 1.5rem 1.8rem; 
            position: relative; border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(12px);
            flex: 0 0 auto; 
            width: max-content; 
            min-width: 180px;
            text-align: center;
        }

        .cat-title { 
            margin: 0 0 1rem 0; 
            font-size: 1.3rem; 
            font-weight: 700;
            padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); 
            white-space: nowrap; cursor: pointer; text-decoration: none; display: block; 
        }
        .link-row { 
            display: flex; justify-content: center; align-items: center; 
            padding: 0.6rem 0; 
            border-bottom: 1px solid rgba(255,255,255,0.03); position: relative; white-space: nowrap; 
        }
        .link-row a { text-decoration: none; transition: 0.2s; font-size: 1rem; }

        #weather-area { padding: 2vh 0; display: none; flex-direction: column; align-items: center; gap: 0.8rem; z-index: 10; flex-shrink: 0; }
        #city-name { font-size: 0.8rem; opacity: 0.5; letter-spacing: 4px; cursor: pointer; text-transform: uppercase; }
        #weather-grid { display: flex; gap: 0.8rem; align-items: center; cursor: pointer; flex-wrap: nowrap; }
        .weather-card { background: rgba(255,255,255,0.03); padding: 0.7rem 0.9rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center; min-width: 6rem; }
        .weather-card i { font-size: 1.3rem; margin: 0.4rem 0; }
        .weather-day-label { font-size: 0.65rem; opacity: 0.5; text-transform: uppercase; }
        .weather-temp { font-weight: bold; font-size: 1rem; }

        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #0a0a0a; padding: 2rem; border-radius: 20px; z-index: 2000; 
            width: min(600px, 95vw); max-height: 85vh; overflow-y: auto; border: 1px solid #222; 
        }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(5px); }
        .section-h { font-size:0.65rem; color:#00d4ff; font-weight:900; margin: 0 0 1rem 0; text-transform: uppercase; letter-spacing: 1px; }
        .setting-block { margin-bottom: 2.5rem; }
        
        input, select { background: #111; border: 1px solid #222; color: white; padding: 10px; border-radius: 6px; width: 100%; margin: 5px 0; font-size: 0.85rem; }
        button { cursor: pointer; background: #222; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; color: white; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        
        .btn-backup { background: #1b3d2f; color: #a8e6cf; border: 1px solid #2d5a44; }
        .btn-import { background: #1e3a5f; color: #a5c9ff; border: 1px solid #2a4a7a; }
        
        .del-btn { color: #ff4444; cursor: pointer; font-size: 0.7rem; position: absolute; right: 0; display: none; }
        .edit-mode .del-btn { display: inline; }
        
        .ql-row { display: grid; grid-template-columns: 30px 140px 1fr; gap: 10px; align-items: center; margin-bottom: 8px; }
        .color-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 5px 0; font-size: 0.8rem; }
        .color-row input[type="color"] { width: 50px; height: 32px; padding: 2px; flex-shrink: 0; }
        .city-tag { display: flex; justify-content: space-between; align-items: center; background: #151515; padding: 12px; border-radius: 10px; margin: 8px 0; font-size: 0.85rem; border: 1px solid #222; }
        .city-tag span:last-child { cursor: pointer; color: #ff4444; font-weight: bold; padding: 5px 10px; }
        .control-group { display: flex; align-items: center; gap: 15px; margin-top: 5px; }
        .label-inline { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; cursor: pointer; margin-top: 5px; }
        .label-inline input[type="checkbox"] { width: auto; margin: 0; }
        
        .link-edit-row { display: grid; grid-template-columns: 1fr 1fr 40px 35px; gap: 5px; margin-bottom: 8px; align-items: center; }
        .link-edit-row input[type="color"] { width: 100%; height: 38px; padding: 2px; margin: 0; }
    </style>
</head>
<body>

    <div id="full-bg"></div>
    <div id="overlay" onclick="closeModals()"></div>

    <div class="container">
        <header class="top-bar">
            <div class="nav-group" id="ql-nav"></div>
            <div class="nav-group">
                <span class="nav-link" onclick="document.body.classList.toggle('edit-mode')"><i class="fa-solid fa-pen"></i></span>
                <span class="nav-link" onclick="openModal('settings-modal')"><i class="fa-solid fa-gear"></i></span>
            </div>
        </header>

        <main id="main-content">
            <div id="grid"></div>
        </main>

        <section id="weather-area">
            <span id="city-name" onclick="cycleCity()">---</span>
            <div id="weather-grid" onclick="openModal('weather-modal')"></div>
        </section>
    </div>

    <div id="settings-modal" class="modal">
        <h2 style="margin:0 0 1.5rem 0; font-size: 1.1rem;">Dashboard Settings</h2>
        
        <div class="setting-block">
            <div class="section-h">Quick Links Configuration</div>
            <div id="ql-list-editor"></div>
        </div>
        
        <div class="setting-block">
            <div class="section-h">Navigation Behavior</div>
            <div class="color-row">
                <span>Open links in:</span>
                <select id="target-mode" onchange="updateVisRealtime()" style="width: 140px; margin:0;">
                    <option value="_blank">New Tab</option>
                    <option value="_self">Current Tab</option>
                </select>
            </div>
        </div>

        <div class="setting-block">
            <div class="section-h">Categories</div>
            <select id="cat-sel" onchange="syncCategoryEditor()"></select>
            <div style="display:flex; gap:10px;">
                <input type="text" id="cat-title" oninput="updateCatRealtime()" placeholder="Title">
                <input type="color" id="cat-color" oninput="updateCatRealtime()" style="width:60px; height:42px;">
            </div>
            <input type="text" id="cat-url" oninput="updateCatRealtime()" placeholder="Category Click URL">
            <div id="link-list-editor" style="margin-top:10px; border: 1px solid #1a1a1a; padding: 10px; border-radius: 10px; max-height: 250px; overflow-y: auto; background: #050505;"></div>
            <button onclick="addLinkInline()">+ Add Link</button>
            <button onclick="addCat()">+ New Category</button>
        </div>

        <div class="setting-block">
            <div class="section-h">Icon & Text Colors</div>
            <div class="color-row"><span>Global Icon Color</span> <input type="color" id="icon-color-picker" oninput="updateVisRealtime()"></div>
            <div class="color-row"><span>Category Links Text</span> <input type="color" id="l-color" oninput="updateVisRealtime()"></div>
        </div>

        <div class="setting-block">
            <div class="section-h">Weather</div>
            <div class="control-group">
                <label class="label-inline"><input type="checkbox" id="w-toggle" onchange="updateVisRealtime()"> Enable Weather</label>
                <label class="label-inline"><input type="checkbox" id="w-real-color" onchange="updateVisRealtime()"> Colored Icons</label>
            </div>
            <div class="color-row" style="margin-top:10px;">
                <span>Weather UI Color</span> 
                <input type="color" id="w-color" oninput="updateVisRealtime()">
            </div>
        </div>

        <div class="setting-block">
            <div class="section-h">Background Options</div>
            <div class="color-row"><span>Background Color</span> <input type="color" id="bg-color" oninput="updateVisRealtime()"></div>
            <label class="label-inline"><input type="checkbox" id="mesh-check" onchange="updateVisRealtime()"> Gradient Effect</label>
            <div style="margin: 15px 0 10px 0;">
                <span style="font-size: 0.8rem; opacity: 0.8;">Background Opacity</span>
                <input type="range" id="op-slide" min="0" max="1" step="0.05" oninput="updateVisRealtime()">
            </div>
        </div>

        <div style="display:flex; gap:10px; margin-top: 1rem;">
            <button class="btn-backup" onclick="exportData()">Backup Settings</button>
            <button class="btn-import" onclick="document.getElementById('file-input').click()">Import Settings</button>
        </div>
        <input type="file" id="file-input" style="display:none" onchange="importData(this)">
    </div>

    <div id="weather-modal" class="modal">
        <h3 style="margin:0 0 1rem 0;">Weather Management</h3>
        <div class="section-h">Current Locations</div>
        <div id="current-cities"></div>
        <div class="section-h">Add New City</div>
        <input type="text" placeholder="Search city name..." oninput="searchCity(this.value)">
        <div id="search-res"></div>
        <button onclick="closeModals()">Close</button>
    </div>

<script>
    const KEY = "DASH_STABLE_V45_FIXED_ICONS";
    
    // Explicit list with labels for the dropdown
    const ICON_SET = [
        { class: "fa-solid fa-server", label: "Server Solid" },
        { class: "fa-solid fa-sliders", label: "Sliders Solid" },
        { class: "fa-brands fa-spotify", label: "Spotify Brand" },
        { class: "fa-solid fa-music", label: "Music Solid" },
        { class: "fa-solid fa-1", label: "1 Solid" },
        { class: "fa-solid fa-2", label: "2 Solid" },
        { class: "fa-solid fa-3", label: "3 Solid" },
        { class: "fa-solid fa-4", label: "4 Solid" },
        { class: "fa-solid fa-5", label: "5 Solid" },
        { class: "fa-solid fa-6", label: "6 Solid" },
        { class: "fa-solid fa-7", label: "7 Solid" },
        { class: "fa-solid fa-8", label: "8 Solid" },
        { class: "fa-solid fa-9", label: "9 Solid" }
    ];
    // Add Alphabet
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
        ICON_SET.push({ class: `fa-solid fa-${l}`, label: `${l} Solid` });
    });
    // Add Shapes
    ICON_SET.push(
        { class: "fa-regular fa-star", label: "Star Outline" },
        { class: "fa-solid fa-star", label: "Star Solid" },
        { class: "fa-regular fa-circle", label: "Circle Outline" },
        { class: "fa-solid fa-circle", label: "Circle Solid" },
        { class: "fa-regular fa-square", label: "Square Outline" },
        { class: "fa-solid fa-square", label: "Square Solid" },
        { class: "fa-solid fa-diamond", label: "Diamond Solid" },
        { class: "fa-solid fa-hexagon", label: "Hexagon Solid" }
    );
    
    const W_DATA = { 
        0: { icon: "fa-sun", color: "#FFD700" }, 
        1: { icon: "fa-cloud-sun", color: "#FFB800" }, 
        2: { icon: "fa-cloud-sun", color: "#FFB800" }, 
        3: { icon: "fa-cloud", color: "#B0C4DE" }, 
        45: { icon: "fa-smog", color: "#778899" }, 
        51: { icon: "fa-cloud-rain", color: "#00BFFF" }, 
        61: { icon: "fa-cloud-showers-heavy", color: "#1E90FF" }, 
        95: { icon: "fa-bolt", color: "#BA55D3" } 
    };

    function getDefaults() {
        const homeCats = [];
        for(let i=1; i<=5; i++) {
            let links = [];
            for(let j=1; j<=5; j++) links.push({name:`Link ${j}`, url:"#", color: ""});
            homeCats.push({title:`Category ${i}`, color:"#00d4ff", url: "#", links: links});
        }
        const workCats = [];
        for(let i=1; i<=3; i++) {
            let links = [];
            for(let j=1; j<=3; j++) links.push({name:`Work Link ${j}`, url:"#", color: ""});
            workCats.push({title:`Work Cat ${i}`, color:"#ff8800", url: "#", links: links});
        }
        const baseQl = [
            {name:"fa-solid fa-server",url:"#",vis:false},
            {name:"fa-solid fa-sliders",url:"#",vis:false},
            {name:"fa-brands fa-spotify",url:"#",vis:false},
            {name:"fa-solid fa-music",url:"#",vis:false}
        ];
        return {
            profile: 'home', opacity: 0.3, mesh: true, target: '_blank', realWeatherColors: true,
            bgColor: "#1C1B22", iconColor: "#ffffff", weatherColor: "#ffffff", linkColor: "#cccccc",
            cities: [{name: "Lisboa", lat: 38.71, lon: -9.13}],
            home: { ql: JSON.parse(JSON.stringify(baseQl)), categories: homeCats, showWeather: true },
            work: { ql: JSON.parse(JSON.stringify(baseQl)), categories: workCats, showWeather: true }
        };
    }

    let state = JSON.parse(localStorage.getItem(KEY)) || getDefaults();
    let cityIdx = 0;

    function saveAndRender(refreshModal = false) {
        localStorage.setItem(KEY, JSON.stringify(state));
        const p = state[state.profile];
        document.body.style.backgroundColor = state.bgColor;
        document.documentElement.style.setProperty('--icon-color', state.iconColor);

        const profileIcon = state.profile === 'home' ? 'fa-house' : 'fa-user-tie';
        const qlHtml = p.ql.filter(l => l.vis).map(l => `<a href="${l.url}" class="nav-link active" target="${state.target}"><i class="${l.name}"></i></a>`).join('');
        document.getElementById('ql-nav').innerHTML = `<span class="nav-link active" onclick="toggleProfile()"><i class="fa-solid ${profileIcon}"></i></span>` + qlHtml;

        document.getElementById('grid').innerHTML = p.categories.map((c, ci) => `
            <div class="column">
                <div style="position:absolute; inset:0; background:linear-gradient(${c.color}33, transparent); opacity:${state.opacity}; z-index:-1; border-radius:14px;"></div>
                <a href="${c.url || '#'}" target="${state.target}" class="cat-title" style="color:${c.color};">${c.title}<span class="del-btn" onclick="event.preventDefault(); delCat(${ci})">✕</span></a>
                ${c.links.map((l, li) => {
                    const lColor = l.color && l.color !== "" ? l.color : state.linkColor;
                    return `<div class="link-row"><a href="${l.url}" target="${state.target}" style="color:${lColor}">${l.name}</a><span class="del-btn" onclick="delLink(${ci},${li})">✕</span></div>`;
                }).join('')}
            </div>`).join('');

        const wArea = document.getElementById('weather-area');
        wArea.style.display = p.showWeather ? 'flex' : 'none';
        wArea.style.color = state.weatherColor;
        
        const bg = document.getElementById('full-bg');
        if (state.mesh) {
            const cols = p.categories.map(x => x.color);
            bg.style.background = cols.length > 1 ? `linear-gradient(135deg, ${cols.join(',')})` : (cols[0] || state.bgColor);
            bg.style.opacity = state.opacity;
        } else { bg.style.opacity = 0; }
        
        setTimeout(() => bg.classList.add('ready'), 100);
        if(refreshModal) syncCategoryEditor();
    }

    function openModal(id) { 
        document.getElementById(id).style.display = 'block'; 
        document.getElementById('overlay').style.display = 'block'; 
        if(id === 'settings-modal') renderSettings();
        if(id === 'weather-modal') renderWeatherManager();
    }
    
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('overlay').style.display='none'; }

    function renderSettings() {
        const p = state[state.profile];
        document.getElementById('cat-sel').innerHTML = p.categories.map((c, i) => `<option value="${i}">${c.title}</option>`).join('');
        document.getElementById('ql-list-editor').innerHTML = p.ql.map((l, i) => `
            <div class="ql-row">
                <input type="checkbox" ${l.vis ? 'checked' : ''} onchange="updateQlRealtime(${i},'vis',this.checked)">
                <select onchange="updateQlRealtime(${i},'name',this.value)" style="margin:0;">
                    ${ICON_SET.map(item => `<option value="${item.class}" ${l.name === item.class ? 'selected' : ''}>${item.label}</option>`).join('')}
                </select>
                <input type="text" value="${l.url}" oninput="updateQlRealtime(${i},'url',this.value)" style="margin:0;">
            </div>`).join('');
        document.getElementById('target-mode').value = state.target || '_blank';
        document.getElementById('w-toggle').checked = p.showWeather;
        document.getElementById('mesh-check').checked = state.mesh;
        document.getElementById('w-real-color').checked = state.realWeatherColors;
        document.getElementById('bg-color').value = state.bgColor;
        document.getElementById('icon-color-picker').value = state.iconColor;
        document.getElementById('w-color').value = state.weatherColor;
        document.getElementById('l-color').value = state.linkColor;
        document.getElementById('op-slide').value = state.opacity;
        syncCategoryEditor();
    }

    function renderWeatherManager() { 
        document.getElementById('current-cities').innerHTML = state.cities.map((c, i) => `
            <div class="city-tag">
                <span>${c.name}</span>
                <span onclick="removeCity(${i})">✕</span>
            </div>`).join(''); 
    }

    function syncCategoryEditor() {
        const p = state[state.profile];
        const idx = document.getElementById('cat-sel').value;
        if(idx !== "" && p.categories[idx]) {
            const c = p.categories[idx];
            document.getElementById('cat-title').value = c.title;
            document.getElementById('cat-color').value = c.color;
            document.getElementById('cat-url').value = c.url || "";
            document.getElementById('link-list-editor').innerHTML = c.links.map((l, li) => `
                <div class="link-edit-row">
                    <input type="text" value="${l.name}" placeholder="Name" oninput="updateLinkRealtime(${idx}, ${li}, 'name', this.value)">
                    <input type="text" value="${l.url}" placeholder="URL" oninput="updateLinkRealtime(${idx}, ${li}, 'url', this.value)">
                    <input type="color" value="${l.color || state.linkColor}" oninput="updateLinkRealtime(${idx}, ${li}, 'color', this.value)">
                    <button style="margin:0; background:#300; color:red;" onclick="delLink(${idx}, ${li}); syncCategoryEditor();">✕</button>
                </div>`).join('');
        }
    }

    function updateCatRealtime() { 
        const idx = document.getElementById('cat-sel').value; 
        const c = state[state.profile].categories[idx]; 
        c.title = document.getElementById('cat-title').value; 
        c.color = document.getElementById('cat-color').value; 
        c.url = document.getElementById('cat-url').value; 
        saveAndRender(); 
    }
    
    function updateLinkRealtime(ci, li, k, v) { state[state.profile].categories[ci].links[li][k] = v; saveAndRender(); }
    function updateQlRealtime(i, k, v) { state[state.profile].ql[i][k] = v; saveAndRender(); }
    
    function updateVisRealtime() {
        state.target = document.getElementById('target-mode').value;
        state[state.profile].showWeather = document.getElementById('w-toggle').checked;
        state.mesh = document.getElementById('mesh-check').checked;
        state.realWeatherColors = document.getElementById('w-real-color').checked;
        state.bgColor = document.getElementById('bg-color').value;
        state.iconColor = document.getElementById('icon-color-picker').value;
        state.weatherColor = document.getElementById('w-color').value;
        state.linkColor = document.getElementById('l-color').value;
        state.opacity = document.getElementById('op-slide').value;
        saveAndRender(); updateWeather();
    }

    async function updateWeather() {
        const city = state.cities[cityIdx]; if(!city) return;
        document.getElementById('city-name').textContent = city.name;
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&daily=weathercode,temperature_2m_max&timezone=auto`);
            const d = await r.json();
            document.getElementById('weather-grid').innerHTML = d.daily.time.slice(0,7).map((t, i) => {
                const code = d.daily.weathercode[i];
                const weather = W_DATA[code] || { icon: "fa-cloud", color: "#B0C4DE" };
                const iconColor = state.realWeatherColors ? weather.color : state.weatherColor;
                return `
                <div class="weather-card">
                    <div class="weather-day-label">${new Date(t).toLocaleDateString('en',{weekday:'short'})}</div>
                    <i class="fa-solid ${weather.icon}" style="color:${iconColor}"></i>
                    <div class="weather-temp">${Math.round(d.daily.temperature_2m_max[i])}°</div>
                </div>`;
            }).join('');
        } catch(e) {}
    }

    function cycleCity() { if(state.cities.length > 1) { cityIdx = (cityIdx + 1) % state.cities.length; updateWeather(); } }
    async function searchCity(v) { if(v.length < 3) return; const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${v}&count=5`); const d = await r.json(); document.getElementById('search-res').innerHTML = (d.results || []).map(res => `<div onclick="addCity('${res.name}',${res.latitude},${res.longitude})" style="background:#1a1a1a; padding:10px; margin:5px 0; cursor:pointer; border-radius:8px;">${res.name}, ${res.country_code}</div>`).join(''); }
    function addCity(n, la, lo) { state.cities.push({name:n, lat:la, lon:lo}); document.getElementById('search-res').innerHTML=''; renderWeatherManager(); saveAndRender(); updateWeather(); }
    function removeCity(i) { state.cities.splice(i,1); if(cityIdx >= state.cities.length) cityIdx = 0; renderWeatherManager(); saveAndRender(); updateWeather(); }
    function toggleProfile() { state.profile = (state.profile === 'home' ? 'work' : 'home'); saveAndRender(); updateWeather(); }
    function addLinkInline() { const idx = document.getElementById('cat-sel').value; state[state.profile].categories[idx].links.push({name: "New Link", url: "#", color: ""}); saveAndRender(true); }
    function addCat() { state[state.profile].categories.push({title:"New", color:"#00d4ff", url: "#", links:[]}); saveAndRender(); openModal('settings-modal'); }
    function delCat(i) { if(confirm("Delete?")) { state[state.profile].categories.splice(i,1); saveAndRender(); openModal('settings-modal'); } }
    function delLink(ci, li) { state[state.profile].categories[ci].links.splice(li,1); saveAndRender(); }
    function exportData() { const b = new Blob([JSON.stringify(state)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download='startpage_backup.json'; a.click(); }
    function importData(input) { const file = input.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (e) => { try { state = JSON.parse(e.target.result); saveAndRender(); alert("Import successful!"); } catch(err) { alert("Error: Invalid JSON file."); } }; reader.readAsText(file); }

    window.onload = () => { saveAndRender(); updateWeather(); };
</script>
</body>
</html>
