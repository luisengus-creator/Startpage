<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startpage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        html, body { background-color: #1C1B22; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        :root { --fs-base: clamp(0.9rem, 1.1vw, 1.4rem); }
        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            color: white; height: 100vh; display: flex; flex-direction: column; 
            font-size: var(--fs-base); position: relative;
        }

        /* MASTER BACKGROUND LAYER */
        #full-bg { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: -2; pointer-events: none; 
            background-repeat: no-repeat; background-size: cover; background-position: center;
        }

        .container { 
            width: 100%; height: 100%; margin: 0 auto; padding: 3vh 4vw; 
            display: flex; flex-direction: column; position: relative; z-index: 1;
        }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; z-index: 10; flex-shrink: 0; margin-bottom: 3vh; }
        .nav-group { display: flex; gap: 1.2rem; align-items: center; }
        .nav-link { cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; width: 1.8rem; height: 1.8rem; }
        .nav-link i { font-size: 1.1rem; color: var(--icon-color, #ffffff); transition: 0.3s; }

        #main-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; overflow-y: auto; }
        #grid { display: flex; flex-wrap: wrap; gap: clamp(1.5rem, 3vw, 4rem); justify-content: center; align-content: center; width: 100%; }
        
        .column { 
            background: rgba(255,255,255,0.03); border-radius: 16px; padding: 1.5rem 1.8rem; 
            position: relative; border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(12px);
            flex: 0 0 auto; width: max-content; min-width: 180px; text-align: center;
        }

        .cat-title { 
            margin: 0 0 1rem 0; font-size: 1.3rem; font-weight: 700;
            padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); 
            white-space: nowrap; cursor: pointer; text-decoration: none; display: block; 
        }
        .link-row { display: flex; justify-content: center; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); position: relative; }
        .link-row a { text-decoration: none; font-size: 1rem; }

        #weather-area { padding: 2vh 0; display: none; flex-direction: column; align-items: center; gap: 0.8rem; z-index: 10; }
        #city-name { font-size: 0.8rem; opacity: 0.5; letter-spacing: 4px; cursor: pointer; text-transform: uppercase; }
        #weather-grid { display: flex; gap: 0.8rem; align-items: center; cursor: pointer; }
        .weather-card { background: rgba(255,255,255,0.03); padding: 0.7rem 0.9rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center; min-width: 6rem; }

        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #0a0a0a; padding: 2rem; border-radius: 20px; z-index: 2000; 
            width: min(600px, 95vw); max-height: 85vh; overflow-y: auto; border: 1px solid #222; 
        }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(5px); }
        .section-h { font-size:0.65rem; color:#00d4ff; font-weight:900; margin: 0 0 1rem 0; text-transform: uppercase; letter-spacing: 1px; }
        .setting-block { margin-bottom: 2.5rem; }
        
        input, select { background: #111; border: 1px solid #222; color: white; padding: 10px; border-radius: 6px; width: 100%; margin: 5px 0; }
        button { cursor: pointer; background: #222; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; color: white; }
        
        .ql-row { display: grid; grid-template-columns: 30px 140px 1fr; gap: 10px; align-items: center; margin-bottom: 8px; }
        .color-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 5px 0; font-size: 0.8rem; }
        .color-row input[type="color"] { width: 50px; height: 32px; padding: 2px; flex-shrink: 0; }
        .label-inline { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; cursor: pointer; margin-top: 5px; }
        .label-inline input[type="checkbox"], .label-inline input[type="radio"] { width: auto; margin: 0; }

        .link-edit-row { display: grid; grid-template-columns: 1fr 1fr 40px 35px; gap: 5px; margin-bottom: 8px; align-items: center; }
    </style>
</head>
<body>

    <div id="full-bg"></div>
    <div id="overlay" onclick="closeModals()"></div>

    <div class="container">
        <header class="top-bar">
            <div class="nav-group" id="ql-nav"></div>
            <div class="nav-group">
                <span class="nav-link" onclick="document.body.classList.toggle('edit-mode')"><i class="fa-solid fa-pen"></i></span>
                <span class="nav-link" onclick="openModal('settings-modal')"><i class="fa-solid fa-gear"></i></span>
            </div>
        </header>
        <main id="main-content"><div id="grid"></div></main>
        <section id="weather-area">
            <span id="city-name" onclick="cycleCity()">---</span>
            <div id="weather-grid" onclick="openModal('weather-modal')"></div>
        </section>
    </div>

    <div id="settings-modal" class="modal">
        <div class="setting-block">
            <div class="section-h">Quick Links (Max 4)</div>
            <div id="ql-list-editor"></div>
        </div>

        <div class="setting-block">
            <div class="section-h">Background Options</div>
            <div class="color-row">
                <span>Base Color</span> 
                <div style="display:flex; gap:5px;">
                    <input type="color" id="bg-color" oninput="updateVisRealtime()">
                    <button onclick="resetToBaseColor()" style="width:auto; margin:0; padding:5px 10px; font-size:0.6rem;">Reset</button>
                </div>
            </div>
            <div style="display: flex; gap: 20px;">
                <label class="label-inline"><input type="radio" name="bg-type" id="mesh-check" onchange="toggleBgType('mesh')"> Gradient</label>
                <label class="label-inline"><input type="radio" name="bg-type" id="img-check" onchange="toggleBgType('img')"> Image</label>
            </div>
            <div id="img-input-area">
                <input type="text" id="bg-img-url" placeholder="Image URL" oninput="updateVisRealtime()">
                <button onclick="document.getElementById('local-img').click()">Upload Photo</button>
                <input type="file" id="local-img" hidden accept="image/*" onchange="handleLocalImg(this)">
            </div>
            <input type="range" id="op-slide" min="0" max="1" step="0.05" oninput="updateVisRealtime()">
        </div>

        <div class="setting-block">
            <div class="section-h">Links & Weather</div>
            <div class="color-row"><span>Open links in:</span>
                <select id="target-mode" onchange="updateVisRealtime()"><option value="_self">Current Tab</option><option value="_blank">New Tab</option></select>
            </div>
            <label class="label-inline"><input type="checkbox" id="w-toggle" onchange="updateVisRealtime()"> Enable Weather</label>
        </div>
        <button onclick="exportData()">Backup</button>
        <input type="file" id="file-input" style="display:none" onchange="importData(this)">
        <button onclick="document.getElementById('file-input').click()">Import</button>
    </div>

<script>
    const KEY = "DASH_TOTAL_INDEPENDENCE_V100";
    let state = JSON.parse(localStorage.getItem(KEY));

    const ICON_SET = [
        { class: "fa-solid fa-server", label: "Server" }, { class: "fa-solid fa-sliders", label: "Sliders" }, { class: "fa-brands fa-spotify", label: "Spotify" }, { class: "fa-solid fa-music", label: "Music" },
        { class: "fa-solid fa-1", label: "1" }, { class: "fa-solid fa-2", label: "2" }, { class: "fa-solid fa-3", label: "3" }, { class: "fa-solid fa-4", label: "4" }, { class: "fa-solid fa-5", label: "5" }
    ];

    function getDefaults() {
        const createProfile = (col, name) => {
            const cats = [];
            for(let i=1; i<= (name === 'home' ? 5 : 3); i++) {
                let links = [];
                for(let j=1; j<= 5; j++) links.push({name:`Link ${j}`, url:"#", color: ""});
                cats.push({title:`Category ${i}`, color: col, url: "#", links: links});
            }
            return {
                ql: [{name:"fa-solid fa-server",url:"#",vis:false}, {name:"fa-solid fa-sliders",url:"#",vis:false}, {name:"fa-brands fa-spotify",url:"#",vis:false}, {name:"fa-solid fa-music",url:"#",vis:false}],
                categories: cats, showWeather: true, bgType: 'mesh', bgImg: '', opacity: 0.3, bgColor: "#1C1B22", iconColor: "#ffffff", target: '_self'
            };
        };
        return { profile: 'home', cities: [{name: "Lisboa", lat: 38.71, lon: -9.13}], home: createProfile('#00d4ff', 'home'), work: createProfile('#ff8800', 'work') };
    }

    if (!state) state = getDefaults();

    function handleLocalImg(input) {
        const file = input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1920; let width = img.width, height = img.height;
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                state[state.profile].bgImg = canvas.toDataURL('image/jpeg', 0.8);
                state[state.profile].bgType = 'img';
                saveAndRender(true);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function toggleBgType(t) { state[state.profile].bgType = t; saveAndRender(true); }
    function resetToBaseColor() { state[state.profile].bgColor = "#1C1B22"; saveAndRender(true); }

    function saveAndRender(refreshModal = false) {
        localStorage.setItem(KEY, JSON.stringify(state));
        const p = state[state.profile];
        document.body.style.backgroundColor = p.bgColor;
        const bg = document.getElementById('full-bg');
        
        // RESET BACKGROUND
        bg.style.backgroundImage = 'none'; bg.style.backgroundColor = 'transparent'; bg.style.filter = 'none';

        if (p.bgType === 'mesh') {
            const cols = p.categories.map(x => x.color);
            if (cols.length > 1) bg.style.backgroundImage = `linear-gradient(135deg, ${cols.join(',')})`;
            else if (cols.length === 1) bg.style.backgroundColor = cols[0];
            bg.style.opacity = p.opacity;
        } else if (p.bgType === 'img' && p.bgImg) {
            bg.style.backgroundImage = `url("${p.bgImg}")`;
            bg.style.opacity = 1;
            bg.style.filter = `blur(${p.opacity * 20}px) brightness(0.7)`;
        }

        const qlHtml = p.ql.slice(0, 4).filter(l => l.vis).map(l => `<a href="${l.url}" class="nav-link" target="${p.target}"><i class="${l.name}"></i></a>`).join('');
        document.getElementById('ql-nav').innerHTML = `<span class="nav-link" onclick="toggleProfile()"><i class="fa-solid ${p.profile==='home'?'fa-house':'fa-user-tie'}"></i></span>` + qlHtml;

        document.getElementById('grid').innerHTML = p.categories.map((c, ci) => `
            <div class="column">
                <a href="${c.url}" target="${p.target}" class="cat-title" style="color:${c.color}">${c.title}</a>
                ${c.links.map(l => `<div class="link-row"><a href="${l.url}" target="${p.target}" style="color:#ccc">${l.name}</a></div>`).join('')}
            </div>`).join('');
            
        if(refreshModal) renderSettings();
    }

    function renderSettings() {
        const p = state[state.profile];
        document.getElementById('ql-list-editor').innerHTML = p.ql.slice(0, 4).map((l, i) => `
            <div class="ql-row">
                <input type="checkbox" ${l.vis ? 'checked' : ''} onchange="state['${state.profile}'].ql[${i}].vis=this.checked; saveAndRender();">
                <select onchange="state['${state.profile}'].ql[${i}].name=this.value; saveAndRender();">${ICON_SET.map(it => `<option value="${it.class}" ${l.name === it.class ? 'selected' : ''}>${it.label}</option>`).join('')}</select>
                <input type="text" value="${l.url}" oninput="state['${state.profile}'].ql[${i}].url=this.value; saveAndRender();">
            </div>`).join('');
        document.getElementById('mesh-check').checked = p.bgType === 'mesh';
        document.getElementById('img-check').checked = p.bgType === 'img';
        document.getElementById('bg-color').value = p.bgColor;
        document.getElementById('op-slide').value = p.opacity;
    }

    function updateVisRealtime() {
        const p = state[state.profile];
        p.bgColor = document.getElementById('bg-color').value;
        p.opacity = document.getElementById('op-slide').value;
        p.target = document.getElementById('target-mode').value;
        saveAndRender();
    }

    function openModal(id) { document.getElementById(id).style.display = 'block'; document.getElementById('overlay').style.display = 'block'; renderSettings(); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); document.getElementById('overlay').style.display='none'; }
    function toggleProfile() { state.profile = (state.profile === 'home' ? 'work' : 'home'); saveAndRender(); }
    function exportData() { const b = new Blob([JSON.stringify(state)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download='config.json'; a.click(); }
    window.onload = () => { saveAndRender(); };
</script>
</body>
</html>
